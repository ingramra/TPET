<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electromagnetic Spectrum & Intelligence Disciplines</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0c0e13;--bg2:#13161d;--bg3:#1a1e28;--bg4:#232836;--text:#e8e6e0;--text2:#9b998f;--text3:#6b6960;--border:#2a2f3d;--accent:#4a90c4}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

.container{display:flex;flex-direction:column;height:100vh;padding:10px 14px 8px;gap:6px}

/* ── Header row ── */
.header{display:flex;align-items:baseline;gap:16px;flex-shrink:0;padding:0 2px 2px}
.header h1{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.freq-readout{display:flex;align-items:baseline;gap:10px;margin-left:auto}
.freq-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--accent)}
.band-name{font-size:14px;font-weight:600;transition:color 0.15s}
.wavelength{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)}

/* ── Spectrum bar ── */
.spectrum-section{flex-shrink:0}
.spectrum-track{position:relative;height:38px;border-radius:5px 5px 0 0;overflow:hidden;cursor:crosshair;user-select:none}
.spectrum-bar{display:flex;height:100%;width:100%}
.seg{height:100%;position:relative;transition:filter 0.15s}
.seg .seg-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:700;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.6)}
.seg.dim{filter:brightness(0.3)}
.cursor-line{position:absolute;top:0;width:2px;height:100%;background:white;pointer-events:none;z-index:10;box-shadow:0 0 8px rgba(255,255,255,0.5);transition:left 0.04s}

/* ── Perception strip ── */
.perception-strip{display:flex;height:18px;overflow:hidden;border-radius:0 0 5px 5px;margin-bottom:2px}
.p-seg{height:100%;display:flex;align-items:center;justify-content:center;transition:filter 0.15s}
.p-seg.dim{filter:brightness(0.25)}
.p-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;white-space:nowrap;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,0.7);overflow:hidden;text-overflow:ellipsis;padding:0 2px}

/* ── Main content area ── */
.main-content{flex:1;min-height:0;display:flex;gap:10px}

/* Left panel */
.left-panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:#2a2f3d transparent}
.left-panel::-webkit-scrollbar{width:4px}
.left-panel::-webkit-scrollbar-thumb{background:#2a2f3d;border-radius:2px}

.panel-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;flex-shrink:0}
.panel-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px}
.prop-grid{display:grid;grid-template-columns:1fr;gap:4px}
.prop-row{display:flex;gap:6px;font-size:11px;line-height:1.4}
.prop-key{color:var(--text3);font-weight:600;min-width:75px;flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:0.04em}
.prop-val{color:var(--text);font-weight:500}

.human-text{font-size:11px;line-height:1.55;color:var(--text)}
.human-text strong{color:var(--accent);font-weight:500}

.sys-item{display:flex;align-items:baseline;gap:6px;padding:3px 0;font-size:11px;border-bottom:1px solid var(--bg4)}
.sys-item:last-child{border-bottom:none}
.sys-name{font-weight:600;color:var(--text);white-space:nowrap}
.sys-desc{color:var(--text2);font-size:10px}

/* ── Right panel: INT grid ── */
.right-panel{flex:1;min-width:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:6px}

.int-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 11px;display:flex;flex-direction:column;transition:border-color 0.25s,box-shadow 0.25s,opacity 0.25s;overflow:hidden;position:relative}
.int-card.inactive{opacity:0.3;border-color:transparent}
.int-card.active{border-color:var(--glow-color,var(--border));box-shadow:0 0 12px color-mix(in srgb,var(--glow-color) 30%,transparent),inset 0 0 20px color-mix(in srgb,var(--glow-color) 8%,transparent)}

.int-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-shrink:0}
.int-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:box-shadow 0.25s}
.int-card.active .int-dot{box-shadow:0 0 6px var(--glow-color)}
.int-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2)}
.int-sub{font-size:9px;color:var(--text3);font-weight:500;flex-shrink:0;margin-bottom:4px;line-height:1.2}

.int-body{flex:1;overflow-y:auto;font-size:11px;line-height:1.55;color:var(--text);scrollbar-width:thin;scrollbar-color:#2a2f3d transparent}
.int-body::-webkit-scrollbar{width:3px}
.int-body::-webkit-scrollbar-thumb{background:#2a2f3d;border-radius:2px}
.int-body strong{color:var(--accent);font-weight:500}
.int-body .inactive-msg{color:var(--text3);font-style:italic;font-size:10px}

.int-example{margin-top:6px;padding:5px 7px;background:var(--bg3);border-radius:5px;font-size:10px;color:var(--text2);line-height:1.45}
.ex-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px}

/* ── Perception icons ── */
.pi{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;margin-right:3px}

/* ── INT focus mode ── */
.int-card{cursor:pointer}
.int-card:hover{border-color:color-mix(in srgb,var(--glow-color) 40%,transparent)}
.int-card.selected{border-color:var(--glow-color,var(--border));box-shadow:0 0 18px color-mix(in srgb,var(--glow-color) 45%,transparent),inset 0 0 25px color-mix(in srgb,var(--glow-color) 12%,transparent);opacity:1}
.int-card.selected .int-dot{box-shadow:0 0 8px var(--glow-color)}
.int-card.associated{border-color:color-mix(in srgb,var(--glow-color) 35%,transparent);box-shadow:0 0 8px color-mix(in srgb,var(--glow-color) 20%,transparent),inset 0 0 12px color-mix(in srgb,var(--glow-color) 6%,transparent);opacity:1}
.int-card.associated .int-dot{box-shadow:0 0 4px var(--glow-color)}
.int-card.focus-inactive{opacity:0.15;border-color:transparent;box-shadow:none}

.seg.focus-highlight{filter:brightness(1.1)!important;box-shadow:inset 0 0 8px rgba(255,255,255,0.15)}
.seg.focus-dim{filter:brightness(0.18)!important}
.p-seg.focus-dim{filter:brightness(0.15)!important}
.p-seg.focus-highlight{filter:brightness(1)!important}

.focus-banner{display:none;align-items:center;gap:8px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--text2);flex-shrink:0}
.focus-banner.visible{display:flex}
.focus-banner .fb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.focus-banner .fb-title{font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.05em;font-size:11px}
.focus-banner .fb-bands{color:var(--text3);font-size:10px;margin-left:auto}
.focus-banner .fb-close{margin-left:8px;cursor:pointer;color:var(--text3);font-size:13px;line-height:1;padding:2px 4px;border-radius:3px;transition:color 0.15s}
.focus-banner .fb-close:hover{color:var(--text)}

/* ── Legend row ── */
.legend-row{display:flex;align-items:center;gap:12px;flex-shrink:0;padding:4px 4px 0}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3)}
.ldot{width:6px;height:6px;border-radius:50%}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>Electromagnetic Spectrum &amp; Intelligence Disciplines</h1>
    <div class="freq-readout">
      <span class="freq-val" id="freqVal">76 Hz</span>
      <span class="band-name" id="bandName">ELF</span>
      <span class="wavelength" id="wavelength"></span>
    </div>
  </div>

  <!-- Spectrum bar -->
  <div class="spectrum-section">
    <div class="spectrum-track" id="spectrumTrack">
      <div class="spectrum-bar" id="spectrumBar"></div>
      <div class="cursor-line" id="cursorLine"></div>
    </div>
    <div class="perception-strip" id="perceptionStrip"></div>
  </div>

  <!-- Legend -->
  <div class="legend-row">
    <div class="legend-item"><div class="ldot" style="background:#4a90c4"></div>COMINT</div>
    <div class="legend-item"><div class="ldot" style="background:#5a9932"></div>ELINT</div>
    <div class="legend-item"><div class="ldot" style="background:#d86830"></div>FISINT</div>
    <div class="legend-item"><div class="ldot" style="background:#c04040"></div>MASINT</div>
    <div class="legend-item"><div class="ldot" style="background:#8844cc"></div>IMINT</div>
    <div class="legend-item"><div class="ldot" style="background:#dddd44"></div>GEOINT</div>
    <div class="legend-item"><div class="ldot" style="background:#e0a0b0"></div>TEMPEST</div>
    <span style="margin-left:auto;font-size:10px;color:var(--text3)" id="hintText">Drag spectrum or click an INT card</span>
  </div>

  <!-- Focus banner (visible when an INT card is clicked) -->
  <div class="focus-banner" id="focusBanner">
    <div class="fb-dot" id="fbDot"></div>
    <span class="fb-title" id="fbTitle"></span>
    <span style="color:var(--text3);font-size:10px" id="fbSub"></span>
    <span class="fb-bands" id="fbBands"></span>
    <span class="fb-close" id="fbClose" title="Exit focus mode">&times;</span>
  </div>

  <!-- Main content -->
  <div class="main-content">
    <!-- Left panel: Signal environment + human perception + systems -->
    <div class="left-panel">
      <div class="panel-card">
        <div class="panel-label">Signal Propagation</div>
        <div class="prop-grid">
          <div class="prop-row"><span class="prop-key">Propagation</span><span class="prop-val" id="propType">—</span></div>
          <div class="prop-row"><span class="prop-key">Penetration</span><span class="prop-val" id="propPen">—</span></div>
          <div class="prop-row"><span class="prop-key">Bandwidth</span><span class="prop-val" id="propBw">—</span></div>
        </div>
      </div>
      <div class="panel-card" style="flex:1;min-height:0;display:flex;flex-direction:column">
        <div class="panel-label">Human Perception</div>
        <div class="human-text" id="humanSense" style="margin-bottom:6px;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a2f3d transparent"></div>
      </div>
      <div class="panel-card">
        <div class="panel-label">Systems in Band</div>
        <div id="systemsList"></div>
      </div>
    </div>

    <!-- Right panel: INT discipline grid -->
    <div class="right-panel" id="intGrid"></div>
  </div>
</div>

<script>

{label:'Imperceptible',pct:6,color:'#1a1e28',tc:'#555',bids:['vlf']},

const HUMAN={
elf:{sense:'<span class="pi" style="background:#1a1e28;border:1px solid #444;color:#888">Imperceptible</span> Completely invisible to all human senses. ELF waves pass through your body with zero interaction you can detect. You have no biological receptor for electromagnetic waves at these frequencies.',interact:'No everyday interaction. These exist only in military submarine comms (Project ELF) and naturally in lightning and Schumann resonances (~7.8 Hz).'},
vlf:{sense:'<span class="pi" style="background:#1a1e28;border:1px solid #444;color:#888">Imperceptible</span> Invisible to all senses. VLF overlaps human hearing range but <strong>sound is mechanical pressure; VLF is electromagnetic.</strong> Your ear detects air pressure, not EM fields.',interact:'VLF "whistlers" (lightning signals ducted along magnetic field lines) can be converted to audio by a receiver. TACAMO broadcasts occur here but require a very long antenna.'},
lf:{sense:'<span class="pi" style="background:#1a1e28;border:1px solid #444;color:#888">Imperceptible</span> No direct perception. LF waves pass through your body and buildings without detectable interaction.',interact:'Longwave AM radio (148\u2013283 kHz) in Europe. BBC Radio 4 on 198 kHz is an LF wave converted to audio by your radio. LORAN-C navigation at 100 kHz also operated here.'},
mf:{sense:'<span class="pi" style="background:#2a4040;border:1px solid #4a7a6a;color:#6daa90">Heard via device</span> Still imperceptible directly. But this is where <strong>human voice first rides on electromagnetic waves</strong>. AM radio (540\u20131700 kHz) modulates audio onto MF carriers.',interact:'Every AM radio station you have heard was an MF electromagnetic wave. AM sounds lower-quality than FM because bandwidth: AM channels are 10 kHz wide (voice), FM channels are 200 kHz wide (stereo).'},
hf:{sense:'<span class="pi" style="background:#2a4040;border:1px solid #4a7a6a;color:#6daa90">Heard via device</span> Shortwave radio, ham radio, CB radio (27 MHz) all carry voice on HF carriers. Tuning across shortwave bands and hearing voices from other continents is HF skywave \u2014 ionospheric propagation.',interact:'Shortwave listening, ham radio, CB radio. If you have heard a trucker on CB or BBC World Service on shortwave, that was an HF wave via ionospheric skip.'},
vhf:{sense:'<span class="pi" style="background:#2a4040;border:1px solid #4a7a6a;color:#6daa90">Heard via device</span> The band you interact with most as "radio." <strong>FM radio (88\u2013108 MHz)</strong> produces high-fidelity audio. VHF TV channels 2\u201313 carried analog television.',interact:'FM radio, legacy VHF television, aviation ATC scanners, marine VHF channel 16, walkie-talkies, baby monitors.'},
uhf:{sense:'<span class="pi" style="background:#2a4040;border:1px solid #4a7a6a;color:#6daa90">Sensed via devices</span> Imperceptible directly, but UHF <strong>defines modern wireless life</strong>. Cell phone, WiFi (2.4 GHz), Bluetooth, GPS (1.575 GHz), digital TV \u2014 all UHF.',interact:'Cell phones, WiFi, Bluetooth, GPS, digital TV, garage door openers, <strong>microwave ovens (2.45 GHz)</strong> \u2014 they heat water molecules by making them oscillate at the wave frequency.'},
shf:{sense:'<span class="pi" style="background:#1a1e28;border:1px solid #444;color:#888">Imperceptible</span> SHF at sufficient power heats tissue (microwave oven principle). At communication power levels, passes through you undetected.',interact:'Satellite TV dishes (Ku-band 12\u201318 GHz), 5G, Starlink (Ka-band), radar detectors, weather radar, airport body scanners, speed cameras.'},
ehf:{sense:'<span class="pi" style="background:#1a1e28;border:1px solid #444;color:#888">Imperceptible</span> Millimeter wave absorbed by skin within the first mm. The military <strong>Active Denial System ("pain ray")</strong> at 95 GHz heats skin surface to create burning sensation.',interact:'Airport body scanners (24\u201330 GHz), 5G mmWave (28/39 GHz), automotive radar (77 GHz). 60 GHz absorbed by atmospheric oxygen \u2014 natural interception barrier.'},
ir:{sense:'<span class="pi" style="background:#3a1818;border:1px solid #a05040;color:#d06050">Felt as heat</span> <strong>The first band you directly perceive.</strong> Skin thermoreceptors detect infrared as warmth. Campfire heat, sun warming your face \u2014 all infrared EM waves. Your body emits IR (peak ~10 \u03BCm).',interact:'Everything warm emits IR: your body, incandescent bulbs (~95% IR), fire, sun. TV remotes transmit near-IR pulses (~940 nm). Night vision amplifies near-IR. Thermal cameras detect mid/far-IR. <strong>LiDAR</strong> typically operates at 1064 or 1550 nm (near-IR) \u2014 the eye-safe 1550 nm wavelength is increasingly standard for autonomous vehicles and surveying.'},
vis:{sense:'<span class="pi" style="background:#3a3a10;border:1px solid #aaaa30;color:#dddd44">Seen by eyes</span> <strong>The only EM band directly visible to humans.</strong> Retinal cones respond to ~380 nm (violet) through ~700 nm (red). Less than one octave of the full spectrum. Evolution tuned eyes here because the Sun peaks after atmospheric filtering.',interact:'Everything you see. Every visual experience = visible-light EM waves. Color is frequency: red ~430 THz, green ~560 THz, blue ~630 THz. A rainbow = visible light separated by frequency via refraction. <strong>Bathymetric LiDAR</strong> uses 532 nm green light because it penetrates water \u2014 the same reason the ocean looks blue-green.'},
uv:{sense:'<span class="pi" style="background:#251838;border:1px solid #7040a0;color:#a060cc">Biological effect</span> Invisible to eyes but body responds. <strong>UV-B causes sunburn</strong> \u2014 damages DNA, triggers melanin. UV-A penetrates deeper, causes aging. Some animals (bees, birds) see into UV.',interact:'Sunburn, tanning, vitamin D synthesis (UV-B), blacklight fluorescence (UV-A at ~365 nm), UV sterilization (UV-C at 254 nm destroys bacterial DNA), banknote security features.'},
xray:{sense:'<span class="pi" style="background:#182838;border:1px solid #4070a0;color:#6090cc">Ionizing \u2014 no sensation</span> X-rays pass through soft tissue, absorbed by bone/metal. <strong>Ionizing radiation</strong>: enough energy to strip electrons, breaking molecular bonds and damaging DNA.',interact:'Medical/dental X-rays, CT scans, airport baggage scanners, industrial weld inspection, crystallography (DNA double helix discovered via X-ray diffraction).'},
gamma:{sense:'<span class="pi" style="background:#182838;border:1px solid #4070a0;color:#6090cc">Ionizing \u2014 no sensation</span> Imperceptible at survivable intensity. Each photon can break bonds, ionize atoms, damage DNA. <strong>Massive doses cause radiation sickness and death.</strong>',interact:'Cancer treatment (radiation therapy), food irradiation, nuclear medicine (PET scans), industrial radiography. Natural: potassium-40 in bananas, radon gas, cosmic rays.'}
};

// ════════════════════════════════════════════
// FREQUENCY / POSITION MAPPING
// ════════════════════════════════════════════

const TOTAL_PCT = BANDS.reduce((s,b)=>s+b.pct,0);

function freqFromPosition(frac){
    frac=Math.max(0,Math.min(1,frac));
    const target=frac*TOTAL_PCT;
    let cum=0;
    for(const b of BANDS){
        if(target<cum+b.pct){
            const fr=(target-cum)/b.pct;
            return Math.pow(10,Math.log10(b.min)+fr*(Math.log10(b.max)-Math.log10(b.min)));
        }
        cum+=b.pct;
    }
    return BANDS[BANDS.length-1].max;
}

function positionFromFreq(freq){
    let cum=0;
    for(const b of BANDS){
        if(freq<=b.max){
            const logFrac=(Math.log10(Math.max(freq,b.min))-Math.log10(b.min))/(Math.log10(b.max)-Math.log10(b.min));
            return(cum+logFrac*b.pct)/TOTAL_PCT;
        }
        cum+=b.pct;
    }
    return 1;
}

// ════════════════════════════════════════════
// FORMATTING
// ════════════════════════════════════════════

function formatFreq(f){
    if(f<1e3)return Math.round(f)+' Hz';
    if(f<1e6)return(f/1e3).toFixed(f<1e4?1:0)+' kHz';
    if(f<1e9)return(f/1e6).toFixed(f<1e7?1:0)+' MHz';
    if(f<1e12)return(f/1e9).toFixed(f<1e10?1:0)+' GHz';
    if(f<1e15)return(f/1e12).toFixed(f<1e13?1:0)+' THz';
    return(f/1e15).toFixed(1)+' PHz';
}

function formatWL(f){
    const l=299792458/f;
    if(l>=1000)return'\u03BB = '+(l/1000).toFixed(l>1e6?0:1)+' km';
    if(l>=1)return'\u03BB = '+l.toFixed(l>100?0:1)+' m';
    if(l>=1e-3)return'\u03BB = '+(l*1e3).toFixed(1)+' mm';
    if(l>=1e-6)return'\u03BB = '+(l*1e6).toFixed(l>1e-4?0:1)+' \u03BCm';
    if(l>=1e-9)return'\u03BB = '+(l*1e9).toFixed(1)+' nm';
    if(l>=1e-12)return'\u03BB = '+(l*1e12).toFixed(2)+' pm';
    return'\u03BB = '+(l*1e15).toFixed(2)+' fm';
}

function getBand(f){for(const b of BANDS){if(f>=b.min&&f<b.max)return b}return BANDS[BANDS.length-1]}

function buildSpectrumBar(){
    const bar=document.getElementById('spectrumBar');
    BANDS.forEach(b=>{
        const s=document.createElement('div');
        s.className='seg';s.dataset.band=b.id;
        s.style.width=b.pct+'%';s.style.background=b.color;
        const l=document.createElement('span');l.className='seg-label';l.textContent=b.name;
        s.appendChild(l);bar.appendChild(s);
    });
}

function buildPerceptionStrip(){
    const ps=document.getElementById('perceptionStrip');
    PERCSEGS.forEach(p=>{
        const s=document.createElement('div');
        s.className='p-seg';s.dataset.bands=p.bids.join(',');
        s.style.width=p.pct+'%';s.style.background=p.color;

    });
}

function buildIntGrid(){
    const grid=document.getElementById('intGrid');
    const order=['comint','elint','fisint','masint','imint','geoint','tempest'];
    order.forEach(k=>{
        const info=INTELS[k];
        const card=document.createElement('div');
        card.className='int-card inactive';
        card.id='int-'+k;
        card.style.setProperty('--glow-color',info.dot);
        card.innerHTML=`
            <div class="int-header">
                <div class="int-dot" style="background:${info.dot}"></div>

            <div class="int-sub">${info.sub}</div>

                <span class="inactive-msg">Not active at this frequency</span>

        grid.appendChild(card);
    });
}

function updateDisplay(freq){
    const band=getBand(freq);
    const d=DATA[band.id];
    const h=HUMAN[band.id];

    // Frequency readout
    document.getElementById('freqVal').textContent=formatFreq(freq);
    document.getElementById('bandName').textContent=band.name;
    document.getElementById('bandName').style.color=band.color;
    document.getElementById('wavelength').textContent=formatWL(freq);

    // Cursor position
    const track=document.getElementById('spectrumTrack');
    const frac=positionFromFreq(freq);
    document.getElementById('cursorLine').style.left=(frac*100)+'%';

    // Dim non-active band segments
    document.querySelectorAll('.seg').forEach(s=>s.classList.toggle('dim',s.dataset.band!==band.id));
    document.querySelectorAll('.p-seg').forEach(s=>s.classList.toggle('dim',!s.dataset.bands.split(',').includes(band.id)));

    // Left panel: propagation
    if(d){
        document.getElementById('propType').textContent=d.propagation;
        document.getElementById('propPen').textContent=d.penetration;
        document.getElementById('propBw').textContent=d.bandwidth;
    }

    // Left panel: human perception
    if(h){
        document.getElementById('humanSense').innerHTML=
            '<div style="margin-bottom:6px">'+h.sense+'</div>'+
            '<div style="color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Everyday Interaction</div>'+
            '<div>'+h.interact+'</div>';
    }

    // Left panel: systems
    const sysEl=document.getElementById('systemsList');
    sysEl.innerHTML='';
    if(d&&d.systems){
        d.systems.forEach(s=>{
            const item=document.createElement('div');
            item.className='sys-item';
            item.innerHTML='<span class="sys-name">'+s.name+'</span><span class="sys-desc">'+s.desc+'</span>';
            sysEl.appendChild(item);
        });
    }

    // Right panel: INT cards
    const intOrder=['comint','elint','fisint','masint','imint','geoint','tempest'];
    intOrder.forEach(k=>{
        const card=document.getElementById('int-'+k);
        const body=document.getElementById('intBody-'+k);
        const intData=d&&d.intels&&d.intels[k];
        const isActive=intData&&intData.active;

        card.classList.toggle('active',!!isActive);
        card.classList.toggle('inactive',!isActive);

        if(isActive){
            let html=intData.body;
            if(intData.example){
                html+='<div class="int-example"><div class="ex-label">Example</div>'+intData.example+'</div>';
            }
            body.innerHTML=html;
        } else {
            body.innerHTML='<span class="inactive-msg">Not active at this frequency</span>';
        }
    });
}

let focusedInt = null;

// Build reverse map: { intId: [bandId, bandId, ...] }
function buildReverseMap(){
    const map = {};
    const intOrder=['comint','elint','fisint','masint','imint','geoint','tempest'];
    intOrder.forEach(k => { map[k] = []; });
    BANDS.forEach(b => {
        const d = DATA[b.id];
        if(!d || !d.intels) return;
        intOrder.forEach(k => {
            if(d.intels[k] && d.intels[k].active) map[k].push(b.id);
        });
    });
    return map;
}

const INT_BANDS = buildReverseMap();

function enterIntFocus(intId){
    if(focusedInt === intId){ exitIntFocus(); return; } // toggle off
    focusedInt = intId;

    const activeBands = INT_BANDS[intId] || [];
    const info = INTELS[intId];

    // Find all INTs that share any of these bands (associated INTs)
    const associatedInts = new Set();
    activeBands.forEach(bandId => {
        const d = DATA[bandId];
        if(!d || !d.intels) return;
        Object.keys(d.intels).forEach(k => {
            if(d.intels[k] && d.intels[k].active && k !== intId) associatedInts.add(k);
        });
    });

    // Update spectrum bar: highlight active bands, dim others
    document.querySelectorAll('.seg').forEach(s => {
        s.classList.remove('dim','focus-highlight','focus-dim');
        if(activeBands.includes(s.dataset.band)){
            s.classList.add('focus-highlight');
        } else {
            s.classList.add('focus-dim');
        }
    });

    // Update perception strip
    document.querySelectorAll('.p-seg').forEach(s => {
        const segBands = s.dataset.bands.split(',');
        s.classList.remove('dim','focus-highlight','focus-dim');
        if(segBands.some(b => activeBands.includes(b))){
            s.classList.add('focus-highlight');
        } else {
            s.classList.add('focus-dim');
        }
    });

    // Hide cursor line in focus mode
    document.getElementById('cursorLine').style.opacity = '0';

    // Update INT cards
    const intOrder=['comint','elint','fisint','masint','imint','geoint','tempest'];
    intOrder.forEach(k => {
        const card = document.getElementById('int-'+k);
        const body = document.getElementById('intBody-'+k);
        card.classList.remove('active','inactive','selected','associated','focus-inactive');

        if(k === intId){
            card.classList.add('selected');
            // Show summary of all bands this INT covers
            let html = '<div style="font-size:10px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em">Active across '+activeBands.length+' band'+(activeBands.length!==1?'s':'')+':</div>';
            activeBands.forEach(bandId => {
                const band = BANDS.find(b=>b.id===bandId);
                const d = DATA[bandId];
                const intData = d && d.intels && d.intels[k];
                if(intData){
                    html += '<div style="margin-bottom:6px;padding-left:8px;border-left:3px solid '+band.color+'">';
                    html += '<div style="font-size:10px;font-weight:700;color:'+band.color+';margin-bottom:2px">'+band.name+'</div>';
                    html += '<div>'+intData.body+'</div>';
                    html += '</div>';
                }
            });
            body.innerHTML = html;
        } else if(associatedInts.has(k)){
            card.classList.add('associated');
            // Show which shared bands
            const sharedBands = INT_BANDS[k].filter(b => activeBands.includes(b));
            const sharedNames = sharedBands.map(b => BANDS.find(x=>x.id===b).name);
            body.innerHTML = '<div style="font-size:10px;color:var(--text2);margin-bottom:4px">Also active in: <strong>'+sharedNames.join(', ')+'</strong></div>';
            // Show brief per shared band
            sharedBands.forEach(bandId => {
                const band = BANDS.find(b=>b.id===bandId);
                const d = DATA[bandId];
                const intData = d && d.intels && d.intels[k];
                if(intData){
                    body.innerHTML += '<div style="margin-bottom:4px;padding-left:6px;border-left:2px solid '+band.color+';font-size:10px">'+intData.body+'</div>';
                }
            });
        } else {
            card.classList.add('focus-inactive');
            body.innerHTML = '<span class="inactive-msg">No overlap with '+info.title+'</span>';
        }
    });

    // Show focus banner
    const banner = document.getElementById('focusBanner');
    banner.classList.add('visible');
    document.getElementById('fbDot').style.background = info.dot;
    document.getElementById('fbTitle').textContent = info.title;
    document.getElementById('fbSub').textContent = info.sub;
    document.getElementById('fbBands').textContent = activeBands.map(b=>BANDS.find(x=>x.id===b).name).join(' · ');

    // Update left panel with aggregate info for this INT
    const propEl = document.getElementById('propType');
    const penEl = document.getElementById('propPen');
    const bwEl = document.getElementById('propBw');
    propEl.textContent = activeBands.length + ' bands: ' + activeBands.map(b=>BANDS.find(x=>x.id===b).name).join(', ');
    penEl.textContent = 'Varies by band';
    bwEl.textContent = 'Varies by band';

    // Aggregate systems across all active bands
    const sysEl = document.getElementById('systemsList');
    sysEl.innerHTML = '';
    activeBands.forEach(bandId => {
        const d = DATA[bandId];
        const band = BANDS.find(b=>b.id===bandId);
        if(d && d.systems){
            d.systems.forEach(s => {
                const item = document.createElement('div');
                item.className = 'sys-item';
                item.innerHTML = '<span class="sys-name" style="color:'+band.color+'">'+s.name+'</span><span class="sys-desc">'+s.desc+'</span>';
                sysEl.appendChild(item);
            });
        }
    });

    // Human perception: show overview
    document.getElementById('humanSense').innerHTML =
        '<div style="color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px">'+info.title+' Spectrum Coverage</div>'+
        '<div style="font-size:11px;line-height:1.5">'+info.title+' ('+info.sub+') operates across <strong>'+activeBands.length+' band'+(activeBands.length!==1?'s':'')+'</strong> of the electromagnetic spectrum, from <strong>'+BANDS.find(b=>b.id===activeBands[0]).name+'</strong> through <strong>'+BANDS.find(b=>b.id===activeBands[activeBands.length-1]).name+'</strong>.</div>';
}

function exitIntFocus(){
    focusedInt = null;

    // Remove all focus classes
    document.querySelectorAll('.seg').forEach(s => s.classList.remove('focus-highlight','focus-dim'));
    document.querySelectorAll('.p-seg').forEach(s => s.classList.remove('focus-highlight','focus-dim'));

    // Show cursor line
    document.getElementById('cursorLine').style.opacity = '1';

    // Hide banner
    document.getElementById('focusBanner').classList.remove('visible');

    // Re-run normal display from last known position
    updateDisplay(lastFreq || 76);
}

// ════════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════════

let lastFreq = 76;

function attachEventListeners(){
    const track=document.getElementById('spectrumTrack');
    let dragging=false;

    function handle(e){
        if(focusedInt) exitIntFocus(); // exit focus mode when touching spectrum
        const rect=track.getBoundingClientRect();
        const x=e.touches?e.touches[0].clientX:e.clientX;
        const frac=Math.max(0,Math.min(1,(x-rect.left)/rect.width));
        const freq = freqFromPosition(frac);
        lastFreq = freq;
        updateDisplay(freq);
    }

    track.addEventListener('mousedown',e=>{dragging=true;handle(e)});
    document.addEventListener('mousemove',e=>{if(dragging)handle(e)});
    document.addEventListener('mouseup',()=>{dragging=false});
    track.addEventListener('touchstart',e=>{dragging=true;handle(e)},{passive:true});
    document.addEventListener('touchmove',e=>{if(dragging)handle(e)},{passive:true});
    document.addEventListener('touchend',()=>{dragging=false});

    // Close button on focus banner
    document.getElementById('fbClose').addEventListener('click', exitIntFocus);
}

function attachIntClickHandlers(){
    const intOrder=['comint','elint','fisint','masint','imint','geoint','tempest'];
    intOrder.forEach(k => {
        document.getElementById('int-'+k).addEventListener('click', (e) => {
            e.stopPropagation();
            enterIntFocus(k);
        });
    });
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════

function init(){
    buildSpectrumBar();
    buildPerceptionStrip();
    buildIntGrid();
    attachEventListeners();
    attachIntClickHandlers();
    updateDisplay(76); // Start at ELF
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
