<script>
// ── Map Setup ──
const map = L.map('map', {
  center: [20, 0],
  zoom: 3,
  minZoom: 2,
  maxZoom: 18,
  zoomControl: true,
  worldCopyJump: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// ── Icon Factory ──
function makeIcon(color, size = 12) {
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      width:${size}px; height:${size}px; border-radius:50%;
      background:${color}; border:2px solid #fff;
      box-shadow: 0 0 8px ${color}, 0 0 16px ${color}44;
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2 - 4]
  });
}

function makeDiamond(color, size = 14) {
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      width:${size}px; height:${size}px;
      background:${color}; border:2px solid #fff;
      transform: rotate(45deg);
      box-shadow: 0 0 8px ${color}, 0 0 16px ${color}44;
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2 - 4]
  });
}

function makeTriangle(color, size = 14) {
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      width:0; height:0;
      border-left:${size/2}px solid transparent;
      border-right:${size/2}px solid transparent;
      border-bottom:${size}px solid ${color};
      filter: drop-shadow(0 0 6px ${color});
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size],
    popupAnchor: [0, -size - 2]
  });
}

function makeStar(color, size = 16) {
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      font-size:${size}px; color:${color}; line-height:1;
      text-shadow: 0 0 8px ${color}, 0 0 16px ${color}44;
    ">★</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2 - 2]
  });
}

    'Atlantic': '#42a5f5',
    'Middle East': '#ffa726',
    'Europe': '#7986cb',
    'South America': '#81c784',
    'Africa': '#a1887f',
    'Global': '#b0bec5',
    'Arctic': '#80deea',
    'Cyber': '#ea80fc',
    'Space': '#b388ff',
    'Nuclear': '#ff8a80',
    'SOF': '#ffcc02',
    'Logistics': '#bcaaa4',
    'Indo-Pacific': '#26c6da',
    'SLOCs': '#66bb6a',
    'Energy': '#ffb74d',
    'Trade': '#aed581',
    'Law Enforcement': '#f48fb1',
    'Homeland Security': '#ef5350',
    'Diplomatic': '#4dd0e1',
  };

  let tags = (d.tags || []).map(t => {
    const bg = tagColors[t] || '#607d8b';
    return `<span class="popup-tag" style="background:${bg}33;color:${bg};border:1px solid ${bg}66;">${t}</span>`;
  }).join('');

  return `
    <div class="popup-title">${d.name}</div>
    <div class="popup-cat">${d.category}</div>
    <div class="popup-desc">${d.desc}</div>
    <div style="margin-top:6px;">${tags}</div>
  `;
}

// ── Layer Groups ──
const layers = {
  'cocom': {},
  'fleet': {},
  'chokepoint': {},
  'intel': {}
};

function addMarkers(data, icon, groupKey, listId) {
  const listEl = document.getElementById(listId);
  data.forEach(d => {
    const marker = L.marker([d.lat, d.lng], { icon })
      .bindPopup(buildPopup(d), { maxWidth: 320 })
      .addTo(map);
    const id = d.name.replace(/[^a-zA-Z0-9]/g, '_');
    layers[groupKey][id] = marker;

    // Add to sidebar list
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked data-group="${groupKey}" data-id="${id}" /> ${d.name}`;
    listEl.appendChild(label);
  });
}

addMarkers(geoCocoms, makeStar('#ff6e40', 18), 'cocom', 'cocom-list');
addMarkers(funcCocoms, makeStar('#ff6e40', 16), 'cocom', 'cocom-list');
addMarkers(navyFleets, makeIcon('#4fc3f7', 13), 'fleet', 'fleet-list');
addMarkers(chokepoints, makeTriangle('#66bb6a', 14), 'chokepoint', 'chokepoint-list');
addMarkers(intelAgencies, makeIcon('#ce93d8', 11), 'intel', 'intel-list');

// ── COCOM AOR Boundary Overlays ──
const aorStyles = {
  USINDOPACOM: { color: '#ff5252', dashArray: '8,6' },
  USEUCOM:     { color: '#7986cb', dashArray: '8,6' },
  USCENTCOM:   { color: '#ffa726', dashArray: '8,6' },
  USAFRICOM:   { color: '#a1887f', dashArray: '8,6' },
  USNORTHCOM:  { color: '#90caf9', dashArray: '8,6' },
  USSOUTHCOM:  { color: '#81c784', dashArray: '8,6' }
};

// Simplified AOR boundary polygons (approximate)
const aorBounds = {
  USINDOPACOM: [
    [90, 68], [90, -180], [90, -125], [33, -125], [10, -125],
    [-90, -125], [-90, -180], [-90, 68], [-45, 68], [0, 68],
    [30, 68], [42, 68], [90, 68]
  ],
  USEUCOM: [
    [90, -15], [90, 68], [42, 68], [30, 44], [28, 42],
    [35, 25], [30, 10], [38, -10], [47, -15], [60, -15], [90, -15]
  ],
  USCENTCOM: [
    [42, 68], [42, 44], [30, 44], [28, 42], [12, 43],
    [12, 50], [-15, 68], [0, 68], [30, 68], [42, 68]
  ],
  USAFRICOM: [
    [38, -15], [30, 10], [35, 25], [28, 42], [12, 43],
    [-15, 50], [-15, 68], [-45, 68], [-45, -15], [38, -15]
  ],
  USSOUTHCOM: [
    [20, -45], [20, -100], [10, -100], [10, -125],
    [-90, -125], [-90, -45], [20, -45]
  ],
  USNORTHCOM: [
    [90, -15], [60, -15], [47, -15], [38, -15],
    [20, -45], [20, -100], [10, -100], [33, -125],
    [90, -125], [90, -15]
  ]
};

const aorLayers = {};
Object.keys(aorBounds).forEach(cmd => {
  const style = aorStyles[cmd] || { color: '#fff', dashArray: '6,4' };
  aorLayers[cmd] = L.polygon(aorBounds[cmd], {
    color: style.color,
    fillColor: style.color,
    fillOpacity: 0.04,
    weight: 1.5,
    dashArray: style.dashArray,
    interactive: false
  }).addTo(map);
});

// ── Checkbox Logic ──
document.addEventListener('change', function(e) {
  const el = e.target;

  // Master toggle
  if (el.dataset.master) {
    const group = el.dataset.master;
    const checked = el.checked;
    document.querySelectorAll(`[data-group="${group}"]`).forEach(cb => {
      cb.checked = checked;
      const marker = layers[group][cb.dataset.id];
      if (marker) { checked ? marker.addTo(map) : map.removeLayer(marker); }
    });
    // Toggle AOR for COCOMs
    if (group === 'cocom') {
      Object.values(aorLayers).forEach(l => checked ? l.addTo(map) : map.removeLayer(l));
    }
    return;
  }

  // Individual toggle
  if (el.dataset.group && el.dataset.id) {
    const marker = layers[el.dataset.group][el.dataset.id];
    if (marker) { el.checked ? marker.addTo(map) : map.removeLayer(marker); }
  }
});

// ── Search ──
document.getElementById('search-box').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const allCheckboxes = document.querySelectorAll('#control-panel input[data-group]');

  allCheckboxes.forEach(cb => {
    const lbl = cb.parentElement;
    const name = lbl.textContent.toLowerCase();
    if (!q || name.includes(q)) {
      lbl.style.display = '';
    } else {
      lbl.style.display = 'none';
    }
  });
});

// ── Click-to-fly on sidebar items ──
document.querySelectorAll('#control-panel label:not(.master-toggle)').forEach(label => {
  label.addEventListener('dblclick', function() {
    const cb = this.querySelector('input[data-group]');
    if (!cb) return;
    const marker = layers[cb.dataset.group]?.[cb.dataset.id];
    if (marker) {
      map.flyTo(marker.getLatLng(), 8, { duration: 1.2 });
      marker.openPopup();
    }
  });
});

// ── Info tooltip ──
const infoDiv = L.control({position: 'bottomright'});
infoDiv.onAdd = function() {
  const div = L.DomUtil.create('div');
  div.style.cssText = 'background:rgba(10,14,26,0.9);padding:8px 12px;border-radius:8px;border:1px solid #2a3a5c;font-size:11px;color:#8aa4cf;';
  div.innerHTML = '💡 Double-click sidebar items to fly to location';
  return div;
};
infoDiv.addTo(map);
