<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNIOBC TPET I Quiz Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge-s1 { background-color: #1e40af; }
        .badge-s2 { background-color: #6b21a8; }
        .badge-s3 { background-color: #0d7377; }
        .badge-s4 { background-color: #b45309; }
        .badge-s5 { background-color: #475569; }
        .badge-s6 { background-color: #16a34a; }

        .section-indicator {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            display: inline-block;
        }

        .progress-bar {
            height: 8px;
            background-color: #334155;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 100%);
            transition: width 0.3s ease;
        }

        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .button-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
        }

        .button-secondary {
            background-color: #334155;
            color: #e2e8f0;
            padding: 0.75rem 1.5rem;
            border: 1px solid #475569;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .button-secondary:hover {
            background-color: #475569;
            border-color: #64748b;
        }

        .button-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .textarea {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
        }

        .textarea:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .checkbox {
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .matched-concept {
            background-color: #064e3b;
            border-left: 3px solid #10b981;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .missing-concept {
            background-color: #7f1d1d;
            border-left: 3px solid #ef4444;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 4px;
            font-size: 0.875rem;
        }

        .grade-button {
            padding: 0.75rem 1.5rem;
            margin: 0.5rem;
            border: 2px solid #334155;
            background-color: transparent;
            color: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .grade-button:hover {
            border-color: #60a5fa;
            color: #60a5fa;
        }

        .grade-button.got-it {
            border-color: #10b981;
            color: #10b981;
        }

        .grade-button.partial {
            border-color: #f59e0b;
            color: #f59e0b;
        }

        .grade-button.missed {
            border-color: #ef4444;
            color: #ef4444;
        }

        .metric-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            margin: 0.5rem;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-label {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        .weak-area {
            background-color: #7f1d1d;
            border-left: 4px solid #ef4444;
            padding: 1rem;
            margin: 0.75rem 0;
            border-radius: 4px;
        }

        .recommendation {
            background-color: #064e3b;
            border-left: 4px solid #10b981;
            padding: 1rem;
            margin: 0.75rem 0;
            border-radius: 4px;
        }

        .header {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #334155;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .svg-map {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3b82f6;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .answer-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
        }

        .answer-section {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 1rem;
        }

        .answer-section h4 {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .answer-section p {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .coverage-bar {
            height: 24px;
            background-color: #334155;
            border-radius: 12px;
            margin: 1rem 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
        }

        .coverage-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #06b6d4 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coverage-text {
            font-size: 0.75rem;
            font-weight: bold;
            color: #0f172a;
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .answer-comparison {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>

        const QUESTIONS = [{"section": 1, "section_name": "Intelligence Fundamentals", "question": "Define intelligence as described in JP 1-02 and explain how it differs from information.", "answer": "Intelligence is the product resulting from the collection, processing, integration, evaluation, analysis, and interpretation of available information concerning foreign nations, hostile or potentially hostile forces, or areas of actual or potential operations. Information is data placed into context, but intelligence goes further by applying analysis and interpretation to answer a specific requirement and support decision-making.", "keywords": ["collection", "processing", "analysis", "interpretation", "decision"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the distinction between data, information, and intelligence, and why this matters to a commander.", "answer": "Data are raw, individual facts or observations. Information is data organized into a meaningful form that can answer basic questions. Intelligence is information that has been analyzed, evaluated, and interpreted to support specific decisions. This distinction matters because commanders need actionable insight, not raw volume — intelligence reduces uncertainty and enables advantaged decision-making.", "keywords": ["data", "information", "intelligence", "analysis", "decision", "uncertainty"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the six steps of the intelligence cycle? Describe each briefly.", "answer": "The six steps are: (1) Planning & Direction — identifying and prioritizing requirements; (2) Collection — acquiring data via appropriate assets; (3) Processing & Exploitation — converting raw data into usable forms; (4) Analysis & Production — integrating and interpreting information into intelligence products; (5) Dissemination & Integration — delivering intelligence to consumers; (6) Evaluation & Feedback — assessing whether the cycle met requirements.", "keywords": ["planning", "collection", "processing", "analysis", "dissemination", "evaluation", "feedback"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the role of Planning and Direction in the intelligence cycle?", "answer": "Planning and Direction is the first step where intelligence requirements are identified, prioritized, and translated into collection and production tasks. It includes submitting RFIs to external entities and tasking subordinate elements. The Director of DIA serves as the Defense Collection Manager.", "keywords": ["requirements", "prioritized", "tasking", "collection", "DIA"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Which step of the intelligence cycle involves translating a foreign radio intercept into something analysts can use?", "answer": "Processing and Exploitation. This step converts raw data into usable forms through activities like first-phase imagery exploitation, data conversion, document translation, and signal decryption.", "keywords": ["processing", "exploitation", "translation", "decryption", "raw data"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Define CCIRs and explain who owns them.", "answer": "Commander's Critical Information Requirements (CCIRs) are the elements of information the commander identifies as critical to timely decision-making. They belong exclusively to the commander, are situation-dependent, focused on predictable events, time-sensitive, and the list is normally short and adjusted throughout operations.", "keywords": ["commander", "critical", "information", "decision", "time-sensitive"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the relationship between PIRs and EEIs.", "answer": "Priority Intelligence Requirements (PIRs) focus on the adversary and operational environment and drive ISR requirements. Essential Elements of Information (EEIs) refine PIRs into smaller, answerable questions that can be directly collected against. The hierarchy flows from CCIRs to PIRs to EEIs — decomposing broad commander needs into collectible indicators.", "keywords": ["PIR", "EEI", "adversary", "collection", "requirements", "hierarchy"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are FFIRs and how do they differ from PIRs?", "answer": "Friendly Force Information Requirements (FFIRs) focus on information the JFC must have to assess the status of friendly forces and supporting capabilities. Unlike PIRs which focus outward on the adversary and environment, FFIRs focus inward on friendly force readiness, posture, and vulnerabilities. J-5 consolidates FFIR nominations.", "keywords": ["friendly force", "status", "readiness", "J-5", "PIR"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Name and briefly describe the three levels of intelligence.", "answer": "Strategic intelligence supports national-level policy and senior military decisions, focusing on long-term capabilities and intentions (months to years). Operational intelligence links strategy to campaigns at the combatant/component command level, focusing on theater-level military capabilities (days to weeks). Tactical intelligence supports unit commanders in battles and engagements with immediate threat data (seconds to days).", "keywords": ["strategic", "operational", "tactical", "national", "theater", "unit"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the most common exam error regarding the three levels of intelligence?", "answer": "The most common error is collapsing the three levels into time horizon alone. While time matters, the better distinction is decision level and scope of effect. Strategic asks about long-term aims and capabilities, operational asks about theater arrangement and campaign shaping, and tactical asks about the immediate threat and next action.", "keywords": ["time horizon", "decision level", "scope", "strategic", "operational", "tactical"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "List the 10 Principles of Intelligence.", "answer": "The ten principles are: Perspective (think like the adversary), Synchronization (sync with plans/ops), Integrity (intellectual honesty), Unity of Effort (cooperate), Prioritization (based on commander's guidance), Excellence (highest standards), Prediction (accept risk of predicting), Agility (flexible/adaptive), Collaboration (leverage diverse resources), and Fusion (exploit all sources).", "keywords": ["perspective", "synchronization", "integrity", "unity", "prioritization", "excellence", "prediction", "agility", "collaboration", "fusion"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the principle of 'Prediction' in the context of intelligence.", "answer": "The Prediction principle states that intelligence professionals must accept the risk of predicting adversary intentions. Intelligence is most valuable when it anticipates future actions, even though predictions carry inherent uncertainty. Failing to predict due to fear of being wrong is itself a failure of the intelligence mission.", "keywords": ["prediction", "risk", "adversary", "intentions", "uncertainty"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What does 'Fusion' mean as a principle of intelligence?", "answer": "Fusion means exploiting all sources of information and intelligence. No single discipline or source provides a complete picture. Effective intelligence requires integrating multiple collection disciplines and analytical perspectives to produce comprehensive, reliable assessments.", "keywords": ["fusion", "all sources", "integrate", "disciplines", "comprehensive"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is ICD 203 and what does it govern?", "answer": "ICD 203 governs the production and evaluation of analytic products within the Intelligence Community. It establishes five overarching standards and nine analytic tradecraft standards to ensure intelligence products are objective, independent, timely, and based on all available sources.", "keywords": ["ICD 203", "analytic", "standards", "production", "evaluation"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "List the five analytic standards under ICD 203.", "answer": "The five standards are: (1) Objective — mitigate bias and consider alternatives; (2) Independent of Political Consideration — not shaped for policy advocacy; (3) Timely — disseminated in time to be actionable; (4) Based on All Available Sources — address critical gaps; (5) Implements Nine Analytic Tradecraft Standards including sourcing, uncertainty, distinctions, alternatives, relevance, argumentation, analytic line, accuracy, and visualization.", "keywords": ["objective", "independent", "timely", "all available sources", "tradecraft"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "How does 'confidence' differ from 'likelihood' in intelligence analysis?", "answer": "Confidence describes how well-supported a judgment is based on the number of key assumptions, credibility/diversity of sourcing, and strength of argumentation. Likelihood describes the probability of an event occurring. They are separate dimensions — you can have high confidence in a low-likelihood assessment. They should not be mixed in the same sentence.", "keywords": ["confidence", "likelihood", "probability", "sourcing", "assumptions"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Provide the probability ranges for the terms 'Unlikely,' 'Roughly Even Chance,' and 'Very Likely.'", "answer": "Unlikely/Improbable corresponds to 20-45%. Roughly Even Chance/Odds corresponds to 45-55%. Very Likely/Highly Probable corresponds to 80-95%. These terms from the ICD 203 probability scale should not be mixed across rows.", "keywords": ["unlikely", "20-45", "even chance", "45-55", "very likely", "80-95"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Define confirmation bias and explain why it is dangerous in intelligence analysis.", "answer": "Confirmation bias is the tendency to accept information that aligns with existing views while discounting contradictory evidence. It is dangerous because it can cause analysts to miss critical indicators, ignore alternative explanations, and produce assessments that reinforce rather than challenge existing assumptions, potentially leading to intelligence failures.", "keywords": ["confirmation bias", "existing views", "contradictory", "assumptions", "failure"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is mirror imaging and how does it affect intelligence analysis?", "answer": "Mirror imaging is assuming the adversary shares our goals, motivations, and decision-making processes — 'they are just like us.' This is dangerous because adversaries may have entirely different cultural frameworks, risk tolerances, strategic calculus, and operational logic. It can lead to fundamentally flawed predictions of adversary behavior.", "keywords": ["mirror imaging", "adversary", "goals", "motivations", "cultural"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain groupthink and its impact on intelligence products.", "answer": "Groupthink is the natural impetus to arrive at consensus without rigorous examination of alternatives. It suppresses dissent, discourages consideration of contrary evidence, and produces artificially confident assessments. It contributed to several notable intelligence failures and is countered by structured techniques like Devil's Advocacy and Team A/Team B.", "keywords": ["groupthink", "consensus", "dissent", "alternatives", "Devil's Advocacy"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is anchoring bias?", "answer": "Anchoring is over-reliance on initial assessments or information as starting points for subsequent analysis. Analysts may adjust incrementally from an initial anchor rather than conducting fresh analysis, causing them to under-weight new information that contradicts the original assessment.", "keywords": ["anchoring", "initial", "starting point", "adjust", "under-weight"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Define clientism in intelligence analysis.", "answer": "Clientism is the loss of analytical sharpness after working a problem set for too long. Analysts become too close to their subject matter or consumers, potentially tailoring assessments to what the consumer wants to hear rather than maintaining objective, independent judgment.", "keywords": ["clientism", "analytical sharpness", "problem set", "consumer", "independent"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is layering as a cognitive bias?", "answer": "Layering is using assumptions as the factual basis for additional assumptions, building analytical conclusions on unverified foundations. Each layer of assumption compounds uncertainty, and the resulting analysis may appear well-reasoned while resting on an unstable base.", "keywords": ["layering", "assumptions", "factual basis", "uncertainty", "foundations"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Describe Analysis of Competing Hypotheses (ACH) and its benefits.", "answer": "ACH identifies a broad range of hypotheses and subjects them to structured, rigorous review by evaluating evidence against each hypothesis rather than seeking confirming evidence for a preferred one. Benefits include auditability, overcoming cognitive biases, and logical rigor. Disadvantages include being time-consuming and potentially problematic for highly complex projects.", "keywords": ["ACH", "hypotheses", "structured", "evidence", "bias", "auditable"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the three categories of Structured Analytic Techniques?", "answer": "The three categories are: Diagnostic Techniques (Key Assumptions Check, Quality of Information Check, Indicators of Change, ACH), Contrarian Techniques (Devil's Advocacy, Team A/Team B, High-Impact/Low-Probability, What If Analysis), and Imaginative Thinking Techniques (Brainstorming, Outside-In Thinking, Red Analysis, Alternative Futures).", "keywords": ["diagnostic", "contrarian", "imaginative", "ACH", "Devil's Advocacy", "brainstorming"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the three classification levels and their associated damage from unauthorized disclosure?", "answer": "TOP SECRET (TS) — unauthorized disclosure could cause exceptionally grave damage to national security. SECRET (S) — unauthorized disclosure could cause serious damage. CONFIDENTIAL (C) — unauthorized disclosure could cause damage. The higher the classification, the graver the potential harm and the stricter the handling requirements.", "keywords": ["top secret", "secret", "confidential", "exceptionally grave", "serious", "damage"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the difference between original and derivative classification.", "answer": "Original classification is the initial determination by an authorized authority that information requires protection. Derivative classification is incorporating, paraphrasing, restating, or generating in new form already-classified information into a new document. Most classification in the IC is derivative.", "keywords": ["original", "derivative", "authorized", "incorporating", "new form"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the banner marking colors for each classification level?", "answer": "TOP SECRET/SCI: Yellow. TOP SECRET: Orange. SECRET: Red. CONFIDENTIAL: Blue. UNCLASSIFIED: Green. CUI: Purple.", "keywords": ["yellow", "orange", "red", "blue", "green", "purple"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is NOFORN and when is it used?", "answer": "NOFORN (NF) means 'Not Releasable to Foreign Nationals.' It is a dissemination control marking indicating the information cannot be shared with citizens of other countries, regardless of their security clearance level or alliance status.", "keywords": ["NOFORN", "foreign nationals", "dissemination", "control", "releasable"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the ORCON dissemination control marking.", "answer": "ORCON (OC) stands for Originator Controlled. It means the information can only be disseminated with the consent of the originating agency. This gives the producing organization control over who sees the intelligence, typically to protect sensitive sources and methods.", "keywords": ["ORCON", "originator", "controlled", "consent", "agency", "sources"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the four SCI control markings covered in the course?", "answer": "HCS (HUMINT Control System) for sensitive human intelligence, SI (Special Intelligence) for foreign communications and overhead collection, TK (Talent Keyhole) for space-based collection systems, and GAMMA (G) which is a sub-control marking for particularly sensitive SIGINT.", "keywords": ["HCS", "SI", "TK", "GAMMA", "HUMINT", "space-based"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the correct marking format for classified documents?", "answer": "The format is: CLASSIFICATION//SCI CONTROLS//DISSEMINATION CONTROLS. For example: SECRET//SI//NOFORN or TOP SECRET//HCS/SI/TK//ORCON,NOFORN.", "keywords": ["classification", "SCI", "dissemination", "format", "double slash"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What three requirements must be met for access to classified information?", "answer": "Access requires: (1) Proper security clearance at the appropriate level, (2) Need-to-know — a valid requirement for the information based on one's duties, and (3) Indoctrination ('read in') for any applicable SCI or SAP programs.", "keywords": ["clearance", "need-to-know", "indoctrination", "read in", "access"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What did the National Security Act of 1947 create?", "answer": "The NSA of 1947 created the Joint Chiefs of Staff, the Department of Defense (unifying the Departments of Army, Navy, and Air Force), retained the Marine Corps under the Department of the Navy, created the Central Intelligence Agency, and created the National Security Council.", "keywords": ["1947", "JCS", "DoD", "CIA", "NSC", "Marine Corps"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the key provisions of the War Powers Act of 1973?", "answer": "The War Powers Act places Congressional limits on presidential military powers. The President must notify Congress within 48 hours of committing armed forces. Forces must be withdrawn within a 90-day window (60 days of active operations plus 30 days for withdrawal) unless Congress authorizes continued use.", "keywords": ["War Powers", "1973", "48 hours", "90-day", "60 days", "30 days", "Congress"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What did the Goldwater-Nichols Act of 1986 accomplish?", "answer": "Goldwater-Nichols was the largest DoD reorganization since 1947. It clarified the chain of command (POTUS → SECDEF → CCDRs), limited Service Chiefs to man/train/equip functions (not operational command), elevated CJCS to principal military advisor, created the VCJCS position, and mandated joint doctrine and officer requirements.", "keywords": ["Goldwater-Nichols", "1986", "chain of command", "SECDEF", "CCDRs", "CJCS", "joint"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the difference between Title 10 and Title 50 of the US Code.", "answer": "Title 10 USC governs the organization and management of the Armed Forces, including command relationships, the UCMJ, and military operations. Title 50 USC governs war and national defense, including intelligence and counterintelligence activities, and governs agencies like the CIA and NSA. A useful mnemonic: '10 fingers fight, 50 states spy.'", "keywords": ["Title 10", "Title 50", "Armed Forces", "intelligence", "CIA", "NSA"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Who are the statutory members of the National Security Council?", "answer": "Statutory members include: POTUS, Vice President, Secretary of State, Secretary of the Treasury, Secretary of Defense, Secretary of Energy, Attorney General, and Secretary of Homeland Security. Statutory advisors include the DNI and CJCS.", "keywords": ["NSC", "POTUS", "VP", "SecState", "SecDef", "DNI", "CJCS"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain ADCON, OPCON, and TACON.", "answer": "ADCON (Administrative Control) is authority over administration and support. OPCON (Operational Control) is authority to organize, employ, assign tasks, and designate objectives. TACON (Tactical Control) is limited authority over detailed movements and maneuvers within an operational area. OPCON is broader than TACON.", "keywords": ["ADCON", "OPCON", "TACON", "administrative", "operational", "tactical"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the hierarchy of national security policy documents?", "answer": "The hierarchy flows: NSS (National Security Strategy, written by POTUS every 4-8 years) → NDS (National Defense Strategy, written by SECDEF) → NMS (National Military Strategy, written by CJCS every 2-4 years) → Joint Doctrine (JP series, updated routinely by JCS). Each successive document operationalizes the one above it.", "keywords": ["NSS", "NDS", "NMS", "POTUS", "SECDEF", "CJCS", "hierarchy"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the instruments of national power (DIME)?", "answer": "DIME stands for Diplomacy, Information, Military, and Economy — the four instruments of national power available to achieve national security objectives. Every national security decision employs some combination of these instruments. The NSS articulates how they are applied.", "keywords": ["DIME", "diplomacy", "information", "military", "economy", "national power"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "How many agencies are in the Intelligence Community and name five key ones.", "answer": "There are 18 IC agencies. Key ones include: ODNI (coordinates IC, manages NIP, produces PDB), CIA (HUMINT, foreign intelligence), DIA (military intelligence), NSA/CSS (SIGINT, cybersecurity), NGA (GEOINT), NRO (intelligence satellites), and ONI (maritime intelligence).", "keywords": ["18", "ODNI", "CIA", "DIA", "NSA", "NGA", "NRO"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the difference between the NIP and the MIP?", "answer": "The NIP (National Intelligence Program) is managed through ODNI and funds national-level intelligence activities. The MIP (Military Intelligence Program) is managed through military departments and funds tactical and operational military intelligence. The NIP is sometimes called the 'Black Budget.'", "keywords": ["NIP", "MIP", "ODNI", "military", "national", "budget"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Define Information Operations (IO) per JP 3-13.", "answer": "IO is the integrated employment of information-related capabilities to influence, disrupt, corrupt, or usurp adversary decision-making while protecting our own. It operates across three dimensions of the information environment: physical, cognitive, and informational.", "keywords": ["IO", "influence", "disrupt", "adversary", "decision-making", "information environment"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the five core IO capabilities?", "answer": "The five core capabilities are: MILDEC (Military Deception), MISO (Military Information Support Operations), OPSEC (Operations Security), Electronic Warfare (EW with EA/EP/ES), and Cyberspace Operations (OCO/DCO/DODIN).", "keywords": ["MILDEC", "MISO", "OPSEC", "EW", "cyberspace"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "List the five steps of OPSEC.", "answer": "(1) Identify Critical Information, (2) Analyze Threats, (3) Analyze Vulnerabilities, (4) Assess Risk, (5) Apply Countermeasures. River City procedures control outgoing communications as an OPSEC measure.", "keywords": ["identify", "threats", "vulnerabilities", "risk", "countermeasures"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the three subdivisions of Electronic Warfare?", "answer": "EA (Electronic Attack) — jamming, anti-radiation weapons; EP (Electronic Protect) — flare rejection, spread spectrum, EMCON; ES (Electronic Warfare Support) — intercept, identify, and locate electromagnetic sources for threat recognition and targeting.", "keywords": ["EA", "EP", "ES", "jamming", "protect", "intercept"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Describe the EMCON levels from least to most restrictive.", "answer": "Delta: No restrictions (normal operations). Charlie: Mission-essential equipment only; unique sensors off. Bravo: Further limited emissions; some comms allowed. Alpha: No emissions permitted (complete electromagnetic silence).", "keywords": ["Delta", "Charlie", "Bravo", "Alpha", "emissions", "silence"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What do the INFOCON levels represent?", "answer": "INFOCON 5: No significant threats. INFOCON 4: Heightened threat of attack. INFOCON 3: Specific system/location may be targeted. INFOCON 2: Limited attack launched. INFOCON 1: Successful attack with definite mission effect. Lower numbers indicate more severe conditions.", "keywords": ["INFOCON", "5", "4", "3", "2", "1", "threat", "attack"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is MILDEC and what are its techniques?", "answer": "MILDEC (Military Deception) consists of actions to mislead adversary decision-makers. Categories include Joint, DISO, and TAC-D deception. Techniques include Feints (limited attack on an objective other than the main), Demonstrations (show of force without engagement), Ruses (deliberate exposure of false information), and Displays (static portrayal of forces).", "keywords": ["MILDEC", "deception", "feints", "demonstrations", "ruses", "displays"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is MISO and what does it support?", "answer": "MISO (Military Information Support Operations) involves planned operations to influence foreign audiences' emotions, motives, reasoning, and behavior. It supports combat operations, peacetime shaping, civil authorities, and special operations forces. Formerly known as PSYOP.", "keywords": ["MISO", "influence", "foreign audiences", "emotions", "behavior", "PSYOP"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Describe the three dimensions of the information environment.", "answer": "Physical: C2 systems, key decision-makers, and supporting infrastructure. Cognitive: The minds of those who transmit, receive, and act on information. Informational: Where and how information is collected, processed, stored, disseminated, and protected.", "keywords": ["physical", "cognitive", "informational", "C2", "minds", "stored"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the role of the SSO versus the Security Manager?", "answer": "The SSO (Special Security Officer) is responsible for SCIF security, access controls, personnel security training, and TS/SCI investigations. The Security Manager manages the command security program, advises on eligibility, and develops the personnel security plan. They have complementary but distinct roles.", "keywords": ["SSO", "Security Manager", "SCIF", "access", "TS/SCI", "eligibility"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain Indications and Warning (I&W) intelligence.", "answer": "I&W is current intelligence from theater assets providing national-level tip-off of imminent hostile activity. It involves detecting and reporting time-sensitive intelligence about foreign developments that could involve a threat to US interests, including the imminence of hostilities.", "keywords": ["I&W", "current", "theater", "imminent", "hostile", "time-sensitive"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is General Military Intelligence (GMI)?", "answer": "GMI is intelligence tailored to the mission covering political, economic, and social aspects of foreign military capabilities. Products include Military Capabilities Assessments, Adversary COA Estimates, and Foreign Intelligence Threat Assessments.", "keywords": ["GMI", "military", "capabilities", "political", "economic", "COA"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Define Identity Intelligence (I2).", "answer": "I2 combines identity attributes — biologic, biographic, behavioral, and reputational — with intelligence from various disciplines to identify and track individuals of interest. It supports force protection, counterterrorism, and law enforcement activities.", "keywords": ["I2", "identity", "biologic", "biographic", "behavioral", "reputational"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the 'availability rule' as a cognitive bias?", "answer": "The availability rule is assessing the likelihood of an event based on the ease of imagining or recalling similar events. Analysts may overestimate the probability of dramatic or recent events because they come to mind more easily, while underestimating less memorable but equally probable scenarios.", "keywords": ["availability", "likelihood", "imagining", "recalling", "overestimate"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the bias of 'oversensitivity to consistency'?", "answer": "Oversensitivity to consistency is overvaluing consistent data from small samples. Analysts may give too much weight to a few data points that seem to form a pattern, drawing firm conclusions from insufficient evidence.", "keywords": ["oversensitivity", "consistency", "small samples", "pattern", "insufficient"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What created the ODNI and why?", "answer": "The 9/11 Commission Report led to the creation of ODNI as the 18th IC agency. It separated the DNI and DCI roles, establishing the DNI as the head of the IC to improve intelligence coordination and information sharing after the failures that preceded the 9/11 attacks.", "keywords": ["9/11", "ODNI", "DNI", "DCI", "coordination", "18th"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What did the NDAA FY2020 create regarding the Intelligence Community?", "answer": "The NDAA FY2020 created the U.S. Space Force as the sixth military branch under the Department of the Air Force. Space Force Intelligence subsequently became the 18th IC agency in January 2021, reflecting the growing importance of space-based intelligence.", "keywords": ["NDAA", "Space Force", "2020", "sixth branch", "18th", "Air Force"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the key intelligence categories?", "answer": "The main categories are: Political (developments within/between nations), Geographic (geography/hydrography influencing decisions), Military (capabilities/dispositions of forces), Economic (financial activities), Biographical (foreign leader biographies), Sociological/Cultural (factors influencing societies), and Medical (bioscientific/environmental factors).", "keywords": ["political", "geographic", "military", "economic", "biographical", "sociological", "medical"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the 'Cult of the SCIF' concept?", "answer": "The 'Cult of the SCIF' refers to the tendency of analysts to assume classified sources are always more reliable than open sources. Excluding unclassified material narrows the field of vision and may cause analysts to miss critical context available from OSINT.", "keywords": ["cult", "SCIF", "classified", "open source", "reliable", "unclassified"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are OCO, DCO, and DODIN operations?", "answer": "OCO (Offensive Cyberspace Operations) are actions to project power in cyberspace. DCO (Defensive Cyberspace Operations) include IDM (Internal Defense Measures) and RA (Response Actions) to defend DoD networks. DODIN Operations manage and secure the DoD Information Network itself.", "keywords": ["OCO", "DCO", "DODIN", "offensive", "defensive", "cyberspace"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What was the role of E.O. 13526?", "answer": "Executive Order 13526 establishes policies for classifying, marking, safeguarding, and declassifying national security information. It sets the framework for the classification system and defines the damage thresholds for each classification level.", "keywords": ["E.O. 13526", "classifying", "marking", "safeguarding", "declassifying"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the ICD 700 series related to?", "answer": "ICD 700 covers protection of national intelligence and sources/methods. ICD 701 addresses unauthorized disclosures. ICD 703 covers protection of classified national intelligence including SCI. ICD 710 covers classification management and control markings systems.", "keywords": ["ICD 700", "701", "703", "710", "protection", "sources", "methods"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What are the nine analytic tradecraft standards referenced in ICD 203?", "answer": "The nine standards are: Sourcing, Uncertainty, Distinctions, Alternatives, Relevance, Argumentation, Analytic Line, Accuracy, and Visualization. These ensure intelligence products maintain rigor and transparency.", "keywords": ["sourcing", "uncertainty", "distinctions", "alternatives", "relevance", "argumentation", "analytic line", "accuracy", "visualization"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain why intelligence 'cannot predict with absolute certainty.'", "answer": "Intelligence is inherently limited because it operates in an environment of incomplete information, adversary denial and deception, finite collection resources, and the complexity of human decision-making. Analysts must work with probabilities and confidence levels rather than certainties, which is why expressing uncertainty clearly is a core analytic standard.", "keywords": ["predict", "certainty", "incomplete", "deception", "probability", "uncertainty"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is E.O. 12333 and what does it govern?", "answer": "Executive Order 12333 governs intelligence oversight and sets rules for US intelligence activities, particularly regarding the protection of civil liberties and privacy of US persons. It establishes that intelligence agencies cannot violate US law and must protect constitutional rights.", "keywords": ["E.O. 12333", "oversight", "civil liberties", "privacy", "US persons"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is 'status quo thinking' as a cognitive bias?", "answer": "Status quo thinking is disproportionately favoring the current situation as the baseline for analysis, assuming things will continue as they are. It makes analysts slow to recognize when conditions are fundamentally changing and can lead to surprise when adversaries alter their behavior.", "keywords": ["status quo", "current situation", "favoring", "changing", "surprise"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is 'vividness of data' bias?", "answer": "Vividness of data bias is favoring vivid, concrete information over abstract or statistical data. A single dramatic report may carry more weight in an analyst's mind than broader statistical evidence, leading to skewed assessments.", "keywords": ["vividness", "concrete", "abstract", "statistical", "dramatic", "skewed"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain the bias related to missing data.", "answer": "The missing data bias is failing to account for absent information. Missing data may actually indicate unusual activity or deliberate concealment. Analysts should ask what they would expect to see but don't, rather than only analyzing what is present.", "keywords": ["missing data", "absent", "unusual activity", "concealment", "expect"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is attribution bias in intelligence?", "answer": "Attribution bias is the hasty assignment of responsibility to a threat actor without sufficient evidence. In intelligence, this can lead to misidentifying the perpetrator of an attack, cyber intrusion, or provocative action, potentially driving flawed policy responses.", "keywords": ["attribution", "hasty", "responsibility", "threat actor", "evidence", "misidentifying"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the bias of 'favoring centralized direction'?", "answer": "This bias involves attributing events to deliberate, centralized direction rather than accident, incompetence, or decentralized action. Analysts may assume adversary actions are coordinated and intentional when they may actually be the result of local initiative or unrelated events.", "keywords": ["centralized direction", "deliberate", "accident", "decentralized", "coordinated"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is framing bias?", "answer": "Framing bias occurs when analysts base assessments on an initial anchor and adjust incrementally rather than considering the full range of possibilities. How a problem is initially framed can predetermine the analytical outcome.", "keywords": ["framing", "anchor", "incrementally", "range", "predetermined"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Name two MILDEC categories beyond 'Joint.'", "answer": "DISO (Deception In Support of Operations) and TAC-D (Tactical Deception). DISO supports theater-level operations while TAC-D supports tactical commanders in specific engagements.", "keywords": ["DISO", "TAC-D", "deception", "theater", "tactical"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is River City and what IO capability does it support?", "answer": "River City is a procedure that controls outgoing communications from a naval vessel or formation, typically by restricting internet, email, and phone access. It supports OPSEC by preventing inadvertent disclosure of operational information during sensitive activities.", "keywords": ["River City", "outgoing", "communications", "OPSEC", "disclosure"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "Explain Estimative Intelligence.", "answer": "Estimative Intelligence forecasts how situations may develop and analyzes the implications for military operations. It projects future scenarios based on current intelligence and analytical judgment, helping commanders prepare for contingencies.", "keywords": ["estimative", "forecasts", "develop", "implications", "future", "scenarios"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is Scientific and Technical Intelligence (S&TI)?", "answer": "S&TI covers adversary weapon system capabilities and vulnerabilities, as well as medical capabilities. It provides technical assessments of foreign weapons, equipment, and technologies that could affect US military operations.", "keywords": ["S&TI", "weapon", "capabilities", "vulnerabilities", "technical", "medical"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is Target Intelligence?", "answer": "Target Intelligence includes target systems analyses, electronic target folders, target lists, and combat assessment products. It directly supports the joint targeting process by providing the intelligence foundation for selecting, prioritizing, and assessing targets.", "keywords": ["target intelligence", "systems analyses", "target folders", "target lists", "combat assessment"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is the significance of the CAPCO Register and Manual?", "answer": "The CAPCO (Controlled Access Program Coordination Office) Register and Manual implements the Intelligence Community's marking system. It provides the authoritative reference for all classification markings, dissemination controls, and SCI markings used across the IC.", "keywords": ["CAPCO", "marking system", "classification", "dissemination", "SCI", "authoritative"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What is RSEN as a dissemination control?", "answer": "RSEN stands for Risk Sensitive. It is a dissemination control marking indicating the information carries heightened risk if disclosed and requires additional protection beyond the classification level alone.", "keywords": ["RSEN", "risk sensitive", "dissemination", "control", "protection"], "type": "text", "map_data": null}, {"section": 1, "section_name": "Intelligence Fundamentals", "question": "What does IMCON control?", "answer": "IMCON stands for Controlled Imagery. It restricts the dissemination of imagery intelligence to protect the capabilities and methods used in its collection.", "keywords": ["IMCON", "controlled imagery", "dissemination", "imagery", "capabilities"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is HUMINT and what are its three subcategories?", "answer": "HUMINT (Human Intelligence) is intelligence collected from human sources. The three subcategories are: Overt (official meetings, interviews, liaison relationships), Covert (clandestine collection without the target's knowledge), and Clandestine (activities concealed but not necessarily without target knowledge, including espionage).", "keywords": ["HUMINT", "human sources", "overt", "covert", "clandestine"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Which agency is the HUMINT manager for national intelligence?", "answer": "The CIA (Central Intelligence Agency) is the national HUMINT manager and is responsible for coordinating human intelligence collection across the Intelligence Community.", "keywords": ["CIA", "HUMINT", "manager", "national"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What are the three main HUMINT product types?", "answer": "IIR (Intelligence Information Report) is the raw field report from a source. SPOT (Single Point of Truth) reporting provides immediate, tactical intelligence on specific events. TDX (Target Development X-ray) is deep analytical assessment of target personalities and vulnerabilities.", "keywords": ["IIR", "SPOT", "TDX", "reporting", "assessment"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define SIGINT and name its three subcategories.", "answer": "SIGINT (Signals Intelligence) is intelligence derived from the collection and analysis of foreign signals. The three subcategories are: COMINT (Communications Intelligence — foreign communications), ELINT (Electronic Intelligence — radar and electronic emissions), and FISINT (Foreign Instrumentation Signals Intelligence — telemetry from weapons systems and spacecraft).", "keywords": ["SIGINT", "signals", "COMINT", "ELINT", "FISINT"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Which agency is the lead for SIGINT collection and what is its authority?", "answer": "The NSA (National Security Agency) is the lead agency for SIGINT collection under the direction of CSS (Central Security Service). NSA has primary authority to collect and analyze foreign signals for national security.", "keywords": ["NSA", "SIGINT", "CSS", "lead", "authority"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the SI marking and when is it applied?", "answer": "SI (Special Intelligence) is a dissemination control marking applied to foreign communications intelligence and overhead collection intelligence. It indicates that the information is derived from sensitive collection systems and should be carefully protected.", "keywords": ["SI", "Special Intelligence", "dissemination", "foreign communications", "overhead"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define GEOINT and what organization is the lead?", "answer": "GEOINT (Geospatial Intelligence) is the analysis and visual representation of geospatial information to describe, assess, and monitor the physical features of the earth and human activities. The NGA (National Geospatial-Intelligence Agency) is the lead GEOINT producer.", "keywords": ["GEOINT", "geospatial", "analysis", "NGA", "physical features"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is NRO and what is its relationship to GEOINT?", "answer": "The NRO (National Reconnaissance Office) owns and operates the nation's reconnaissance satellites. While it is not the producer of GEOINT analysis, it provides the overhead collection capabilities that feed GEOINT production.", "keywords": ["NRO", "reconnaissance", "satellites", "overhead", "capabilities"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "List the seven types of remote sensing EO (Electro-Optical) imagery.", "answer": "The seven types are: PAN (Panchromatic — high-resolution black and white), Multispectral (MSI — typically 3-4 bands), Hyperspectral (HSI — many narrow spectral bands), Infrared (IR — thermal energy), Thermal Infrared (TIR — heat), LiDAR (Light Detection and Ranging — 3D topography), and SAR (Synthetic Aperture Radar — all-weather capability).", "keywords": ["PAN", "MSI", "HSI", "IR", "TIR", "LiDAR", "SAR"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is GSD in the context of imagery?", "answer": "GSD (Ground Sample Distance) is the spatial resolution of an image — the distance on the ground represented by one pixel. Smaller GSD equals higher resolution and more detail.", "keywords": ["GSD", "ground sample distance", "resolution", "pixel", "detail"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is NIIRS and what does it measure?", "answer": "NIIRS (National Imagery Interpretability Rating Scale) measures the interpretability of imagery based on its ability to support specific tasks such as detection, recognition, and identification of objects. The scale ranges from 0 (lowest) to 9 (highest interpretability).", "keywords": ["NIIRS", "interpretability", "rating", "detection", "recognition", "identification"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Name the seven NIIRS categories in order from lowest to highest capability.", "answer": "1) Basic Utility (0-2): Detection and identification of very large objects. 2) Moderate Utility (2-3): Recognition of objects and activities. 3) Good Utility (3-5): Identification of medium-sized objects. 4) Excellent Utility (5-6): Detailed identification and pattern analysis. 5) Superior Utility (6-7): Technical details and fine structure. 6) Outstanding Utility (7-8): Subtle features and minute details. 7) Exceptional Utility (8-9): Extreme detail and specialized analysis.", "keywords": ["NIIRS", "categories", "utility", "detection", "identification"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define MASINT and name its six subdisciplines.", "answer": "MASINT (Measurement and Signature Intelligence) is intelligence derived from analysis of physical phenomenon signatures. The six subdisciplines are: Radar MASINT (radar signatures), Electro-Optical MASINT (optical sensors), Geophysical MASINT (seismic activity), Nuclear MASINT (radiation signatures), Materials MASINT (chemical composition), and RF MASINT (radio frequency signals).", "keywords": ["MASINT", "signatures", "Radar", "Electro-Optical", "Geophysical", "Nuclear", "Materials", "RF"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Which agency manages MASINT collection?", "answer": "DIA (Defense Intelligence Agency) is the manager of MASINT collection and production across the DoD and Intelligence Community.", "keywords": ["DIA", "MASINT", "manager", "collection"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What are COBRA systems in the context of MASINT?", "answer": "COBRA (Cobra Radar) systems are national-level MASINT collection platforms that provide radar intelligence on foreign weapon systems, air defense networks, and target signatures to support military planning and operations.", "keywords": ["COBRA", "MASINT", "radar", "weapon systems", "signatures"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define OSINT and what does PAI stand for?", "answer": "OSINT (Open Source Intelligence) is intelligence derived from publicly available information including news, academic works, internet, commercial imagery, and other unclassified sources. PAI (Public Access Intelligence) refers to information that is legally accessible to the general public.", "keywords": ["OSINT", "open source", "publicly available", "PAI", "public access"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Which IC agency is the OSINT manager?", "answer": "The CIA (Central Intelligence Agency) is responsible for managing OSINT within the Intelligence Community, coordinating collection and production across agencies.", "keywords": ["CIA", "OSINT", "manager", "open source"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What does POSTMAN stand for in the context of OSINT?", "answer": "POSTMAN is an OSINT platform/system used by the Intelligence Community to collect, organize, and analyze publicly available information. It serves as a repository for open source material supporting intelligence analysis.", "keywords": ["POSTMAN", "OSINT", "platform", "collection", "analysis"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is all-source fusion and why is it important?", "answer": "All-source fusion is the integration of intelligence from all disciplines (HUMINT, SIGINT, GEOINT, MASINT, OSINT) with operational and strategic analysis. It is important because no single discipline provides a complete picture — fusion produces more comprehensive, accurate, and reliable intelligence assessments.", "keywords": ["all-source", "fusion", "integration", "disciplines", "comprehensive"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is SIPRNET and what classification level does it handle?", "answer": "SIPRNET (Secret Internet Protocol Router Network) is a classified network that carries SECRET and above information. It is the primary classified internet backbone for DoD and the Intelligence Community.", "keywords": ["SIPRNET", "SECRET", "classified", "network", "backbone"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is JWICS and what is its classification?", "answer": "JWICS (Joint Worldwide Intelligence Communications System) is a classified network that carries TOP SECRET/SCI information. It is the most secure intelligence network and requires the highest level of access and indoctrination.", "keywords": ["JWICS", "TOP SECRET", "SCI", "classified", "secure"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is NSANET and its purpose?", "answer": "NSANET is the NSA's classified network infrastructure used for SIGINT operations and dissemination. It carries classified SIGINT information and is separate from the standard military classified networks.", "keywords": ["NSANET", "NSA", "SIGINT", "classified", "infrastructure"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is CENTRIXS and what does it support?", "answer": "CENTRIXS (Combined Enterprise Regional Information Exchange System) is a secret classified network that supports intelligence operations at the combatant command level. It is used for regional intelligence sharing and command C2.", "keywords": ["CENTRIXS", "classified", "combatant command", "intelligence", "regional"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Name and describe the three unclassified networks mentioned in course materials.", "answer": "GBS (Global Broadcast System) is a one-way satellite broadcast system for unclassified intelligence dissemination. IBS (Integrated Broadcast System) extends broadcast capability. LINK-16/LINK-22 are tactical data link systems used for platform-to-platform communication of classified and unclassified targeting data.", "keywords": ["GBS", "IBS", "LINK-16", "LINK-22", "tactical", "broadcast"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is STONEGHOST in the context of intelligence communications?", "answer": "STONEGHOST is a classified message handling system used within the Intelligence Community for transmitting classified intelligence products. It supports secure dissemination of intelligence across agencies and commands.", "keywords": ["STONEGHOST", "classified", "messaging", "dissemination"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is BICES and its purpose?", "answer": "BICES (Battlefield Information Collection and Exploitation System) is a tactical intelligence system used at the tactical and operational level for collection management and targeting support.", "keywords": ["BICES", "tactical", "collection", "management", "targeting"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is DCGS-N and what does it provide?", "answer": "DCGS-N (Distributed Common Ground System-Navy) is the Navy's primary all-source intelligence system. It integrates information from all disciplines and provides commanders with comprehensive intelligence analysis and visualization.", "keywords": ["DCGS-N", "Navy", "all-source", "intelligence", "integration"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is GCCS and its function?", "answer": "GCCS (Global Command and Control System) is the primary C2 system for the military that integrates operational information and intelligence. It provides a common operating picture for commanders.", "keywords": ["GCCS", "command and control", "operational", "common picture"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is GALE in intelligence systems?", "answer": "GALE (Ground Acquisition Layer Enhancement) is a system that improves the ability to acquire and track moving targets through integrated processing of intelligence data.", "keywords": ["GALE", "acquisition", "moving targets", "processing"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is CRATE and CHROME in the context of intelligence systems?", "answer": "CRATE (Combat Range and Targeting Equipment) and CHROME are imagery analysis and targeting systems used to process and exploit imagery intelligence for operational targeting support.", "keywords": ["CRATE", "CHROME", "imagery", "analysis", "targeting"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is MARS in intelligence operations?", "answer": "MARS (Modeling, Analysis, and Response System) is an intelligence system used for analyzing threat patterns and providing decision support for commanders.", "keywords": ["MARS", "modeling", "analysis", "threat", "decision support"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define LEO, MEO, GEO, and HEO orbits for satellite collection.", "answer": "LEO (Low Earth Orbit) is 100-2000 km altitude, high resolution but frequent revisit. MEO (Medium Earth Orbit) is 2000-36000 km, intermediate resolution/revisit. GEO (Geostationary Orbit) is 36000 km, stationary over one location, useful for monitoring. HEO (Highly Elliptical Orbit) provides extended dwell over high-latitude regions.", "keywords": ["LEO", "MEO", "GEO", "HEO", "orbit", "altitude", "revisit"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What are National assets in the context of intelligence collection?", "answer": "National assets are intelligence collection platforms controlled by national-level intelligence agencies (NRO, NSA, NGA) and disseminated throughout the Intelligence Community. They are not assigned to specific commands but serve national intelligence requirements.", "keywords": ["National assets", "intelligence", "NRO", "NSA", "NGA", "national"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define Theater assets in intelligence collection.", "answer": "Theater assets are intelligence platforms assigned to and under the operational control of a combatant command. Examples include Navy ships with intelligence capabilities assigned to a COCOM's area of responsibility.", "keywords": ["Theater assets", "COCOM", "operational control", "area of responsibility"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What are Organic assets and provide an example.", "answer": "Organic assets are intelligence collection platforms organic to a specific unit or command below the COCOM level. An example is a battalion-level UAV assigned directly to a battalion for organic reconnaissance.", "keywords": ["Organic assets", "unit", "battalion", "UAV", "reconnaissance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the P-8A and what does it collect?", "answer": "The P-8A Poseidon is a Navy maritime patrol aircraft equipped with sensors for SIGINT, ELINT, and radar collection. It provides maritime intelligence, anti-submarine warfare, and reconnaissance capabilities.", "keywords": ["P-8A", "Poseidon", "maritime", "SIGINT", "ELINT", "reconnaissance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the EP-3E and its primary intelligence function?", "answer": "The EP-3E Aries is a Navy signals intelligence aircraft that collects ELINT and SIGINT. It conducts electronic reconnaissance to characterize foreign radar and communication systems.", "keywords": ["EP-3E", "Aries", "ELINT", "SIGINT", "electronic reconnaissance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the E-2D and what intelligence capability does it provide?", "answer": "The E-2D Advanced Hawkeye is a carrier-based airborne early warning and control aircraft. It provides radar surveillance, air defense coordination, and battle management command and control.", "keywords": ["E-2D", "Hawkeye", "airborne early warning", "radar", "surveillance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Describe the EA-18G and its intelligence support role.", "answer": "The EA-18G Growler is a carrier-based electronic warfare aircraft that conducts electronic attack and electronic warfare support. It detects enemy radar and electronic systems and provides jamming protection for carrier strike groups.", "keywords": ["EA-18G", "Growler", "electronic warfare", "jamming", "radar"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the MQ-4C and what does it collect?", "answer": "The MQ-4C Triton is a high-altitude, long-endurance Navy unmanned aircraft system. It provides ISR (Intelligence, Surveillance, and Reconnaissance) capability for maritime domains with signals collection and electro-optical surveillance.", "keywords": ["MQ-4C", "Triton", "unmanned", "ISR", "maritime"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the MQ-9 and what is its primary role?", "answer": "The MQ-9 Reaper is a multi-mission, multi-role remotely piloted aircraft system used by the military and Air Force. It provides ISR, armed reconnaissance, and target acquisition capabilities.", "keywords": ["MQ-9", "Reaper", "armed reconnaissance", "ISR", "target acquisition"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the RC-135 and what intelligence does it collect?", "answer": "The RC-135 Rivet Joint is an Air Force signals intelligence aircraft that collects COMINT and ELINT. It characterizes foreign air defense systems, communications, and electronic emissions.", "keywords": ["RC-135", "Rivet Joint", "COMINT", "ELINT", "air defense"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Describe the U-2 and its intelligence collection capability.", "answer": "The U-2 Dragon Lady is a high-altitude reconnaissance aircraft that provides electro-optical and infrared imagery intelligence at altitudes above typical air defense systems. It has been a primary national intelligence asset for decades.", "keywords": ["U-2", "Dragon Lady", "imagery", "high-altitude", "reconnaissance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is ScanEagle and what platforms carry it?", "answer": "ScanEagle is a small, hand-launched unmanned aerial vehicle used for tactical ISR. It is often carried aboard Navy ships (deployed from ships' hangers or catapults) to provide local surveillance and reconnaissance capability.", "keywords": ["ScanEagle", "UAV", "tactical", "Navy", "surveillance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is IUSS and what does it provide?", "answer": "IUSS (Integrated Undersea Surveillance System) is a network of passive acoustic sensors deployed throughout the world's oceans. It provides underwater acoustic intelligence for submarine detection and tracking.", "keywords": ["IUSS", "undersea", "surveillance", "acoustic", "submarine"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is SURTASS and its relationship to IUSS?", "answer": "SURTASS (Surveillance Towed Array Sensor System) is the deployable component of IUSS. Navy ships tow SURTASS arrays to provide mobile undersea acoustic surveillance.", "keywords": ["SURTASS", "IUSS", "towed array", "undersea", "surveillance"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the AN/SLQ-32 and what does it detect?", "answer": "The AN/SLQ-32 is a shipboard electronic warfare support system. It detects, analyzes, and locates electromagnetic emissions (radar and communication signals) from hostile sources.", "keywords": ["AN/SLQ-32", "shipboard", "electronic warfare", "detection", "electromagnetic"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the AN/BLQ-10 system?", "answer": "The AN/BLQ-10 is an electronic warfare support system used on submarines to detect and analyze electromagnetic emissions from potential threats.", "keywords": ["AN/BLQ-10", "submarine", "electronic warfare", "detection"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the difference between tactical and strategic SIGINT collection?", "answer": "Tactical SIGINT supports unit-level operations and immediate threats, collected by organic systems near the tactical edge. Strategic SIGINT supports national-level intelligence and long-term collection, managed by NSA on national collection systems.", "keywords": ["tactical", "strategic", "SIGINT", "national", "unit-level"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "How are HUMINT networks organized and managed?", "answer": "HUMINT networks consist of case officers, assets (human sources), and supporting infrastructure. The CIA manages human intelligence networks through its Directorate of Operations. Networks are compartmented for security.", "keywords": ["HUMINT", "case officers", "assets", "CIA", "compartmented"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is a case officer in HUMINT?", "answer": "A case officer is the intelligence officer responsible for recruiting, handling, and managing human intelligence sources. The case officer maintains the relationship and directs collection tasking.", "keywords": ["case officer", "HUMINT", "recruit", "handling", "sources"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question"
