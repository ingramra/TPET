                            </div>
                            <div class="metric-box mb-0">
                                <div class="metric-value">${masteryRate}%</div>
                                <div class="metric-label">Mastery Rate</div>
                            </div>
                        </div>

                        <!-- Section Breakdown -->
                        ${Object.keys(performance.sectionResults).length > 0 ? `
                            <div class="card mb-8">
                                <h2 class="text-2xl font-bold mb-4">Section Performance</h2>
                                <div class="space-y-4">
                                    ${Object.entries(performance.sectionResults).map(([section, grades]) => {
                                        const sectionName = QUESTIONS.find(q => q.section == section)?.section_name || `Section ${section}`;
                                        const sectionTotal = grades['Got It'] + grades['Partial'] + grades['Missed'];
                                        const sectionRate = Math.round((grades['Got It'] / sectionTotal) * 100);
                                        return `
                                            <div class="bg-slate-900 p-4 rounded-lg">
                                                <div class="flex justify-between items-center mb-2">
                                                    <span class="section-indicator ${getSectionColor(section)}">${sectionName}</span>
                                                    <span class="font-bold">${sectionRate}%</span>
                                                </div>
                                                <div class="progress-bar">
                                                    <div class="progress-fill" style="width: ${sectionRate}%"></div>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Weak Areas -->
                        ${weakAreas.length > 0 ? `
                            <div class="card mb-8">
                                <h2 class="text-2xl font-bold mb-4">Areas for Improvement</h2>
                                <div class="space-y-3">
                                    ${weakAreas.map(area => `
                                        <div class="weak-area">
                                            <p class="font-semibold">${area.sectionName}</p>
                                            <p class="text-sm text-slate-300">Mastery: ${Math.round(area.rate)}%</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Recommendations -->
                        <div class="card mb-8">
                            <h2 class="text-2xl font-bold mb-4">Recommendations</h2>
                            <div class="space-y-3">
                                ${masteryRate >= 90 ? `
                                    <div class="recommendation">Excellent performance! Consider moving to more advanced topics or reviewing edge cases.</div>
                                ` : masteryRate >= 70 ? `
                                    <div class="recommendation">Good progress! Focus on the weak areas identified above to improve mastery.</div>
                                ` : `
                                    <div class="recommendation">Keep practicing! Review the model answers and try the quiz again focusing on weak areas.</div>
                                `}
                                ${weakAreas.length > 0 ? `
                                    <div class="recommendation">Prioritize studying: ${weakAreas.slice(0, 2).map(a => a.sectionName).join(', ')}</div>
                                ` : ''}
                            </div>
                        </div>

                        <!-- Missed/Partial Questions -->
                        ${appState.userAnswers.some(a => a && ['Partial', 'Missed'].includes(a.grade)) ? `
                            <div class="card mb-8">
                                <h2 class="text-2xl font-bold mb-4">Review Questions</h2>
                                <div class="space-y-4">
                                    ${appState.userAnswers.map((answer, idx) => {
                                        if (!answer || ['Got It'].includes(answer.grade)) return '';
                                        const q = appState.currentQuizQuestions[idx];
                                        return `
                                            <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                                <div class="flex items-center gap-2 mb-2">
                                                    <span class="section-indicator ${getSectionColor(q.section)}">${q.section_name}</span>
                                                    <span class="text-sm font-semibold" style="color: ${answer.grade === 'Partial' ? '#f59e0b' : '#ef4444'};">
                                                        ${answer.grade}
                                                    </span>
                                                </div>
                                                <p class="font-semibold mb-2">${q.question}</p>
                                                <p class="text-sm text-slate-400"><strong>Model Answer:</strong> ${q.answer}</p>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Action Buttons -->
                        <div class="flex gap-4 flex-wrap">
                            ${appState.userAnswers.some(a => a && ['Partial', 'Missed'].includes(a.grade)) ? `
                            <button class="button-warning flex-1" onclick="retryMissedQuestions()">
                                Retry Missed/Partial (${appState.userAnswers.filter(a => a && ['Partial', 'Missed'].includes(a.grade)).length})
                            </button>
                            ` : ''}
                            <button class="button-primary flex-1" onclick="startQuiz()">
                                New Quiz
                            </button>
                            <button class="button-secondary" onclick="goHome()">
                                Home
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPerformanceDashboard() {
            if (appState.performanceHistory.length === 0) {
                return renderHome();
            }

            const totalAttempted = appState.performanceHistory.reduce((sum, r) => sum + (r.results['Got It'] + r.results['Partial'] + r.results['Missed']), 0);
            const totalMastered = appState.performanceHistory.reduce((sum, r) => sum + r.results['Got It'], 0);
            const overallMastery = Math.round((totalMastered / totalAttempted) * 100);

            return `
                <div class="min-h-screen fade-in pb-8">
                    <div class="max-w-4xl mx-auto px-4 py-8">
                        <h1 class="text-4xl font-bold gradient-text mb-8">Performance Dashboard</h1>

                        <!-- Overall Stats -->
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div class="metric-box">
                                <div class="metric-value">${appState.performanceHistory.length}</div>
                                <div class="metric-label">Sessions</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${totalAttempted}</div>
                                <div class="metric-label">Questions</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${totalMastered}</div>
                                <div class="metric-label">Mastered</div>
                            </div>
                            <div class="metric-box">
                                <div class="metric-value">${overallMastery}%</div>
                                <div class="metric-label">Overall</div>
                            </div>
                        </div>

                        <!-- Historical Results -->
                        <div class="card mb-8">
                            <h2 class="text-2xl font-bold mb-4">Recent Sessions</h2>
                            <div class="space-y-4">
                                ${appState.performanceHistory.slice().reverse().map((result, idx) => {
                                    const total = result.results['Got It'] + result.results['Partial'] + result.results['Missed'];
                                    const rate = Math.round((result.results['Got It'] / total) * 100);
                                    return `
                                        <div class="bg-slate-900 p-4 rounded-lg">
                                            <div class="flex justify-between items-center mb-2">
                                                <span class="font-semibold">Session ${appState.performanceHistory.length - idx}</span>
                                                <span class="text-sm text-slate-400">${result.questionCount} questions</span>
                                            </div>
                                            <div class="flex gap-2 text-sm mb-2">
                                                <span style="color: #10b981;">✓ ${result.results['Got It']}</span>
                                                <span style="color: #f59e0b;">◐ ${result.results['Partial']}</span>
                                                <span style="color: #ef4444;">✗ ${result.results['Missed']}</span>
                                            </div>
                                            <div class="progress-bar">
                                                <div class="progress-fill" style="width: ${rate}%"></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Cumulative Weak Areas -->
                        <div class="card mb-8">
                            <h2 class="text-2xl font-bold mb-4">Consistent Weak Areas</h2>
                            <div class="space-y-3">
                                ${(() => {
                                    const sectionStats = {};
                                    appState.performanceHistory.forEach(result => {
                                        Object.entries(result.sectionResults).forEach(([section, grades]) => {
                                            if (!sectionStats[section]) {
                                                sectionStats[section] = { 'Got It': 0, 'Partial': 0, 'Missed': 0 };
                                            }
                                            Object.entries(grades).forEach(([grade, count]) => {
                                                sectionStats[section][grade] += count;
                                            });
                                        });
                                    });

                                    const weakSections = Object.entries(sectionStats)
                                        .map(([section, grades]) => {
                                            const total = grades['Got It'] + grades['Partial'] + grades['Missed'];
                                            const rate = (grades['Got It'] / total) * 100;
                                            return { section, rate, total };
                                        })
                                        .filter(s => s.rate < 70)
                                        .sort((a, b) => a.rate - b.rate);

                                    if (weakSections.length === 0) {
                                        return '<p class="text-slate-400">No consistent weak areas found. Great job!</p>';
                                    }

                                    return weakSections.map(s => {
                                        const sectionName = QUESTIONS.find(q => q.section == s.section)?.section_name || `Section ${s.section}`;
                                        return `
                                            <div class="weak-area">
                                                <p class="font-semibold">${sectionName}</p>
                                                <p class="text-sm text-slate-300">Average Mastery: ${Math.round(s.rate)}% (${s.total} attempts)</p>
                                            </div>
                                        `;
                                    }).join('');
                                })()}
                            </div>
                        </div>

                        <button class="button-secondary w-full" onclick="goHome()">Back to Home</button>
                    </div>
                </div>
            `;
        }

        // ==================== EVENT HANDLERS ====================
        function toggleSection(section) {
            if (appState.selectedSections.has(section)) {
                appState.selectedSections.delete(section);
            } else {
                appState.selectedSections.add(section);
            }
            render();
        }

        function toggleAllSections() {
            if (appState.selectedSections.size === 6) {
                appState.selectedSections.clear();
            } else {
                appState.selectedSections = new Set([1, 2, 3, 4, 5, 6]);
            }
            render();
        }

        function setQuestionCount(count) {
            appState.questionCount = count;
            render();
        }

        function toggleShuffle() {
            appState.shuffleEnabled = !appState.shuffleEnabled;
            render();
        }

        function startQuiz() {
            if (appState.selectedSections.size === 0) {
                alert('Please select at least one section');
                return;
            }
            prepareQuizQuestions();
            appState.currentScreen = 'quiz';
            appState.quizStarted = true;
            render();
        }

        function startStudyMode() {
            if (appState.selectedSections.size === 0) {
                alert('Please select at least one section');
                return;
            }
            prepareQuizQuestions();
            appState.currentScreen = 'study';
            render();
        }

        function checkAnswer() {
            const textarea = document.getElementById('answerInput');
            if (!textarea) return;

            const userAnswer = textarea.value.trim();
            if (!userAnswer) {
                alert('Please enter an answer');
                return;
            }

            const question = appState.currentQuizQuestions[appState.currentQuestionIndex];
            const evaluation = semanticMatch(userAnswer, question.keywords, CONCEPT_SYNONYMS);
            const suggestion = getSelfGradeSuggestion(evaluation.coverage);

            appState.userAnswers[appState.currentQuestionIndex] = {
                userAnswer,
                coverage: evaluation.coverage,
                matchedConcepts: evaluation.matchedConcepts,
                suggestion,
                grade: null
            };

            render();
            setTimeout(() => {
                document.querySelector('.answer-section')?.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        function gradeAnswer(grade) {
            const answer = appState.userAnswers[appState.currentQuestionIndex];
            if (answer) {
                answer.grade = grade;
                render();
            }
        }

        function nextQuestion() {
            if (appState.currentQuestionIndex < appState.currentQuizQuestions.length - 1) {
                appState.currentQuestionIndex++;
                render();
                window.scrollTo(0, 0);
            }
        }

        function previousQuestion() {
            if (appState.currentQuestionIndex > 0) {
                appState.currentQuestionIndex--;
                render();
                window.scrollTo(0, 0);
            }
        }

        function submitQuiz() {
            const unanswered = appState.userAnswers.filter((a, idx) => !a || !a.grade);
            if (unanswered.length > 0) {
                if (!confirm(`You have ${unanswered.length} unanswered question(s). Submit anyway?`)) {
                    return;
                }
            }

            const performance = calculatePerformance();
            const total = performance.results['Got It'] + performance.results['Partial'] + performance.results['Missed'];
            const result = {
                questionCount: appState.currentQuizQuestions.length,
                results: performance.results,
                sectionResults: performance.sectionResults,
                timestamp: new Date().toISOString()
            };

            appState.performanceHistory.push(result);
            appState.currentScreen = 'results';
            appState.quizStarted = false;
            render();
            window.scrollTo(0, 0);
        }

        function goHome() {
            appState.currentScreen = 'home';
            appState.quizStarted = false;
            render();
            window.scrollTo(0, 0);
        }

        function confirmHome() {
            if (appState.quizStarted) {
                if (confirm('You have an active quiz. Are you sure you want to return home and lose your progress?')) {
                    goHome();
                }
            } else {
                goHome();
            }
        }

        function retryMissedQuestions() {
            // Collect only the questions that were graded Partial or Missed
            const missedQuestions = [];
            appState.userAnswers.forEach((answer, idx) => {
                if (answer && ['Partial', 'Missed'].includes(answer.grade)) {
                    missedQuestions.push(appState.currentQuizQuestions[idx]);
                }
            });
            if (missedQuestions.length === 0) return;

            // Shuffle them
            for (let i = missedQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [missedQuestions[i], missedQuestions[j]] = [missedQuestions[j], missedQuestions[i]];
            }

            appState.currentQuizQuestions = missedQuestions;
            appState.currentQuestionIndex = 0;
            appState.userAnswers = new Array(missedQuestions.length).fill(null);
            appState.quizStarted = true;
            appState.currentScreen = 'quiz';
            render();
            window.scrollTo(0, 0);
        }

        function showPerformanceDashboard() {
            appState.currentScreen = 'dashboard';
            render();
            window.scrollTo(0, 0);
        }

        // ==================== MAIN RENDER FUNCTION ====================
        function render() {
            const app = document.getElementById('app');
            let content = '';

            // Header (always visible except on home)
            if (appState.currentScreen !== 'home') {
                content += `
                    <div class="header">
                        <h1 class="text-2xl font-bold gradient-text">RNIOBC TPET I</h1>
                        <button class="button-secondary" onclick="confirmHome()">Home</button>
                    </div>
                `;
            }

            // Screen content
            switch (appState.currentScreen) {
                case 'home':
                    content += renderHome();
                    break;
                case 'quiz':
                    content += renderQuizScreen();
                    if (appState.currentQuestionIndex === appState.currentQuizQuestions.length - 1) {
                        content = content.replace(
                            'Next →</button>',
                            'Submit →</button>'
                        ).replace(
                            'onclick="nextQuestion()"',
                            'onclick="submitQuiz()"'
                        );
                    }
                    break;
                case 'results':
                    content += renderResultsScreen();
                    break;
                case 'dashboard':
                    content += renderPerformanceDashboard();
                    break;
                case 'study':
                    content += renderStudyScreen();
                    break;
                default:
                    content += renderHome();
            }

            app.innerHTML = content;
        }

        function renderStudyScreen() {
            const question = appState.currentQuizQuestions[appState.currentQuestionIndex];
            const progress = ((appState.currentQuestionIndex + 1) / appState.currentQuizQuestions.length) * 100;

            return `
                <div class="min-h-screen fade-in pb-8">
                    <div class="max-w-4xl mx-auto px-4 py-8">
                        <div class="mb-8">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm text-slate-400">
                                    Question ${appState.currentQuestionIndex + 1} of ${appState.currentQuizQuestions.length}
                                </span>
                                <span class="text-sm text-slate-400">${Math.round(progress)}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>

                        <div class="card mb-6">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="section-indicator ${getSectionColor(question.section)}">
                                    ${question.section_name}
                                </span>
                            </div>
                            <h2 class="text-2xl font-bold mb-6">${question.question}</h2>

                            ${question.type === 'map' ? `
                                <div class="svg-map mb-6">
                                    ${question.map_data}
                                </div>
                            ` : ''}

                            <button class="button-primary w-full mb-6" onclick="toggleStudyAnswer()">
                                ${appState.userAnswers[appState.currentQuestionIndex]?.showAnswer ? 'Hide Answer' : 'Show Answer'}
                            </button>

                            ${appState.userAnswers[appState.currentQuestionIndex]?.showAnswer ? `
                                <div class="bg-slate-900 p-6 rounded-lg mb-6">
                                    <p class="text-lg leading-relaxed">${question.answer}</p>
                                    <div class="mt-4 text-sm text-slate-400">
                                        <strong>Key Concepts:</strong>
                                        <div class="flex flex-wrap gap-2 mt-2">
                                            ${question.keywords.map(kw => `
                                                <span class="bg-slate-800 px-3 py-1 rounded text-xs">${kw}</span>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        <div class="flex justify-between gap-4">
                            <button class="button-secondary" onclick="previousQuestion()"
                                ${appState.currentQuestionIndex === 0 ? 'disabled' : ''}>
                                ← Previous
                            </button>
                            <button class="button-secondary" onclick="confirmHome()">
                                Home
                            </button>
                            <button class="button-secondary" onclick="nextQuestion()"
                                ${appState.currentQuestionIndex >= appState.currentQuizQuestions.length - 1 ? 'disabled' : ''}>
                                Next →
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleStudyAnswer() {
            if (!appState.userAnswers[appState.currentQuestionIndex]) {
                appState.userAnswers[appState.currentQuestionIndex] = {};
            }
            appState.userAnswers[appState.currentQuestionIndex].showAnswer =
                !appState.userAnswers[appState.currentQuestionIndex].showAnswer;
            render();
        }

        // Initial render
        render();
    </script>
</body>
</html>
