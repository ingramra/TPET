], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the F/A-18E/F Super Hornet and explain its role in CSG air operations.", "answer": "The F/A-18E/F Super Hornet is a non-stealthy multi-role fighter providing the CSG with high-speed, high-maneuverability air combat capability and precision strike capability. The Super Hornet achieves Mach 1.8+ supersonic speed, carries 11 weapons hardpoints allowing 17,750+ pounds of external ordnance, and has a combat radius of approximately 1,275 nautical miles with air-to-air refueling. The Super Hornet's advanced radar, targeting pod integration, and air refueling capability make it essential for sustained air operations and strike missions. Unlike stealth F-35Cs, Super Hornets rely on advanced electronic warfare systems, maneuvering capability, and numbers to survive in defended airspace. The Super Hornet complements the F-35C by providing high-payload, high-speed strike capability.", "keywords": ["F/A-18 Super Hornet", "multi-role", "Mach 1.8", "strike", "radar", "weapons hardpoints", "combat radius", "air refueling"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Explain the role of the E-2D Hawkeye and describe why it is called the 'CSG's eyes in the sky.'", "answer": "The E-2D Hawkeye is the airborne early warning and control (AEW&C) aircraft that provides long-range air search radar, aircraft control and warning services, and tactical coordination for the CSG. The E-2D carries the AN/APY-9 mechanically-scanned phased array radar with 1,462 nautical mile detection range (with air refueling), providing persistent surveillance of the air environment. The Hawkeye detects incoming aircraft at extended range, enabling fighter interception before threats can reach the CSG. The E-2D team (five crew members) provides command and control, directing fighters to targets, managing air traffic, and coordinating air defense. The Hawkeye's ability to detect and track threats at standoff range, combined with its coordination function, makes it the CSG's primary air defense sensor and the 'force multiplier' that extends the CSG's combat reach.", "keywords": ["E-2D Hawkeye", "AEW&C", "air search radar", "APY-9", "early warning", "force multiplier", "CSG eyes", "air defense"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the EA-18G Growler and explain its critical role in providing electronic warfare support to the CSG.", "answer": "The EA-18G Growler is a tactical electronic warfare aircraft derived from the F/A-18F, equipped with the ALQ-99/218 jamming and electronic countermeasures (ECM) system. The Growler provides full-spectrum electronic warfare capability by jamming enemy radar systems, preventing enemy missiles from acquiring targets, and supporting electronic warfare deception operations. Growlers carry HARM (High-Speed Anti-Radiation Missile) to destroy enemy radar systems and AMRAAM (Air-to-Air Medium Range) missiles for air-to-air defense. The Growler is the only tactical platform capable of full-spectrum electronic warfare, making it irreplaceable in the CVW. The EA-18G integrates with the air wing to provide electronic protection, allow stealth aircraft to operate by suppressing enemy air defenses, and enable precision strike operations in contested electromagnetic environments.", "keywords": ["EA-18G", "Growler", "electronic warfare", "ALQ-99", "jamming", "HARM", "ECM", "air defense suppression"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Explain the role of the MH-60R Seahawk in anti-submarine warfare operations.", "answer": "The MH-60R Seahawk is a specialized anti-submarine warfare (ASW) helicopter equipped with magnetic anomaly detection (MAD), dipping sonar (AN/AQS-22), and armed with Mark 54 torpedoes and Hellfire missiles. The MH-60R conducts ASW search and detection missions, lowering its dipping sonar into the water column to detect submerged submarines. The helicopter's organic weapons (torpedoes and missiles) enable immediate prosecution of detected submarine threats without requiring escort by surface ships or fixed-wing aircraft. Multiple MH-60Rs deployed from the carrier provide distributed ASW capability across the CSG operating area, detecting and engaging submarines before they can threaten the strike group.", "keywords": ["MH-60R", "anti-submarine warfare", "ASW", "MAD", "sonobuoys", "dipping sonar", "torpedoes", "helicopter"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the MH-60S Seahawk and explain how it differs from the MH-60R.", "answer": "The MH-60S Seahawk is a utility variant of the Seahawk helicopter optimized for mine countermeasures (MCM), special warfare support (SPECWAR), search and rescue (SAR), vertical replenishment (VERTREP), and general utility missions. Unlike the ASW-focused MH-60R, the MH-60S is not equipped with sonar, MAD, or anti-submarine weapons; instead, it carries mission-specific equipment and a larger cargo capacity for logistics and personnel transport. The MH-60S deploys alongside MH-60Rs as part of the helicopter squadron supporting the CSG, providing logistics support critical to sustained operations and supporting special warfare operations in littoral environments. The distinction between MH-60R and MH-60S ensures specialized capability for each mission.", "keywords": ["MH-60S", "utility helicopter", "mine countermeasures", "special warfare", "SAR", "VERTREP", "logistics", "MH-60R"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the CMV-22B Osprey and why did it replace the C-2A Greyhound?", "answer": "The CMV-22B Osprey is a tiltrotor transport aircraft that replaced the aging C-2A Greyhound COD (Carrier Onboard Delivery) platform. The Osprey combines the vertical lift of a helicopter with the speed and range of a fixed-wing aircraft, achieving 1,150 nautical mile range and carrying 24-30 passengers or equivalent cargo. The tiltrotor design allows rapid transport of personnel and critical logistics directly to the carrier without requiring a runway, supporting sustained operations and personnel rotation. The CMV-22B's extended range, higher speed (compared to helicopters), and increased payload capacity modernize the CSG's logistics and transportation capability, partially offsetting the logistics constraints of sustained operations at extended range from shore bases.", "keywords": ["CMV-22B", "Osprey", "tiltrotor", "COD", "vertical lift", "carrier transport", "logistics", "C-2A Greyhound"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the composition of an Expeditionary Strike Group (ESG) and contrast it with a Carrier Strike Group.", "answer": "An Expeditionary Strike Group (ESG) is centered on an amphibious assault ship (LHA or LHD) rather than a carrier, and includes one to two guided-missile destroyers (DDG), one attack submarine (SSN), a dock landing ship (LSD), a transport dock ship (LPD), and a fleet replenishment oiler. The ESG embarks the Marine Expeditionary Unit (MEU), a 2,200-person combined-arms force, distinguishing it from the CSG which carries no organic ground forces. The ESG is commanded by a Rear Admiral (RDML) or senior Captain, and is optimized for expeditionary amphibious operations rather than sustained power projection. The ESG is smaller and more nimble than the CSG but carries significantly more ground combat capability.", "keywords": ["ESG", "expeditionary strike group", "LHA", "LHD", "MEU", "amphibious", "DDG", "SSN"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the Marine Expeditionary Unit (MEU) and its organizational structure (MAGTF).", "answer": "The Marine Expeditionary Unit (MEU) is a 2,200-person task-organized Marine force embarked in the ESG, structured around the Marine Air-Ground Task Force (MAGTF) concept. The MAGTF comprises four elements: (1) Command Element (CE)—led by a Colonel with approximately 200 personnel; (2) Ground Combat Element (GCE)—a Battalion Landing Team (BLT) representing a reinforced infantry battalion; (3) Air Combat Element (ACE)—a composite squadron of AV-8B Harrier II, F-35B, MV-22 Osprey, CH-53 Sea Stallion, AH-1Z Viper, and UH-1Y Venom aircraft; (4) Logistics Combat Element (LCE)—a Combat Logistics Battalion (CLB) providing logistics support. The MEU(SOC) variant receives special operations training and certification, enabling raids, direct action, and tactical recovery operations.", "keywords": ["MEU", "MAGTF", "command element", "GCE", "BLT", "ACE", "LCE", "MEU(SOC)"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Explain the intelligence architecture of the ESG and contrast it with the CSG CVIC.", "answer": "The ESG intelligence architecture centers on the Joint Intelligence Center (JIC), the primary intelligence operations center aboard the LHA/LHD, serving the ESG commander, MEU commander, and supporting ship commanders. The JIC is smaller than the carrier-based CVIC due to the ESG's reduced air operations footprint and different mission focus. The JIC focuses on intelligence supporting amphibious operations, ground combat, and littoral intelligence rather than deep ocean operations. The JIC incorporates EXPLOT (similar to SUPPLOT) for tactical plotting and SSES for SIGINT operations. The MEU S-2 (Marine intelligence officer) provides ground-focused intelligence to the Battalion Landing Team and command element, working closely with the JIC.", "keywords": ["JIC", "ESG intelligence", "CVIC", "EXPLOT", "SSES", "MEU S-2", "amphibious intelligence", "ground operations"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What are the primary missions of the ESG and how do they differ from CSG missions?", "answer": "The primary ESG missions are: (1) Expeditionary Operations—executing amphibious assaults, raids, and insertion of forces ashore; (2) Humanitarian Assistance and Disaster Relief (HA/DR)—providing immediate relief following natural disasters; (3) Non-Combatant Evacuation Operations (NEO)—extracting threatened U.S. and allied civilians from hostile regions; (4) Security Cooperation—training and advising partner nation forces; (5) Counter-terrorism—conducting raids and targeted operations against terrorist targets; (6) Power Projection (limited)—providing air and indirect fires support to ground operations. Unlike the CSG, which emphasizes sustained sea control and open-ocean power projection, the ESG emphasizes rapid amphibious employment and littoral operations with organic ground combat power.", "keywords": ["ESG", "expeditionary operations", "amphibious", "HA/DR", "NEO", "counter-terrorism", "littoral", "power projection"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the typical ESG deployment cycle and how it differs from the CSG deployment.", "answer": "The ESG typically deploys for 6-7 months, slightly shorter than the CSG's 7-9 month deployment cycle, due to the different operational tempo and sustainability requirements. The ESG conducts periodic exercises and presence missions with shorter actual combat operations, whereas the CSG maintains sustained operations with higher operational tempo. The ESG follows a defined MEU training and certification cycle (Workup, Pre-deployment, Deployment), with all ESG elements training and deploying together as an integrated unit. ESG deployments emphasize rotational presence in the Indo-Pacific and Mediterranean, maintaining visible security partnerships with allies and deterring regional adversaries through presence operations and training engagements.", "keywords": ["ESG deployment", "MEU", "6-7 months", "training cycle", "workup", "presence operations", "amphibious", "security cooperation"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the America-class LHA and explain its design emphasis compared to previous amphibious ships.", "answer": "The America-class LHA (Landing Helicopter Assault) displaces 45,000 tons and carries 1,200 sailors plus 1,687 Marines, serving as the ESG flagship. The America-class emphasizes aviation capability, with an enhanced flight deck and hangar optimized for F-35B stealth fighter operations, tiltrotor transport (MV-22), and rotary-wing aircraft. The America-class features a reduced well deck compared to earlier LHD designs, emphasizing air operations over traditional well deck landing craft operations. The design reflects the Navy-Marine Corps shift toward distributed amphibious operations using aircraft for insertion rather than large coordinated beach landings. The America-class represents 'sea control' emphasizing air superiority through carrier-like aviation operations.", "keywords": ["America-class LHA", "aviation", "F-35B", "flight deck", "well deck", "ESG flagship", "MV-22"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the Wasp-class LHD and explain its balanced design for amphibious operations.", "answer": "The Wasp-class Landing Helicopter Dock (LHD) displaces 41,150 tons and carries 1,070 sailors plus 1,687 Marines, providing a balanced design combining aviation operations with traditional well deck amphibious capability. The Wasp-class integrates a flight deck for helicopters, fixed-wing aircraft, and tiltrotor operations with a well deck capable of launching and recovering Landing Craft Air Cushion (LCAC) for traditional beach landings and over-the-horizon insertion operations. This balanced design provides flexibility for distributed operations (air insertion) or concentrated amphibious assaults (well deck). The Wasp-class is the workhorse of the amphibious fleet and typically serves as the ESG flagship.", "keywords": ["Wasp-class LHD", "amphibious", "well deck", "LCAC", "flight deck", "balanced design", "ESG", "Marines"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the San Antonio-class LPD and explain its contribution to the ESG.", "answer": "The San Antonio-class Landing Platform Dock (LPD) displaces 25,000 tons and carries 363 sailors plus 699 embarked personnel (troops, vehicles, and equipment). The San Antonio-class incorporates stealth design features (angular hull, reduced radar cross-section) reducing detectability compared to older amphibious ships. The LPD carries and transports Marine combat vehicles, infantry squads, and supplies, providing the second echelon of force insertion and logistics support. The LPD's organic landing craft (2 Landing Craft Mechanized) support the ESG's ability to conduct sustained amphibious operations. The San Antonio-class is replacing older Newport-class LPDs and represents the modern amphibious transport capability essential to distributed, rapid amphibious operations.", "keywords": ["San Antonio-class", "LPD", "amphibious", "stealth", "vehicles", "troops", "landing craft", "combat payload"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the Whidbey Island/Harpers Ferry-class LSD and explain its specialized role in the ESG.", "answer": "The Whidbey Island/Harpers Ferry-class Dock Landing Ship (LSD) displaces 16,000 tons and specializes in well deck operations, emphasizing landing craft capacity and cargo. Unlike the LPD which transports troops, the LSD carries larger quantities of equipment, vehicles, and supplies in a cavernous well deck. The LSD's well deck can accommodate and launch 4 Landing Craft Air Cushion (LCAC) or equivalent landing craft, providing the ESG with significant assault lift. The LSD provides logistics support and sustained operations capability by carrying supply caches, replacements, and equipment that sustain the MEU ashore. The LSD class is transitioning out of service, being replaced by LPD Flight II variants with enhanced well deck capability.", "keywords": ["Whidbey Island", "Harpers Ferry", "LSD", "well deck", "LCAC", "landing craft", "cargo", "logistic support"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the LPD Flight II and how will it enhance future ESG amphibious capability?", "answer": "The LPD Flight II is an enhanced variant of the San Antonio-class LPD, incorporating an expanded well deck, increased landing craft capacity, and improved logistics capability. The LPD Flight II will replace the aging Whidbey Island/Harpers Ferry-class LSD, consolidating the ESG's well deck capability into a single LPD platform. The design provides improved versatility, allowing both troop transport and landing craft operations without requiring specialized LSD ships. The LPD Flight II represents the modernization of the ESG logistics and assault lift infrastructure, ensuring sustained amphibious capability for future Marine operations.", "keywords": ["LPD Flight II", "well deck", "landing craft", "San Antonio", "enhanced", "future", "LSD replacement"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the F-35B Lightning II (STOVL variant) and explain why it is critical to modern ESG operations.", "answer": "The F-35B is the Short Take-Off and Vertical Landing (STOVL) variant of the F-35 Lightning II stealth fighter, optimized for operations from amphibious ships (LHA/LHD) without requiring traditional runways. The F-35B provides the ESG with fifth-generation stealth air combat capability, advanced sensor fusion, and network-centric warfare integration equivalent to the carrier-based F-35C. The F-35B's ability to conduct sustained operations from the LHA enables air superiority, strike operations, and intelligence collection without relying on shore-based airbases. The F-35B represents a revolutionary capability for amphibious assault, enabling protected air operations during contested operations where shore-based airbases may be unavailable.", "keywords": ["F-35B", "STOVL", "stealth", "LHA", "air superiority", "vertical landing", "MEU", "contested operations"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the MV-22B Osprey's role in MEU assault operations.", "answer": "The MV-22B Osprey tiltrotor transport aircraft is the primary assault transport for the MEU, carrying 24 Marines in combat gear with organic weapons and equipment. The Osprey's speed (approximately 316 knots) and range (1,150 nautical miles) enable rapid insertion of forces across significant distances without waiting for slower helicopter operations. The MV-22 can conduct vertical assault landings or tactical landings on airfields, providing flexibility in insertion methods. The Osprey transports the BLT from ship to objective, establishing the initial assault foothold ashore. The MV-22's capacity and speed have revolutionized Marine amphibious assault, replacing slower CH-46 helicopters and enabling rapid, deep insertion of assault forces.", "keywords": ["MV-22B", "Osprey", "tiltrotor", "assault transport", "Marines", "BLT", "insertion", "rapid deployment"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the CH-53E/K Super/King Stallion and explain its critical role in MEU logistics.", "answer": "The CH-53E Super Stallion and upgraded CH-53K King Stallion are heavy-lift helicopters capable of transporting vehicles, artillery, cargo, and supplies essential to sustained operations ashore. The CH-53K (next-generation variant) carries larger payloads and operates at improved performance, enhancing the MEU's logistics and sustainment capability. The Super/King Stallion transports light armored vehicles, generators, ammunition, and fuel to sustain the BLT operating inland from the landing zone. The helicopter's external cargo hook enables rapid logistics delivery without requiring forward airfield infrastructure. The CH-53 family is irreplaceable in providing logistics support to dispersed, remote assault forces operating far from established bases.", "keywords": ["CH-53E", "CH-53K", "King Stallion", "heavy-lift", "logistics", "cargo", "BLT", "external hook"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the AH-1Z Viper attack helicopter and explain its role in close air support.", "answer": "The AH-1Z Viper is the modern attack helicopter providing close air support (CAS), fire support, and escort capability to MEU operations. The Viper carries Hellfire anti-tank missiles, Hydra 70 rocket pods, and a 20mm M197 three-barrel Gatling cannon, enabling rapid engagement of enemy vehicles, fortifications, and personnel. The Viper's night-capable sensors and advanced fire control enable operations in darkness and obscured conditions. The Viper conducts escort missions for MV-22 insertion flights, suppresses enemy air defenses, and provides responsive fire support to ground forces engaged with enemy. The AH-1Z is a primary asset in the MEU's composite squadron, providing critical close air support capability.", "keywords": ["AH-1Z", "Viper", "attack helicopter", "Hellfire", "close air support", "fire support", "escort", "20mm cannon"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the UH-1Y Venom helicopter and explain its multi-role utility to the MEU.", "answer": "The UH-1Y Venom is a general utility helicopter performing troop transport (12 Marines), logistics transport, medevac (medical evacuation), and casualty transport missions. The Venom can be rapidly reconfigured for different missions by changing internal cargo configurations, maintaining flexibility for multiple operational requirements. The Venom's operational utility complements the assault-focused MV-22 by providing organic helicopter lift for distribution, resupply, and casualty evacuation. The Venom's familiar design (derived from the earlier UH-1H Huey) maintains compatibility with Marine doctrine and procedures, enabling seamless integration into composite squadron operations.", "keywords": ["UH-1Y", "Venom", "utility helicopter", "troop transport", "medevac", "logistics", "casualty evacuation", "multi-role"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare and contrast the F-35B and AV-8B Harrier II in ESG air operations.", "answer": "The AV-8B Harrier II is an earlier-generation STOVL attack aircraft, currently being replaced by the F-35B Lightning II in the MEU composite squadron. The AV-8B is a day/good-weather attack aircraft optimized for close air support and provides no stealth or advanced sensor fusion, whereas the F-35B is an all-weather, stealth, multi-role fighter with sensor fusion and network integration. The AV-8B has been the workhorse MEU attack aircraft but has inherent limitations in contested airspace where enemy air defenses are present. The F-35B's introduction represents a generational improvement in ESG air capability, providing advanced air-to-air capability, stealth penetration, and sensor dominance that was impossible with the AV-8B. Transitioning from AV-8B to F-35B will significantly enhance MEU combat capability.", "keywords": ["F-35B", "AV-8B", "Harrier", "STOVL", "close air support", "stealth", "sensor fusion", "contested airspace"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Create a comparison table of CSG and ESG across primary mission, flagship platform, and air wing composition.", "answer": "CSG vs ESG Comparison: (1) Primary Mission—CSG: Power Projection and Sea Control; ESG: Expeditionary Amphibious Operations. (2) Flagship—CSG: CVN (nuclear carrier); ESG: LHA/LHD (amphibious ship). (3) Air Wing—CSG: Full Carrier Air Wing (60-70 aircraft including F-35C, F/A-18E/F, E-2D, EA-18G, MH-60R/S, CMV-22B); ESG: Composite Squadron (30-40 aircraft including F-35B, MV-22, CH-53, AH-1Z, UH-1Y). The CSG emphasizes numbers and diverse capabilities; the ESG emphasizes organic ground force support and distributed operations. This table highlights the fundamental difference in mission and platform selection.", "keywords": ["CSG", "ESG", "comparison", "flagship", "air wing", "carrier", "amphibious", "missions"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare the intelligence centers (CVIC vs JIC) and explain how their different missions drive different intelligence focus.", "answer": "The Carrier Intelligence Center (CVIC) aboard the CVN supports CSG operations focused on sea control, power projection, and sustained air operations in open ocean environments. CVIC maintains extensive air defense, missile threat, and maritime surveillance focus supporting operations thousands of miles from shore. The Joint Intelligence Center (JIC) aboard the LHA/LHD supports ESG operations focused on amphibious assault, ground operations, and littoral intelligence. The JIC integrates more heavily with ground intelligence (S-2) supporting BLT operations ashore, terrain analysis, and threat assessment of landing zones and interior objectives. The CVIC is larger and more sophisticated; the JIC is smaller, more focused on tactical ground support. Both employ similar systems (EXPLOT, SSES, SUPPLOT equivalent) but with different emphasis based on their operational context.", "keywords": ["CVIC", "JIC", "intelligence center", "sea control", "amphibious", "ground operations", "littoral", "threat assessment"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare ground combat capability and explain why the ESG carries organic Marines while the CSG does not.", "answer": "The CSG does not carry organic ground combat forces; Marine Expeditionary Units and Expeditionary Forces are separately task-organized and embarked when required. The CSG focuses on naval operations and air power projection, relying on carrier air and strike systems. The ESG is built around the MEU (2,200 Marines), providing organic ground combat capability for amphibious assault, raids, and security operations. This fundamental difference reflects their missions: the CSG is optimized for sustained power projection against peer naval adversaries and open-ocean sea control; the ESG is optimized for rapid amphibious operations and littoral employment where ground forces are essential. The presence of organic Marines drives the ESG's ship classes, aircraft selection, and intelligence focus toward ground operations.", "keywords": ["CSG", "ESG", "MEU", "Marines", "ground combat", "amphibious assault", "organic forces", "mission differences"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare anti-submarine warfare (ASW) capability between CSG and ESG and explain why the difference matters.", "answer": "The CSG carries robust ASW capability through dedicated MH-60R Seahawks equipped with sonar and torpedoes, attached SSNs, and distributed sonobuoy systems from fixed-wing and rotary-wing aircraft. The E-2D Hawkeye provides early warning of anti-ship cruise missile threats launched by aircraft, and destroyer sonar systems provide continuous ASW vigilance. The ESG has limited organic ASW capability, relying on an attached SSN for subsurface threat detection and response, with only a small helicopter detachment. The CSG's robust ASW reflects the open-ocean environment where subsurface threats (enemy SSNs launching cruise missiles or torpedoes) pose the greatest threat. The ESG's limited ASW reflects the shallow-water, littoral environment where submarine threats are reduced and air defense is the primary concern.", "keywords": ["ASW", "CSG", "ESG", "MH-60R", "sonar", "SSN", "subsurface threat", "anti-submarine"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare air defense architecture and explain why CSG emphasizes BMD while ESG emphasizes distributed defense.", "answer": "The CSG emphasizes integrated air defense (IADS) with layered radar (AEGIS SPY-1, SPY-6), surface-to-air missiles (SM-2, SM-3, SM-6), and combat air patrols, designed to defeat coordinated air attacks and ballistic missiles from peer competitors. The Ticonderoga-class CG serves as the primary BMD platform with the robust Mk41 VLS and AEGIS combat system. The ESG emphasizes distributed air defense through ship-based air defense systems (NATO SeaSparrow, RAM), shorter-range missile systems, and combat air patrols from the composite squadron. The ESG lacks BMD capability and relies on the attached DDG for point air defense rather than layered, integrated defense. This difference reflects threat assumptions: the CSG faces potential peer adversary air attacks; the ESG faces regional air threats and emphasizes distributed operations that are less vulnerable to concentrated attack.", "keywords": ["IADS", "air defense", "CSG", "ESG", "AEGIS", "BMD", "distributed defense", "layered defense"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare the speed and endurance characteristics of CSG and ESG and explain the operational implications.", "answer": "The CSG, powered by nuclear reactors, achieves 30+ knots sustained speed and effectively unlimited range, enabling rapid transit to distant operational areas and sustained presence far from home port. The nuclear power plant provides propulsion for 50+ years, requiring refueling only once per service life. The ESG, powered by conventional gas turbines and diesel, achieves approximately 20 knots sustained speed and requires regular refueling, limiting range and requiring periodic returns to logistics bases. The nuclear CSG can rapidly deploy to any region of the world, maintain presence indefinitely, and sustain high-tempo operations without logistic constraints on propulsion. The conventional ESG requires logistics bases and is more constrained in range, but the smaller size and lower cost enable faster and more frequent deployments to specific regions of interest.", "keywords": ["CSG", "ESG", "nuclear power", "speed", "endurance", "deployment", "range", "logistics constraints"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare strike capability and explain why CSG emphasizes standoff cruise missile strikes while ESG emphasizes close air support.", "answer": "The CSG carries strike capability through Tomahawk Land Attack Missiles (TLAM) aboard destroyers and cruisers, air-launched missiles (SLAM-ER, JASSM) carried by Super Hornets, and precision-guided munitions (JDAMs, LGBs) from various aircraft. The CSG can strike targets hundreds of kilometers inland from standoff range, minimizing risk to strike assets. The ESG carries limited strike capability (composite squadron has some capability) and emphasizes close air support (CAS) provided by the AH-1Z Viper and F-35B, working directly with ground forces in contact with enemy. CAS requires proximity to the target and operates in less-controlled airspace, increasing risk but enabling precise engagement in support of ground operations. The CSG's standoff strike reflects its role in large-scale, long-range power projection; the ESG's CAS reflects its role as an integrated ground and air force.", "keywords": ["CSG", "ESG", "strike", "TLAM", "Tomahawk", "close air support", "CAS", "precision munitions"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare deployment cycles and explain why CSG deployments are longer than ESG deployments.", "answer": "The CSG deploys for 7-9 months, maintaining a continuous presence for extended periods due to the carrier's sustained operational capability (nuclear power, unlimited endurance). The CSG operates on a routine deployment schedule with minimal interruption for maintenance and crew rotation, sustaining operations indefinitely. The ESG deploys for 6-7 months, with shorter deployments due to the conventional ESG's logistics constraints and the Marines' shorter deployment rotation (following their dedicated training and certification cycle). The ESG's shorter deployment also reflects the nature of amphibious operations: relatively short-duration expeditionary campaigns rather than sustained presence. Multiple MEU rotations allow continuous ESG presence in the same region by rotating MEU assignments through the ESG platform. The CSG's longer deployment provides sustained presence from a single deployment; the ESG achieves presence through multiple shorter rotations.", "keywords": ["CSG deployment", "ESG deployment", "7-9 months", "6-7 months", "nuclear power", "MEU rotation", "presence", "endurance"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare the typical operational area of focus for CSG and ESG and explain the geographic implications.", "answer": "The CSG is optimized for open-ocean operations, typically operating in blue-water maritime domains (deep ocean) where the carrier's air superiority and sustained strike capability provide overwhelming advantage. The CSG can operate in any ocean and project power from distant sea areas. The ESG is optimized for littoral and coastal operations, typically operating in shallow waters, coastal zones, and near-shore environments where amphibious assault and close air support are most applicable. The ESG's draft and maneuvering requirements make it less suitable for deep-ocean operations; the CSG's massive carrier deck is underutilized in littoral environments where distributed air operations from smaller vessels are more effective. The geographic specialization reflects platform design: carriers are designed for open ocean power projection; amphibious ships are designed for coastal assault and logistic support ashore.", "keywords": ["CSG", "ESG", "open ocean", "littoral", "coastal", "blue-water", "shallow water", "geographic focus"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the Naval Intelligence Activity (NIA) and explain its role in the broader Naval Intelligence community.", "answer": "The Naval Intelligence Activity (NIA) operates under the Office of Naval Intelligence (ONI) and produces strategic maritime intelligence for senior Navy leadership, Joint commands, and the broader Intelligence Community. The NIA conducts all-source intelligence analysis on maritime threats, naval forces, sea control challenges, and strategic maritime issues. The NIA provides intelligence support not only to Navy operational forces (CSGs, ESGs) but also to national-level policymakers and intelligence consumers requiring maritime intelligence. The NIA represents the Navy's primary strategic intelligence organization and is distinct from operational intelligence produced by CVIC and JIC.", "keywords": ["NIA", "Naval Intelligence Activity", "ONI", "strategic intelligence", "maritime intelligence", "all-source analysis"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe NAVIFOR (Naval Information Force) and explain its role as a type commander.", "answer": "NAVIFOR (Naval Information Force) is a Naval organization serving as a type commander for the Information Warfare (IW) community, responsible for organizing, training, and equipping naval IW forces. NAVIFOR provides ready, trained IW-capable forces to fleet commanders for deployment, ensuring that operational forces have integrated information warfare support. NAVIFOR manages the training and certification of IW personnel, maintains force readiness, and develops doctrine for integration of IW operations. NAVIFOR represents the Navy's commitment to making information warfare a core capability integrated into fleet operations rather than a specialized add-on.", "keywords": ["NAVIFOR", "Naval Information Force", "type commander", "IW", "information warfare", "training", "force readiness"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the role of COMNAVIFORES (Commander, Naval Information Force Reserve) and explain its relationship to NAVIFOR.", "answer": "COMNAVIFORES (Commander, Naval Information Force Reserve) commands the reserve component of the Information Warfare community, managing reserve IW personnel and providing augmentation to the active-duty Naval IW force. The reserve IW community provides trained personnel to support deployments, surge operations, and specialized expertise in areas such as cyber, SIGINT, and information operations. COMNAVIFORES ensures that the Naval Reserve maintains information warfare readiness and can rapidly augment the active force when required. The reserve IW force provides cost-effective surge capacity and retention of experienced personnel who might otherwise leave the Navy.", "keywords": ["COMNAVIFORES", "reserve", "IW", "augmentation", "force readiness", "cyber", "SIGINT", "surge operations"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "List the Navy officer designators (1800-series) associated with information warfare and intelligence operations.", "answer": "Navy information warfare and intelligence officer designators in the 1800-series include: (1) 1810: Cryptologic Warfare Officer—manages SIGINT, cryptologic operations, and signals intelligence. (2) 1820: Information Professional Officer—manages information operations, cyber operations, and network warfare. (3) 1830: Intelligence Officer—performs strategic and operational intelligence analysis and all-source intelligence management. (4) 1840: Cyber Warfare Engineer Officer—develops and employs cyber weapons and defensive cyber operations. (5) 1850-series: Various sub-specialties within IW including electronic warfare, deception operations, and information warfare integration. These designators represent the Navy's professionalization of the information warfare and intelligence disciplines.", "keywords": ["1810", "1820", "1830", "1840", "1850", "cryptologic", "intelligence officer", "cyber warfare"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Identify key Naval enlisted classifications (NECs) and their contributions to naval intelligence operations.", "answer": "Key Naval enlisted classifications include: (1) IS (Intelligence Specialist)—performs all-source analysis, produces intelligence assessments, and maintains tactical picture. (2) CTI (Cryptologic Technician Interpretive)—linguists who translate foreign language communications intercepts and documents. (3) CTN (Cryptologic Technician Network)—network security specialists and cyber operators who conduct network operations and cyber security. (4) CTR (Cryptologic Technician Collection)—SIGINT collection operators managing collection systems and sensors. (5) CTT (Cryptologic Technician Technical)—technical specialists analyzing electronic emissions and radar signatures. (6) IT (Information Systems Technician)—network operations and information system administrators. These enlisted ratings provide the backbone of naval intelligence operations, bringing specialized technical expertise to operational forces.", "keywords": ["IS", "intelligence specialist", "CTI", "CTN", "CTR", "CTT", "IT", "naval enlisted"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the P-8A Poseidon and explain why it is the primary maritime patrol aircraft for naval operations.", "answer": "The P-8A Poseidon is a land-based maritime patrol and reconnaissance aircraft optimized for anti-submarine warfare (ASW), anti-ship warfare (ASUW), Intelligence, Surveillance, and Reconnaissance (ISR), and maritime security operations. The Poseidon carries 100+ sonobuoys for subsurface surveillance, Mark 46/54 torpedoes for anti-submarine engagement, Harpoon anti-ship missiles, and various precision-guided munitions (JDAMs). The aircraft features advanced radar (APY-10), infrared detection, and signals intelligence (SIGINT) collection capability. The P-8A provides maritime domain awareness, detects and engages submarines and surface ships, and provides long-range ISR capability complementing the CSG. The Poseidon can loiter for 7+ hours at range, providing persistent surveillance over extended areas.", "keywords": ["P-8A Poseidon", "maritime patrol", "ASW", "ASUW", "sonobuoys", "torpedoes", "ISR", "long-range surveillance"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the EP-3E Aries II and explain its current role and future transition in naval ISR.", "answer": "The EP-3E Aries II is a specialized signals intelligence (SIGINT) aircraft that conducts communications intelligence (COMINT) and electronic signals collection (ES) from high-altitude flights. The EP-3E crew of 24+ includes linguists and SIGINT analysts who process intercepts in near-real-time, providing strategic and tactical SIGINT collection. The aircraft provides 12+ hours of endurance with aerial refueling, enabling extended coverage of target areas. The EP-3E is being replaced by the MQ-4C Triton unmanned aircraft and integration of SIGINT capability into the P-8A Poseidon, transitioning from manned SIGINT collection to unmanned persistent surveillance. The EP-3E represents the older generation of SIGINT collection aircraft being retired as newer platforms offer better persistence and lower risk.", "keywords": ["EP-3E", "Aries II", "SIGINT", "COMINT", "signals intelligence", "replacement", "MQ-4C", "Triton"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the MQ-4C Triton and explain how unmanned maritime ISR addresses shortcomings of manned platforms.", "answer": "The MQ-4C Triton is the Navy variant of the Global Hawk unmanned aircraft system (UAS), optimized for maritime ISR, including electronic/optical imaging (EO/IR), Synthetic Aperture Radar (SAR), and signals intelligence (SIGINT) collection. The MQ-4C provides 24+ hour endurance without recovery, enabling continuous surveillance of maritime areas without crew fatigue or operational interruption. The unmanned platform eliminates risk to pilots and crew, allowing deployment in contested environments where manned aircraft would face unacceptable losses. The Triton's persistent surveillance and integrated multi-sensor capability (EO/IR, SAR, SIGINT) provide comprehensive maritime awareness. The MQ-4C represents the transition to unmanned ISR platforms that can loiter indefinitely over operational areas.", "keywords": ["MQ-4C", "Triton", "maritime ISR", "unmanned", "EO/IR", "SAR", "SIGINT", "persistent surveillance"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the MQ-9 Reaper and explain its dual-role intelligence and strike capability.", "answer": "The MQ-9 Reaper is a tactical unmanned aircraft system (UAS) carrying integrated ISR sensors (EO/IR, SAR, SIGINT) and armed with Hellfire missiles and JDAM precision-guided munitions. The Reaper provides ISR capability with direct strike capability, allowing ISR operators to conduct intelligence collection and, if authorized, execute strikes against targets identified during collection. The Reaper's persistence (24+ hours endurance), rapid response (strike upon target identification), and precision munitions provide a force multiplier for forward commanders. The Reaper bridges the intelligence and operations domains, enabling rapid target prosecution without requiring strikes from manned aircraft. The Reaper's dual-role capability has made it essential to counter-terrorism and counter-insurgency operations.", "keywords": ["MQ-9", "Reaper", "ISR", "strike", "Hellfire", "JDAM", "dual-role", "persistence"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Compare the characteristics of RC-135V/W, U-2 Dragon Lady, and E-3 AWACS, and explain their complementary roles in national ISR.", "answer": "The RC-135V/W is a manned strategic SIGINT collection aircraft operated by the Air Force, providing real-time collection and analysis of foreign military signals and communications. The U-2 Dragon Lady is a high-altitude reconnaissance aircraft (70,000+ feet) carrying geospatial intelligence (GEOINT), measurement and signature intelligence (MASINT), and SIGINT sensors, providing detailed imagery and signals collection. The E-3 AWACS (Airborne Warning and Control System) provides tactical air early warning and control functions, directing fighter aircraft and providing command and control radar. These three platforms provide complementary ISR capabilities: RC-135 for strategic SIGINT, U-2 for high-altitude detailed imagery and signals, E-3 for tactical air control. These systems are transitioning out of service (E-3 replacement pending, U-2 retiring ~2027, RC-135 replacement in development).", "keywords": ["RC-135", "U-2", "E-3 AWACS", "SIGINT", "GEOINT", "air control", "high-altitude", "strategic intelligence"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the E-8 J-STARS and explain its specialized role in ground surveillance.", "answer": "The E-8 J-STARS (Joint Surveillance Target Attack Radar System) is an Air Force platform carrying ground moving target indicator (GMTI) radar and signals intelligence collection capability, optimized for detecting and tracking ground forces and vehicles. The J-STARS provides long-range ground surveillance over extensive areas, enabling commanders to see enemy ground movements and conduct targeting of mobile targets. The GMTI radar can detect moving vehicles and personnel at extended range, providing commanders with real-time ground intelligence. J-STARS supports ground operations and provides targeting support for air and ground forces engaging ground targets. The J-STARS represents specialized ISR focused on ground domain threats, complementing maritime and air domain ISR platforms.", "keywords": ["E-8 J-STARS", "ground surveillance", "GMTI", "moving target", "targeting", "ground forces", "radar", "Air Force"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the RQ-4 Global Hawk and explain its role in strategic ISR operations.", "answer": "The RQ-4 Global Hawk is a high-altitude, long-endurance unmanned aircraft system (HALE-UAS) operated by the Air Force for strategic ISR. The Global Hawk carries EO/IR and synthetic aperture radar (SAR) sensors for geospatial intelligence collection, with 24+ hour endurance and global range capability. The Global Hawk provides persistent coverage of large geographic areas, supporting strategic intelligence requirements and long-term surveillance tasks. The Global Hawk is being phased out (retiring ~2027) in favor of the MQ-4C Triton for Navy maritime applications and other advanced ISR systems. The Global Hawk represented the first generation of strategic HALE-UAS and paved the way for modern unmanned ISR platforms.", "keywords": ["RQ-4 Global Hawk", "HALE-UAS", "strategic ISR", "unmanned", "EO/IR", "SAR", "geospatial intelligence", "retirement"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the ScanEagle and explain its tactical employment in naval operations.", "answer": "ScanEagle is a small tactical unmanned aircraft system (TUAS) deployed aboard ships and operated from forward locations for short-range ISR. ScanEagle carries an EO/IR sensor package and signals intelligence (SIGINT) collection capability optimized for tactical reconnaissance and surveillance. The ScanEagle's small size (5-pound empty weight), quiet operation, and low cost enable deployment from ship decks without sophisticated launch or recovery systems. ScanEagle provides persistent tactical ISR to ship commanders and forward-based commanders, detecting surface vessels, monitoring port activity, and providing intelligence on coastal areas. ScanEagle represents the tactical ISR capability organic to naval vessels, filling the gap between aircraft-based ISR and shipboard sensors.", "keywords": ["ScanEagle", "tactical UAV", "ISR", "EO/IR", "SIGINT", "ship-based", "small UAS", "tactical reconnaissance"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Create a comparison of ISR aircraft operational characteristics (range, endurance, altitude, payload) and explain how platform selection drives intelligence requirements.", "answer": "ISR Platform Comparison: (1) P-8A Poseidon: 7+ hour endurance, 1,300+ nautical mile range, 35,000 feet altitude, 100+ sonobuoys + missiles. (2) MQ-4C Triton: 24+ hours endurance, 5,000+ nautical mile range, 60,000+ feet altitude, EO/IR + SAR + SIGINT. (3) MQ-9 Reaper: 24+ hours endurance, 1,200+ nautical mile range, 50,000 feet altitude, EO/IR + SAR + Hellfire/JDAM. (4) EP-3E: 12+ hour endurance, 3,000+ nautical mile range, 35,000 feet altitude, SIGINT collection focus. (5) U-2: 12+ hour endurance, 3,500+ nautical mile range, 70,000+ feet altitude, GEOINT/MASINT/SIGINT. (6) ScanEagle: 5+ hour endurance, 50 nautical mile range, 20,000 feet altitude, EO/IR + SIGINT. Platform selection drives how far, how long, and what type of intelligence can be collected from a given area.", "keywords": ["ISR aircraft", "endurance", "range", "altitude", "payload", "platform selection", "collection management", "requirements"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Explain how theater ISR aircraft (P-8A, MQ-4C, EP-3E) support Naval Intelligence requirements and feed the intelligence dissemination pipeline.", "answer": "Theater ISR aircraft provide direct intelligence support to fleet and joint commanders by conducting collection against Intelligence Community-wide requirements. P-8A Poseidon flights conduct maritime patrols, provide submarine detection and warning, and conduct anti-ship surveillance feeding OPINTEL with real-time surface threat information. MQ-4C Triton provides persistent maritime surveillance with EO/IR and SAR imagery supporting targeting and maritime domain awareness. EP-3E provides strategic SIGINT collection supporting intelligence requirements. Intelligence collected by these aircraft feeds dissemination pipelines: tactical intelligence from P-8A disseminates immediately to tactical commanders; P-8A imagery/SIGINT feeds national intelligence databases; Triton ISR feeds operational intelligence centers. Theater ISR represents the critical bridge between intelligence requirements and deployed forces, ensuring commanders have access to the collection assets supporting their operational areas.", "keywords": ["ISR aircraft", "theater intelligence", "maritime patrol", "dissemination", "P-8A", "MQ-4C", "collection management", "tactical intelligence"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe the key physical features used to identify and classify submarine types, focusing on sail shape, hull profile, and antenna configuration.", "answer": "Submarine identification (RECCE) uses several physical features: (1) Sail shape—rectangular vs. streamlined, flat-topped vs. rounded, indicating design generation and origin. (2) Sail placement—forward (Soviet/Russian), centered (some U.S.), aft (some European) positions affecting sailing characteristics and sensor placement. (3) Bow profile—sloping (typical modern attack submarines), blunt (older designs), bulbous (ballistic missile submarines)—indicates flow control and acoustic properties. (4) Hull profile—smooth (modern) vs. stepped down (older)—indicates hull stress capabilities and modernization. (5) Mast/antenna configuration—number, placement, and type of communications antennas, snorkel masts, and sensor arrays—indicate mission (SSBN vs SSN) and capability level. These physical features enable surface observers to identify submarines at visual range without requiring direct engagement, supporting maritime domain awareness and threat assessment.", "keywords": ["submarine identification", "RECCE", "sail shape", "hull profile", "bow", "antenna configuration", "SSN", "SSBN"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Develop a classification scheme for submarines based on observable characteristics, including Soviet/Russian, U.S., and allied designs, with emphasis on tactical implications of design differences.", "answer": "Submarine Classification Scheme: (1) Soviet/Russian Design Philosophy: Larger displacement, single-hull construction, rectangular sails, prominent mast arrays, lower underwater speed than Western equivalents but higher surface speed and greater firepower. (2) U.S. Design Philosophy: Compact, dual-hull construction (SSBN), single-hull (SSN), streamlined sails, integrated sensors, higher underwater speed and silent operation emphasis. (3) Allied Designs: Various—UK (similar to U.S. philosophy), France (unique features), Germany (advanced small SSK), Japan (AIP technology). Tactical Implications: Soviet/Russian designs prioritize firepower and surface operations; U.S. designs prioritize stealth and underwater speed. Recognition of hull design, sail shape, and antenna configuration enables threat assessment without explicit identification, supporting maritime domain awareness and air defense countermeasures selection.", "keywords": ["submarine classification", "Soviet design", "U.S. design", "hull construction", "tactical characteristics", "firepower", "stealth", "underwater speed"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "type": "map", "question": "Identify the strategic chokepoint marked #1 on this map. What percentage of seaborne oil passes through it?", "answer": "The Strait of Hormuz, located between Iran and Oman, connecting the Persian Gulf to the Gulf of Oman/Arabian Sea. Approximately 30% of all seaborne oil passes through this strait, making it one of the most strategically vital chokepoints in the world.", "keywords": ["Strait of Hormuz", "Iran", "Oman", "Persian Gulf", "oil", "chokepoint", "30%"], "map_data": "<svg viewBox=\"0 0 500 350\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:460px;margin:auto;display:block;\">\n  <rect width=\"500\" height=\"350\" fill=\"#1a2744\"/>\n  <!-- Water -->\n  <path d=\"M0,120 L180,120 Q230,140 250,180 Q270,220 350,230 L500,230 L500,350 L0,350 Z\" fill=\"#1e3a5f\" opacity=\"0.7\"/>\n  <!-- Iran -->\n  <path d=\"M0,0 L500,0 L500,120 L350,120 Q300,130 280,160 Q260,190 220,195 L180,120 L0,120 Z\" fill=\"#2d4a3e\"/>\n  <text x=\"200\" y=\"70\" fill=\"#94a3b8\" font-size=\"16\" font-weight=\"bold\">IRAN</text>\n  <!-- Oman/UAE -->\n  <path d=\"M300,230 L350,230 Q380,230 400,250 L500,250 L500,350 L300,350 Z\" fill=\"#3d4a3e\"/>\n  <text x=\"370\" y=\"300\" fill=\"#94a3b8\" font-size=\"14\" font-weight=\"bold\">OMAN</text>\n  <text x=\"350\" y=\"270\" fill=\"#94a3b8\" font-size=\"12\">UAE</text>\n  <!-- Labels -->\n  <text x=\"80\" y=\"200\" fill=\"#60a5fa\" font-size=\"12\">Persian Gulf</text>\n  <text x=\"400\" y=\"200\" fill=\"#60a5fa\" font-size=\"12\">Gulf of Oman</text>\n  <!-- Red dot -->\n  <circle cx=\"280\" cy=\"185\" r=\"10\" fill=\"#ef4444\" stroke=\"white\" stroke-width=\"2\"/>\n  <text x=\"292\" y=\"178\" fill=\"white\" font-size=\"14\" font-weight=\"bold\">#1</text>\n</svg>"}, {"section": 6, "section_name": "Geography", "type": "map", "question": "Identify the waterway marked #1 on this map. What percentage of global trade transits through it?", "answer": "The Suez Canal in Egypt, connecting the Mediterranean Sea to the Red Sea. Approximately 12% of global trade passes through the Suez Canal, making it a critical shipping route between Europe and Asia. Egypt controls access to this vital waterway.", "keywords": ["Suez Canal", "Egypt", "Mediterranean", "Red Sea", "12%", "shipping", "chokepoint"], "map_data": "<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:380px;margin:auto;display:block;\">\n  <rect width=\"400\" height=\"400\" fill=\"#1a2744\"/>\n  <!-- Mediterranean -->\n  <path d=\"M0,0 L400,0 L400,120 L200,120 L170,100 L150,120 L0,120 Z\" fill=\"#1e3a5f\" opacity=\"0.7\"/>\n  <text x=\"150\" y=\"50\" fill=\"#60a5fa\" font-size=\"13\">Mediterranean Sea</text>\n  <!-- Red Sea -->\n  <path d=\"M160,280 L180,280 L200,400 L140,400 Z\" fill=\"#1e3a5f\" opacity=\"0.7\"/>\n  <text x=\"100\" y=\"360\" fill=\"#60a5fa\" font-size=\"12\" transform=\"rotate(-15,100,360)\">Red Sea</text>\n  <!-- Egypt (west) -->\n  <path d=\"M0,120 L150,120 L150,200 L140,400 L0,400 Z\" fill=\"#3d4a3e\"/>\n  <text x=\"40\" y=\"250\" fill=\"#94a3b8\" font-size=\"16\" font-weight=\"bold\">EGYPT</text>\n  <!-- Sinai (east) -->\n  <path d=\"M200,120 L400,120 L400,400 L200,400 L180,280 L200,200 Z\" fill=\"#2d4a3e\"/>\n  <text x=\"250\" y=\"250\" fill=\"#94a3b8\" font-size=\"14\">Sinai</text>\n  <!-- Canal -->\n  <line x1=\"165\" y1=\"120\" x2=\"165\" y2=\"275\" stroke=\"#3b82f6\" stroke-width=\"3\" stroke-dasharray=\"5,3\"/>\n  <!-- Red dot -->\n  <circle cx=\"165\" cy=\"195\" r=\"10\" fill=\"#ef4444\" stroke=\"white\" stroke-width=\"2\"/>\n  <text x=\"178\" y=\"200\" fill=\"white\" font-size=\"14\" font-weight=\"bold\">#1</text>\n</svg>"}, {"section": 6, "section_name": "Geography", "type": "map", "question": "Identify the strait marked #1 on this map. What percentage of maritime trade transits through it?", "answer": "The Strait of Malacca, located between the Malay Peninsula (Malaysia) and the Indonesian island of Sumatra. Approximately 30% of all maritime trade transits through this strait, making it critical for energy supplies to East Asia, particularly China and Japan.", "keywords": ["Malacca", "strait", "Malaysia", "Indonesia", "Sumatra", "trade", "30%", "Asia"], "map_data": "<svg viewBox=\"0 0 500 350\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:460px;margin:auto;display:block;\">\n  <rect width=\"500\" height=\"350\" fill=\"#1a2744\"/>\n  <!-- Water -->\n  <rect width=\"500\" height=\"350\" fill=\"#1e3a5f\" opacity=\"0.5\"/>\n  <!-- Malay Peninsula -->\n  <path d=\"M100,0 L250,0 L220,160 L180,200 L160,180 L140,100 L100,0 Z\" fill=\"#2d4a3e\"/>\n  <text x=\"140\" y=\"80\" fill=\"#94a3b8\" font-size=\"12\" font-weight=\"bold\">MALAYSIA</text>\n  <!-- Sumatra -->\n  <path d=\"M80,160 L180,220 L250,350 L100,350 L30,250 Z\" fill=\"#3d4a3e\"/>\n  <text x=\"100\" y=\"300\" fill=\"#94a3b8\" font-size=\"14\" font-weight=\"bold\">SUMATRA</text>\n  <!-- Labels -->\n  <text x=\"300\" y=\"60\" fill=\"#60a5fa\" font-size=\"12\">South China Sea</text>\n  <text x=\"20\" y=\"140\" fill=\"#60a5fa\" font-size=\"12\">Indian Ocean</text>\n  <!-- Red dot at strait -->\n  <circle cx=\"170\" cy=\"200\" r=\"10\" fill=\"#ef4444\" stroke=\"white\" stroke-width=\"2\"/>\n  <text x=\"183\" y= \"375\" cy=\"155\" r=\"8\" fill=\"#16a34a\" stroke=\"white\" stroke-width=\"2\"/>\n  <text x=\"355\" y=\"155\" fill=\"white\" font-size=\"11\" font-weight=\"bold\">C</text>\n</svg>"}, {"section": 6, "section_name": "Geography", "type": "map", "question": "Identify the location marked #1 on this Persian Gulf map. Which US Navy fleet is headquartered near this location, and what is its AOR?", "answer": "The marker indicates Bahrain (specifically Manama), where the US 5th Fleet is headquartered at Naval Support Activity Bahrain. The 5th Fleet's AOR covers the Middle East, Persian Gulf, Red Sea, parts of the Indian Ocean, and three critical chokepoints: the Strait of Hormuz, the Suez Canal, and the Bab-el-Mandeb Strait.", "keywords": ["Bahrain", "5th Fleet", "Manama", "Persian Gulf", "Middle East", "Strait of Hormuz", "AOR"], "map_data": "<svg viewBox=\"0 0 500 350\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:460px;margin:auto;display:block;\">\n  <rect width=\"500\" height=\"350\" fill=\"#1a2744\"/>\n  <!-- Gulf water -->\n  <path d=\"M50,100 L200,80 L300,100 L380,140 L420,180 L460,200 L500,210 L500,350 L0,350 L0,200 Z\" fill=\"#1e3a5f\" opacity=\"0.5\"/>\n  <!-- Iran (north) -->\n  <path d=\"M100,0 L500,0 L500,100 L420,120 L380,140 L300,100 L200,80 L100,90 Z\" fill=\"#2d4a3e\"/>\n  <text x=\"300\" y=\"50\" fill=\"#94a3b8\" font-size=\"16\" font-weight=\"bold\">IRAN</text>\n  <!-- Saudi Arabia (south/west) -->\n  <path d=\"M0,0 L100,0 L100,90 L50,100 L0,200 Z\" fill=\"#3d4a3e\"/>\n  <text x=\"10\" y=\"140\" fill=\"#94a3b8\" font-size=\"11\">Saudi Arabia</text>\n  <!-- UAE/Oman -->\n  <path d=\"M200,220 L350,200 L420,220 L450,250 L400,300 L300,290 L200,260 Z\" fill=\"#3d4a3e\"/>\n  <text x=\"280\" y=\"260\" fill=\"#94a3b8\" font-size=\"12\">UAE</text>\n  <!-- Label -->\n  <text x=\"200\" y=\"160\" fill=\"#60a5fa\" font-size=\"14\" font-weight=\"bold\">Persian Gulf</text>\n  <!-- Fleet HQ marker -->\n  <circle cx=\"300\" cy=\"220\" r=\"9\" fill=\"#ef4444\" stroke=\"white\" stroke-width=\"2\"/>\n  <text x=\"312\" y=\"225\" fill=\"white\" font-size=\"12\" font-weight=\"bold\">#1</text>\n</svg>"}, {"section": 6, "section_name": "Geography", "type": "map", "question": "Identify the chokepoint marked #1 on this map. What countries does it separate, and why is it strategically significant?", "answer": "The Bab-el-Mandeb Strait, located between Yemen (on the Arabian Peninsula) and Djibouti/Eritrea (on the Horn of Africa). It connects the Red Sea to the Gulf of Aden and the Arabian Sea. Its strategic significance lies in controlling access to the Suez Canal from the south — any vessel transiting the Suez must also pass through Bab-el-Mandeb. The area faces threats from piracy, terrorism, and regional instability, particularly from Yemen.", "keywords": ["Bab-el-Mandeb", "Yemen", "Djibouti", "Red Sea", "Gulf of Aden", "chokepoint", "piracy", "Suez"], "map_data": "<svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:380px;margin:auto;display:block;\">\n  <rect width=\"400\" height=\"400\" fill=\"#1a2744\"/>\n  <!-- Red Sea water -->\n  <path d=\"M140,0 L220,0 L200,130 L190,200 L200,280 L230,320 L400,350 L400,400 L0,400 L0,350 L150,320 L170,280 L160,200 L150,130 Z\" fill=\"#1e3a5f\" opacity=\"0.5\"/>\n  <!-- East Africa -->\n  <path d=\"M0,0 L140,0 L150,130 L160,200 L170,280 L150,320 L0,350 L0,0 Z\" fill=\"#2d4a3e\"/>\n  <text x=\"30\" y=\"200\" fill=\"#94a3b8\" font-size=\"12\">East Africa</text>\n  <text x=\"30\" y=\"340\" fill=\"#94a3b8\" font-size=\"11\">Djibouti</text>\n  <!-- Arabian Peninsula -->\n  <path d=\"M220,0 L400,0 L400,350 L230,320 L200,280 L190,200 L200,130 Z\" fill=\"#3d4a3e\"/>\n  <text x=\"250\" y=\"150\" fill=\"#94a3b8\" font-size=\"12\">Yemen</text>\n  <!-- Labels -->\n  <text x=\"160\" y=\"100\" fill=\"#60a5fa\" font-size=\"12\" transform=\"rotate(-5,160,100)\">Red Sea</text>\n  <text x=\"260\" y=\"370\" fill=\"#60a5fa\" font-size=\"12\">Gulf of Aden</text>\n  <!-- Red dot at strait -->\n  <circle cx=\"195\" cy=\"310\" r=\"10\" fill=\"#ef4444\" stroke=\"white\" stroke-width=\"2\"/>\n  <text x=\"208\" y=\"305\" fill=\"white\" font-size=\"14\" font-weight=\"bold\">#1</text>\n</svg>"}];

        // ==================== STATE MANAGEMENT ====================
        let appState = {
            currentScreen: 'home',
            selectedSections: new Set([1, 2, 3, 4, 5, 6]),
            questionCount: 25,
            shuffleEnabled: false,
            currentQuizQuestions: [],
            currentQuestionIndex: 0,
            userAnswers: [],
            quizResults: [],
            performanceHistory: [],
            quizStarted: false
        };

        // ==================== SEMANTIC MATCHING ENGINE ====================
        function normalizeText(text) {
            return text.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '');
        }

        function extractKeywords(text) {
            return text.toLowerCase().split(/[\s,.-]+/).filter(w => w.length > 2);
        }

        function semanticMatch(userAnswer, keywordSet, conceptMap) {
            const userKeywords = new Set(extractKeywords(userAnswer));
            const userText = normalizeText(userAnswer);

            let matchedConcepts = [];
            let matchScore = 0;
            let maxScore = keywordSet.length;

            for (const keyword of keywordSet) {
                const synonyms = conceptMap[keyword.toLowerCase()] || [keyword];
                let found = false;

                // Check direct keyword match
                if (userKeywords.has(keyword.toLowerCase())) {
                    matchedConcepts.push({ concept: keyword, matched: true });
                    matchScore += 1;
                    found = true;
                } else {
                    // Check synonym matches
                    for (const synonym of synonyms) {
                        const synonymKeywords = extractKeywords(synonym);
                        if (synonymKeywords.some(syn => userKeywords.has(syn))) {
                            matchedConcepts.push({ concept: keyword, matched: true, via: synonym });
                            matchScore += 1;
                            found = true;
                            break;
                        }
                    }
                }

                if (!found) {
                    matchedConcepts.push({ concept: keyword, matched: false });
                }
            }

            const coverage = Math.round((matchScore / Math.max(maxScore, 1)) * 100);
            return { coverage, matchedConcepts, score: matchScore, maxScore };
        }

        function getSelfGradeSuggestion(coverage) {
            if (coverage >= 80) return 'Got It';
            if (coverage >= 40) return 'Partial';
            return 'Missed';
        }

        // ==================== UTILITY FUNCTIONS ====================
        function getQuestionsBySection() {
            return QUESTIONS.filter(q => appState.selectedSections.has(q.section));
        }

        function prepareQuizQuestions() {
            const filteredQuestions = getQuestionsBySection();
            const count = Math.min(appState.questionCount === 'all' ? Infinity : appState.questionCount, filteredQuestions.length);
            let selected = filteredQuestions.slice(0, count);

            if (appState.shuffleEnabled) {
                selected = selected.sort(() => Math.random() - 0.5);
            }

            appState.currentQuizQuestions = selected;
            appState.userAnswers = new Array(selected.length).fill(null);
            appState.currentQuestionIndex = 0;
        }

        function getSectionColor(section) {
            const colors = {
                1: 'badge-s1',
                2: 'badge-s2',
                3: 'badge-s3',
                4: 'badge-s4',
                5: 'badge-s5',
                6: 'badge-s6'
            };
            return colors[section] || 'badge-s1';
        }

        function calculatePerformance() {
            const results = { 'Got It': 0, 'Partial': 0, 'Missed': 0 };
            const sectionResults = {};

            appState.userAnswers.forEach((answer, idx) => {
                if (answer) {
                    results[answer.grade] = (results[answer.grade] || 0) + 1;
                    const section = appState.currentQuizQuestions[idx].section;
                    if (!sectionResults[section]) {
                        sectionResults[section] = { 'Got It': 0, 'Partial': 0, 'Missed': 0 };
                    }
                    sectionResults[section][answer.grade]++;
                }
            });

            return { results, sectionResults };
        }

        function identifyWeakAreas() {
            const { sectionResults } = calculatePerformance();
            const weakAreas = [];

            Object.entries(sectionResults).forEach(([section, grades]) => {
                const total = grades['Got It'] + grades['Partial'] + grades['Missed'];
                const gotItRate = (grades['Got It'] / total) * 100;
                if (gotItRate < 70) {
                    const sectionName = QUESTIONS.find(q => q.section == section)?.section_name || `Section ${section}`;
                    weakAreas.push({ section, sectionName, rate: gotItRate });
                }
            });

            return weakAreas.sort((a, b) => a.rate - b.rate);
        }

        // ==================== SCREEN RENDERERS ====================
        function renderHome() {
            const availableQuestions = getQuestionsBySection().length;
            const recentResults = appState.performanceHistory.slice(-3);

            return `
                <div class="min-h-screen fade-in">
                    <div class="max-w-6xl mx-auto px-4 py-8">
                        <div class="text-center mb-12">
                            <h1 class="text-5xl font-bold gradient-text mb-4">RNIOBC TPET I</h1>
                            <p class="text-xl text-slate-400">Enhanced Interactive Quiz Tool</p>
                            <p class="text-sm text-slate-500 mt-2">Reserve Naval Intelligence Officer Basic Course</p>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                            <!-- Quiz Setup Card -->
                            <div class="lg:col-span-2 card">
                                <h2 class="text-2xl font-bold mb-6">Start New Quiz</h2>

                                <!-- Section Selection -->
                                <div class="mb-6">
                                    <div class="flex justify-between items-center mb-3">
                                        <h3 class="text-lg font-semibold">Select Sections</h3>
                                        <button class="button-secondary button-small" onclick="toggleAllSections()">
                                            Toggle All
                                        </button>
                                    </div>
                                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                                        ${[1, 2, 3, 4, 5, 6].map(section => {
                                            const sectionName = QUESTIONS.find(q => q.section === section)?.section_name || `Section ${section}`;
                                            const isChecked = appState.selectedSections.has(section);
                                            return `
                                                <label class="flex items-center space-x-2 cursor-pointer p-2 rounded hover:bg-slate-800 transition">
                                                    <input type="checkbox" class="checkbox" ${isChecked ? 'checked' : ''}
                                                        onchange="toggleSection(${section})">
                                                    <span class="section-indicator ${getSectionColor(section)}">S${section}</span>
                                                </label>
                                            `;
                                        })}
                                    </div>
                                </div>

                                <!-- Question Count -->
                                <div class="mb-6">
                                    <h3 class="text-lg font-semibold mb-3">Number of Questions</h3>
                                    <p class="text-sm text-slate-400 mb-3">
                                        Available: <span class="font-bold">${availableQuestions}</span> questions
                                    </p>
                                    <div class="grid grid-cols-3 md:grid-cols-4 gap-2">
                                        ${[10, 25, 50, 75, 100, 'all'].map(count => `
                                            <button class="button-secondary button-small ${appState.questionCount === count ? 'border-blue-500 border-2' : ''}"
                                                onclick="setQuestionCount(${typeof count === 'number' ? count : "'all'"})">
                                                ${count === 'all' ? 'All' : count}
                                            </button>
                                        `)}

        function renderResultsScreen() {
            const performance = calculatePerformance();

            return `
                <div class="min-h-screen fade-in pb-8">
                    <div class="max-w-4xl mx-auto px-4 py-8">
                        <h1 class="text-4xl font-bold gradient-text mb-8 text-center">Quiz Complete!</h1>

                        <!-- Overall Score -->
                        <div class="card mb-8">
                            <div class="grid grid-cols-3 gap-4 mb-6">
                                <div class="metric-box">
                                    <div class="metric-value" style="color: #10b981;">${performance.results['Got It']}</div>
                                    <div class="metric-label">Got It</div>
                                </div>
                                <div class="metric-box">
                                    <div class="metric-value" style="color: #f59e0b;">${performance.results['Partial']}</div>
                                    <div class="metric-label">Partial</div>
                                </div>
                                <div class="metric-box">
                                    <div class="metric-value" style="color: #ef4444;">${performance.results['Missed']}</div>
