: "What is the concept of 'sources and methods' in intelligence?", "answer": "'Sources and methods' refers to the classified collection techniques, systems, and human assets used to gather intelligence. Protecting sources and methods is critical to maintaining collection capabilities and asset security.", "keywords": ["sources and methods", "classified", "techniques", "assets", "protection"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is compartmentation in intelligence and why is it important?", "answer": "Compartmentation is the practice of restricting access to intelligence information on a strict need-to-know basis, limiting knowledge of sources, methods, and specific operations. It is important for protecting collection capabilities and preventing the compromise of intelligence networks.", "keywords": ["compartmentation", "need-to-know", "sources", "methods", "protection"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the difference between collection and production in intelligence?", "answer": "Collection is the acquisition of raw information from sources or systems. Production is the analysis and transformation of collected information into finished intelligence products.", "keywords": ["collection", "production", "raw information", "analysis", "finished intelligence"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the relationship between requirements and collection?", "answer": "Intelligence requirements (CCIRs, PIRs, EEIs) drive collection priorities and tasking. Collectors are tasked to answer specific requirements, and collection is organized to address prioritized intelligence needs.", "keywords": ["requirements", "collection", "tasking", "CCIRs", "PIRs"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "Define multi-discipline collection and its advantage.", "answer": "Multi-discipline collection uses multiple intelligence disciplines on the same target or objective to gain comprehensive insight. The advantage is that different disciplines provide complementary information and reduce the risk of bias from any single source.", "keywords": ["multi-discipline", "multiple sources", "comprehensive", "complementary"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the intelligence preparation of the operational environment (IPOE)?", "answer": "IPOE is the systematic analysis of foreign areas/regions that identifies civil/military capabilities, vulnerabilities, and probable enemy courses of action. It provides commanders with baseline intelligence on the operational environment.", "keywords": ["IPOE", "analysis", "operational environment", "capabilities"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the difference between classified and unclassified intelligence sources?", "answer": "Classified sources include sensitive collection systems (satellite, signals intelligence, human assets) and are restricted in dissemination. Unclassified sources include public information, academic research, and media. Unclassified sources can be openly accessed and disseminated.", "keywords": ["classified", "unclassified", "sensitive", "collection", "dissemination"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the cost-effectiveness principle in collection?", "answer": "The cost-effectiveness principle requires that the intelligence value gained from collection justify the cost and risk of deployment. Resources should be allocated to highest-priority requirements.", "keywords": ["cost-effectiveness", "collection", "resources", "priority"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "What is the concept of 'denied areas' in intelligence collection?", "answer": "Denied areas are regions where intelligence collection is difficult due to adversary denial and deception activities, physical barriers, or lack of access. Collection against denied areas often requires specialized techniques.", "keywords": ["denied areas", "collection", "denial", "deception"], "type": "text", "map_data": null}, {"section": 2, "section_name": "Intelligence Disciplines", "question": "How has technology changed intelligence collection in recent years?", "answer": "Technology has increased collection capacity (unmanned systems, commercial satellites), enabled real-time dissemination, improved processing speed, and created new collection sources (cyber, social media). However, it has also increased information volume and the challenge of distinguishing signal from noise.", "keywords": ["technology", "unmanned", "satellites", "real-time", "cyber"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What are the four Naval Intelligence designators and their meanings?", "answer": "1805: Intelligence Officer (unrestricted line), 1815: Cryptologic Officer, 1825: Intelligence Specialist (enlisted), 1835: Intelligence Analyst (civilian), 1885: Information Warfare. These designators identify intelligence professionals within the Navy.", "keywords": ["1805", "1815", "1825", "1835", "1885", "designators"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the Office of Naval Intelligence (ONI) and where is it located?", "answer": "ONI is the primary naval intelligence organization providing intelligence to the Navy and national policymakers. It is headquartered in Suitland, Maryland and serves as the executive agent for naval intelligence.", "keywords": ["ONI", "Office of Naval Intelligence", "Suitland", "Maryland"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What does SABER represent in naval intelligence systems?", "answer": "SABER (Sensitive Activity Based Electronic Reporting) is an ONI-managed intelligence system that tracks sensitive naval activities and operations.", "keywords": ["SABER", "sensitive", "activities", "ONI"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is SPEAR in naval intelligence operations?", "answer": "SPEAR (Simulated Procurement, Evaluation, and Response) is a naval intelligence system for threat assessment and vulnerabilities analysis.", "keywords": ["SPEAR", "threat assessment", "vulnerabilities"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What does SWORD stand for in naval operations?", "answer": "SWORD is a system related to naval operations and intelligence production.", "keywords": ["SWORD"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is SPECTRUM in the context of naval intelligence?", "answer": "SPECTRUM is a naval intelligence system or capability for electromagnetic monitoring and analysis.", "keywords": ["SPECTRUM", "electromagnetic"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "List the 11 combatant commands and their area of responsibility (AOR).", "answer": "Six Geographic COCOMs: CENTCOM (Central Asia/Middle East), EUCOM (Europe/Africa), INDOPACOM (Indo-Pacific), NORTHCOM (North America), SOUTHCOM (South America), AFRICOM (Africa). Five Functional COCOMs: STRATCOM (strategic nuclear forces), TRANSCOM (transportation), SOCOM (special operations), CYBERCOM (cyberspace), SPACECOM (space).", "keywords": ["COCOMs", "geographic", "functional", "CENTCOM", "EUCOM", "INDOPACOM"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Where is CENTCOM headquarters and what is its primary mission?", "answer": "CENTCOM is headquartered in Tampa, Florida. Its area of responsibility includes the Middle East, Central Asia, and portions of Africa. Its primary mission is to counter terrorism and maintain regional stability.", "keywords": ["CENTCOM", "Tampa", "Middle East", "terrorism"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is EUCOM's area of responsibility?", "answer": "EUCOM (European Command) is headquartered in Stuttgart, Germany and has responsibility for all of Europe, portions of the Middle East, and Africa.", "keywords": ["EUCOM", "Stuttgart", "Europe", "Africa"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Describe INDOPACOM's area of responsibility.", "answer": "INDOPACOM (Indo-Pacific Command) is headquartered in Honolulu, Hawaii. Its AOR includes the Pacific and Indian Oceans, extending from the US West Coast to the east coast of Africa, including all of Asia and Australia.", "keywords": ["INDOPACOM", "Honolulu", "Pacific", "Indian Ocean", "Asia"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the naval component structure of a geographic COCOM?", "answer": "Each geographic COCOM has an assigned Naval Component (Navy service component). For example, CENTCOM has Naval Forces Central Command (NAVCENT), EUCOM has Naval Forces Europe (NAVEUR), and INDOPACOM has Naval Forces Indo-Pacific (NAVFORINST).", "keywords": ["Naval Component", "COCOM", "NAVCENT", "NAVEUR"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "Explain the Navy's echelon structure.", "answer": "The Navy echelon structure is: Fleet → Force → Group → Ship. The Fleet is the highest operational level (e.g., U.S. Pacific Fleet). Forces are operational organizations. Groups are tactical formations. Ships are individual vessels.", "keywords": ["Fleet", "Force", "Group", "Ship", "echelon"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the Commander's Warfare Construct (CWC) and what are its call signs?", "answer": "The CWC is an organizational framework for fleet operations. Call signs represent warfare commanders: Alpha (Anti-Submarine Warfare), Bravo (Information Warfare), Whiskey (Strike Warfare), Quebec (Undersea Warfare), Sierra (Surface Warfare), X-Ray (Electronic Warfare), Zulu (Air Warfare), Papa (Anti-Air Warfare).", "keywords": ["CWC", "call signs", "Alpha", "Bravo", "Whiskey", "Quebec"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is 'command by negation' in the CWC?", "answer": "Command by negation is an operational principle where warfare commanders are allowed to exercise control of resources unless expressly directed otherwise by higher authority. It allows decentralized decision-making while maintaining unity of effort.", "keywords": ["command by negation", "decentralized", "resources"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What are the three tenets of the CWC construct?", "answer": "The three tenets are: Unified Action (all warfare specialists coordinate), Decentralized Execution (warfare commanders operate with freedom to accomplish objectives), and Accountability (each warfare commander is responsible for specific warfare domains).", "keywords": ["unified action", "decentralized execution", "accountability"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is a Carrier Strike Group (CSG) and what is its composition?", "answer": "A CSG is a naval formation built around a carrier. Its composition includes: 1 CVN (Carrier), 6 DDG (Guided-Missile Destroyers), 2 CG (Guided-Missile Cruisers), and 1-2 Logistics ships for supply and support.", "keywords": ["CSG", "carrier strike group", "CVN", "DDG", "CG", "logistics"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is CVIC and what is its function?", "answer": "CVIC (Carrier Intelligence Center) is the intelligence center aboard a carrier that produces intelligence products, manages intelligence dissemination, and provides intelligence support to carrier air operations.", "keywords": ["CVIC", "carrier", "intelligence center"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is SUPPLOT and its role?", "answer": "SUPPLOT (Supplementary Plot) is part of the carrier strike group intelligence infrastructure that supports the combat air operations center and provides real-time air defense support.", "keywords": ["SUPPLOT", "CSG", "intelligence", "air defense"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is SSES in the context of carrier operations?", "answer": "SSES (Ship Self-Defense Electronic System) is an integrated electronic warfare system on Navy ships that provides defensive electronic warfare, jamming, and electronic countermeasures.", "keywords": ["SSES", "electronic warfare", "defense"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the EW Module aboard a carrier?", "answer": "The EW (Electronic Warfare) Module is part of the carrier air wing's intelligence infrastructure providing electronic warfare support to air operations.", "keywords": ["EW Module", "electronic warfare", "carrier air wing"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is an Expeditionary Strike Group (ESG) and its composition?", "answer": "An ESG is a naval formation for expeditionary operations built around an amphibious ship. Composition: 1 LHA/LHD (Amphibious Assault Ship), 2 DDG (Guided-Missile Destroyers), 1 LPD (Amphibious Transport Dock), 1 LSD (Landing Ship Dock), and 1-2 Logistics ships.", "keywords": ["ESG", "expeditionary strike group", "LHA", "LHD", "LPD", "LSD"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the JIC and what does it do aboard ESGs?", "answer": "JIC (Joint Intelligence Center) is the intelligence center aboard ESG command ships (LHA/LHD). It produces intelligence to support the Marine Corps expeditionary elements and ship operations.", "keywords": ["JIC", "intelligence center", "ESG"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is EXPLOT in ESG operations?", "answer": "EXPLOT is the intelligence plotting system used aboard ESGs to track tactical intelligence and support operations planning.", "keywords": ["EXPLOT", "ESG", "intelligence", "plotting"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the MOC/MIOC construct and what is the Commander's Decision Cycle?", "answer": "MOC (Maritime Operations Center) / MIOC (Maritime Intelligence Operations Center) is the command center. The Commander's Decision Cycle has five phases: Monitor (continuous observation), Assess (evaluate information), Plan (develop options), Direct (issue orders), and Communicate (disseminate intent).", "keywords": ["MOC", "MIOC", "decision cycle", "monitor", "assess", "plan"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the N2 position and what are its responsibilities?", "answer": "The N2 is the Navy's senior intelligence officer (Flag Intelligence Officer). Responsibilities include intelligence planning, assessment, and advisor to the commander on intelligence matters.", "keywords": ["N2", "Flag Intelligence Officer", "intelligence officer"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the CRC and its function?", "answer": "CRC (Combat Resource Coordinator) is the officer responsible for coordinating combat systems and resources aboard a ship to ensure efficient employment of weapons and sensors.", "keywords": ["CRC", "combat resource", "coordinator"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the CAG AI?", "answer": "CAG AI (Carrier Air Group Air Intelligence Officer) is the air intelligence officer responsible for intelligence support to the carrier air wing.", "keywords": ["CAG", "air intelligence"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the purpose of naval intelligence in force protection?", "answer": "Naval intelligence in force protection identifies threats to ships and personnel, provides early warning of hostile intent, supports air defense, and enables protective measures.", "keywords": ["force protection", "naval intelligence", "threats", "early warning"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is threat warning and how does it support naval operations?", "answer": "Threat warning is the rapid identification and communication of emerging threats to a naval formation. It enables defensive reactions and tactical adjustments to avoid or neutralize threats.", "keywords": ["threat warning", "threats", "defensive", "naval"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the role of reconnaissance in naval intelligence?", "answer": "Reconnaissance is forward intelligence collection providing information about the enemy, terrain, and operational environment. Naval reconnaissance supports tactical planning and situational awareness.", "keywords": ["reconnaissance", "collection", "intelligence", "tactical"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the relationship between naval intelligence and targeting?", "answer": "Naval intelligence identifies targets, provides targeting data, and supports targeting decisions. Intelligence feeds the targeting process, enabling effective weapons employment.", "keywords": ["targeting", "naval intelligence", "weapons"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "How does naval intelligence support strike warfare?", "answer": "Naval intelligence provides target location, target characterization, battle damage assessment, and route planning for strikes. It enables accurate and effective strike operations.", "keywords": ["strike warfare", "targeting", "damage assessment"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the role of intelligence in anti-submarine warfare (ASW)?", "answer": "Intelligence provides submarine threat assessments, detection cues, and localization data to support anti-submarine operations. It enables acoustic, surface, and air ASW tactics.", "keywords": ["ASW", "anti-submarine", "intelligence", "detection"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is naval intelligence's role in electronic warfare?", "answer": "Naval intelligence identifies electronic threats, provides radar and communication system characterization, and supports electronic warfare tactical planning.", "keywords": ["electronic warfare", "naval intelligence", "threats"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the function of naval signals intelligence (SIGINT)?", "answer": "Naval SIGINT collects and analyzes foreign communications and radar emissions to support intelligence assessments, early warning, and tactical targeting.", "keywords": ["SIGINT", "naval", "communications", "radar"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is naval imagery intelligence (IMINT)?", "answer": "Naval IMINT provides electro-optical and infrared imagery of maritime areas, ports, and vessels to support force planning and tactical awareness.", "keywords": ["IMINT", "naval", "imagery", "maritime"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is human intelligence (HUMINT) in the naval context?", "answer": "Naval HUMINT includes information from foreign nationals, defectors, and liaison sources regarding naval capabilities, intentions, and activities.", "keywords": ["HUMINT", "naval", "foreign", "sources"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is naval intelligence's role in maritime domain awareness?", "answer": "Naval intelligence provides comprehensive awareness of surface and subsurface activity in assigned areas, supporting maritime operations and force protection.", "keywords": ["maritime domain awareness", "naval intelligence", "surface", "subsurface"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the purpose of port analysis in naval intelligence?", "answer": "Port analysis provides assessment of foreign naval facilities, repair capabilities, ship movements, and logistic support to understand maritime activity.", "keywords": ["port analysis", "naval facilities", "capabilities"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is naval intelligence's relationship to cyber operations?", "answer": "Naval intelligence supports cyber operations by identifying cyber threats, assessing adversary cyber capabilities, and providing information to enable cyber defensive operations.", "keywords": ["cyber operations", "naval intelligence", "threats", "capabilities"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the role of intelligence in naval logistics?", "answer": "Intelligence assesses enemy logistics, identifies supply lines, and supports operational planning to disrupt enemy logistics and sustain friendly operations.", "keywords": ["logistics", "naval intelligence", "supply lines"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is naval intelligence's role in command and control (C2)?", "answer": "Naval intelligence provides information to support command decisions, maintains common operational picture, and ensures commander awareness of the tactical environment.", "keywords": ["C2", "command", "intelligence", "decision"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the purpose of naval intelligence dissemination?", "answer": "Naval intelligence dissemination ensures intelligence reaches commanders and operators who need it in a timely format. It includes intelligence briefs, written products, and automated feeds.", "keywords": ["dissemination", "intelligence", "timely", "products"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the difference between tactical and operational naval intelligence?", "answer": "Tactical naval intelligence supports ships and squadrons in immediate operations. Operational naval intelligence supports fleet commanders and campaign planning.", "keywords": ["tactical", "operational", "naval intelligence"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the intelligence preparation of the naval battlespace?", "answer": "This is the systematic analysis of the maritime environment including geography, weather, sea state, enemy maritime forces, and friendly capabilities to support planning.", "keywords": ["battlespace preparation", "maritime", "analysis"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the naval intelligence relationship to naval doctrine?", "answer": "Naval doctrine guides how intelligence supports fleet operations. Doctrine emphasizes distributed operations, rapid decision-making, and integration of intelligence into tactical planning.", "keywords": ["naval doctrine", "intelligence", "operations"], "type": "text", "map_data": null}, {"section": 3, "section_name": "Naval Intelligence", "question": "What is the role of reserve intelligence personnel in naval intelligence?", "answer": "Reserve intelligence personnel augment active duty intelligence professionals, provide continuity during crises, and support training and professional development.", "keywords": ["reserve", "intelligence", "augment", "continuity"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is MDA and what does it accomplish?", "answer": "MDA (Missile Defense Agency) is responsible for developing and deploying missile defense systems. It accomplishes layered defense against ballistic missiles through integrated air and missile defense.", "keywords": ["MDA", "missile defense", "layered", "ballistic"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is GMCOI and how does it relate to intelligence?", "answer": "GMCOI (Global Military Command and Control On-the-Internet) is an initiative to improve C2 systems. Intelligence is critical to GMCOI's effectiveness in providing real-time information for decision-making.", "keywords": ["GMCOI", "command and control", "internet", "intelligence"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is CIEA?", "answer": "CIEA (Critical Intelligence and Emergency Assistance) is a capability for providing emergency intelligence support during crises.", "keywords": ["CIEA", "intelligence", "emergency"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Define Maritime Interdiction Operations (MIO) and its objective.", "answer": "MIO is the detection and prevention of maritime smuggling and illegal activities. Objectives include preventing weapons proliferation, drug trafficking, and contraband movement.", "keywords": ["MIO", "maritime interdiction", "smuggling", "weapons"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is VBSS and when is it employed?", "answer": "VBSS (Visit, Board, Search, and Seizure) is a maritime boarding operation where naval personnel board and search suspected vessels. It is employed during MIO to inspect cargo and verify vessel documentation.", "keywords": ["VBSS", "boarding", "search", "MIO"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Define an Integrated Air Defense System (IADS) and its components.", "answer": "IADS is a network of radar, command centers, and air defense weapons integrated to detect and engage aircraft. Components include surveillance radar, engagement radar, command centers, communications, and air defense missiles.", "keywords": ["IADS", "air defense", "radar", "integrated", "weapons"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is centralized control in IADS?", "answer": "Centralized control is when IADS decisions and targeting are controlled by a central command authority. This allows optimization of overall air defense but may reduce speed at tactical levels.", "keywords": ["centralized control", "IADS", "command"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is decentralized control in IADS?", "answer": "Decentralized control is when individual air defense units have authority to engage targets independently. This allows faster response but may result in less efficient overall defense.", "keywords": ["decentralized control", "IADS", "independent"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is autonomous control in IADS?", "answer": "Autonomous control is when IADS makes automated firing decisions without human intervention. This enables extremely rapid response but carries risk of engagement errors.", "keywords": ["autonomous control", "IADS", "automated"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is SEAD and what is its purpose?", "answer": "SEAD (Suppression of Enemy Air Defense) is the destruction or neutralization of enemy air defense systems. It is conducted to protect friendly aircraft and establish air superiority.", "keywords": ["SEAD", "air defense", "suppression", "aircraft"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is DEAD and how does it differ from SEAD?", "answer": "DEAD (Destruction of Enemy Air Defenses) is the actual destruction of air defense systems through kinetic strikes. SEAD is broader and includes suppression, jamming, and other countermeasures.", "keywords": ["DEAD", "destruction", "SEAD", "air defense"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the joint targeting cycle.", "answer": "The joint targeting cycle includes: (1) Planning (identify objectives), (2) Tasking (assign collection), (3) Processing (analyze intelligence), (4) Exploitation (develop targeting data), (5) Dissemination (send to operators), (6) Assessment (evaluate effectiveness). The cycle is continuous.", "keywords": ["targeting cycle", "planning", "tasking", "processing", "exploitation"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is a CDE in targeting?", "answer": "CDE (Collateral Damage Estimate) is the assessment of non-combatant casualties and damage to civilian infrastructure from a proposed military strike. It is required before weapon employment.", "keywords": ["CDE", "collateral damage", "estimate"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the ATO and its relationship to the targeting cycle?", "answer": "ATO (Air Tasking Order) is the directive that translates the Air Operation Plan into specific sorties and targets. It is the output of the targeting cycle that directs air operations.", "keywords": ["ATO", "air tasking order", "targeting", "sorties"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is NECC and what are its major components?", "answer": "NECC (Naval Expeditionary Combat Command) commands Navy expeditionary warfare forces. Major components include: EOD (Explosive Ordnance Disposal), NAVELSG (Naval Expeditionary Logistics), NEIC (Naval Expeditionary Intelligence Command), NCF (Naval Construction Force), EWDC (Electronic Warfare Detachment), ECRC (Expeditionary Combat Readiness Center).", "keywords": ["NECC", "expeditionary", "EOD", "NAVELSG"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is EOD and what operations does it conduct?", "answer": "EOD (Explosive Ordnance Disposal) disposes of unexploded ordnance, mines, and improvised explosive devices. It conducts counter-IED operations and threat neutralization.", "keywords": ["EOD", "explosive ordnance disposal", "mines", "IED"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is a Noncombatant Evacuation Operation (NEO)?", "answer": "NEO is the planned or emergency evacuation of noncombatants from a foreign area to a secure location. It is typically conducted by military forces when a country faces internal conflict or natural disaster.", "keywords": ["NEO", "evacuation", "noncombatant", "foreign"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the F-77 report and when is it used?", "answer": "The F-77 report documents noncombatant evacuation operations, tracking movement of evacuees and reporting status to higher command.", "keywords": ["F-77", "NEO", "evacuation", "report"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the five phases of amphibious operations (PERMA).", "answer": "PERMA represents: Planning (intelligence preparation, force composition), Embarking (loading forces aboard ship), Rehearsal (pre-operation practice), Movement (transit to objective), and Assault (landing and combat operations).", "keywords": ["PERMA", "amphibious", "phases", "planning", "assault"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is CATF and what is its responsibility?", "answer": "CATF (Commander Amphibious Task Force) is the overall commander of amphibious operations including ship handling, embarking, and movement. CATF is typically a Navy admiral.", "keywords": ["CATF", "amphibious", "commander"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is CLF and what forces does it command?", "answer": "CLF (Commander Landing Force) is the senior Marine Corps commander ashore. CLF commands combat forces during landing and operations ashore.", "keywords": ["CLF", "landing force", "Marine Corps"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What are the four elements of the Marine Air-Ground Task Force (MAGTF)?", "answer": "Command Element (CE), Ground Combat Element (GCE), Aviation Combat Element (ACE), and Logistics Combat Element (LCE). Each provides critical functions to the MAGTF.", "keywords": ["MAGTF", "command element", "GCE", "ACE", "LCE"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the Marine Expeditionary Unit (MEU) and what is its size?", "answer": "The MEU is a Marine Corps deployable unit with approximately 2200 Marines and sailors, typically commanded by a Colonel. It consists of CE, GCE, ACE, and LCE.", "keywords": ["MEU", "2200", "colonel", "expeditionary"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is counter-insurgency (COIN) operations?", "answer": "COIN is military/civilian operations to defeat insurgency through security, civil-military operations, and addressing underlying grievances. It requires intelligence, cultural understanding, and whole-of-government approach.", "keywords": ["COIN", "insurgency", "operations", "security"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the primary difference between conventional and irregular warfare?", "answer": "Conventional warfare uses regular military forces in organized, large-scale operations. Irregular warfare uses unconventional tactics, smaller units, and often targets civilian population.", "keywords": ["conventional", "irregular", "warfare", "military"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the USS Nimitz-class carrier (CVN).", "answer": "The Nimitz-class is the largest aircraft carrier in the world. It displaces approximately 100,000 tons, carries 5,000 personnel, operates 70+ aircraft, and is nuclear powered with indefinite range.", "keywords": ["Nimitz", "CVN", "carrier", "nuclear", "aircraft"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the USS Ford-class carrier and how does it differ from Nimitz-class?", "answer": "Ford-class is the newer carrier design with improved power generation, higher sortie rates, and more advanced combat systems. It is more efficient and automated than Nimitz-class.", "keywords": ["Ford", "CVN", "carrier", "automated", "efficient"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the Ticonderoga-class guided-missile cruiser (CG).", "answer": "Ticonderoga-class carries the Aegis combat system and is equipped with VLS (Vertical Launch System) for anti-air, anti-ship, and land attack missiles. It is approximately 560 feet long with advanced radar.", "keywords": ["Ticonderoga", "CG", "cruiser", "Aegis", "VLS"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the Arleigh Burke-class guided-missile destroyer (DDG).", "answer": "Arleigh Burke-class features the Aegis system, VLS, and is equipped for anti-air, anti-ship, and land attack. It is approximately 505 feet long and serves as the Navy's primary destroyer.", "keywords": ["Arleigh Burke", "DDG", "destroyer", "Aegis"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the America-class amphibious assault ship (LHA).", "answer": "America-class is optimized for aviation operations with a large flight deck but reduced well deck. It carries Marine Forces and helicopter/tiltrotor aircraft.", "keywords": ["America", "LHA", "amphibious", "flight deck"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the Wasp-class amphibious assault ship (LHD).", "answer": "Wasp-class is a multipurpose amphibious assault ship with both flight deck and well deck. It carries Marines, helicopters, and can support landing craft and hovercraft.", "keywords": ["Wasp", "LHD", "amphibious", "well deck"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the San Antonio-class amphibious transport dock (LPD).", "answer": "San Antonio-class transports Marines and equipment, features a large well deck for landing craft, and serves as command ship for ARGs and smaller operations.", "keywords": ["San Antonio", "LPD", "amphibious transport", "well deck"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What are the major nuclear-powered ballistic missile submarine (SSBN) classes?", "answer": "The Ohio-class SSBN (24 Trident missiles) is the current fleet. The new Columbia-class SSBN is under development as the replacement platform.", "keywords": ["SSBN", "Ohio", "Columbia", "ballistic missiles"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What are the major nuclear-powered attack submarine (SSN) classes?", "answer": "Virginia-class (newest, 154+ feet), Seawolf-class (very large, heavily armed), and Los Angeles-class (previous generation, still in service) are the three main SSN classes.", "keywords": ["SSN", "Virginia", "Seawolf", "Los Angeles"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the operational capability of an SSGN (Guided-Missile Submarine)?", "answer": "SSGN carries cruise missiles for land attack and is optimized for Special Operations Forces insertion. The Navy converted several Ohio-class SSBNs to SSGNs.", "keywords": ["SSGN", "cruise missiles", "special operations"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What are key reconnaissance features of submarine design?", "answer": "Submarines have extensive sensor suites (sonar, periscope, radar), quiet propulsion, and stealth hull design for undetected reconnaissance. They provide unique ISR capability.", "keywords": ["submarine", "reconnaissance", "sonar", "stealth"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the F-35C carrier-based fighter.", "answer": "The F-35C is the Navy variant of the Joint Strike Fighter. It provides air-to-air, air-to-ground, and air-to-surface capability with stealth characteristics.", "keywords": ["F-35C", "fighter", "stealth", "air-to-air"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the FA-18E/F Super Hornet and its role?", "answer": "The F/A-18E/F Super Hornet is a twin-engine carrier fighter that provides air superiority, strike, and electronic warfare support to the carrier air wing.", "keywords": ["F/A-18E/F", "Super Hornet", "fighter", "strike"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the E-2D Hawkeye and its mission?", "answer": "The E-2D Advanced Hawkeye provides airborne early warning and control for the carrier air wing, detecting air threats and managing air defense.", "keywords": ["E-2D", "Hawkeye", "airborne early warning"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the EA-18G Growler and its primary function?", "answer": "The EA-18G Growler is a two-seat electronic warfare variant that provides electronic attack and electronic warfare support to the carrier air wing.", "keywords": ["EA-18G", "Growler", "electronic warfare"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the MH-60R anti-submarine helicopter.", "answer": "The MH-60R provides anti-submarine and anti-surface warfare capability with sonar, sensors, and weapons. It is the primary ASW helicopter aboard Navy ships.", "keywords": ["MH-60R", "helicopter", "anti-submarine"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Describe the MH-60S cargo/transport helicopter.", "answer": "The MH-60S provides vertical replenishment, transport, and combat search and rescue. It carries cargo and personnel to and from ships.", "keywords": ["MH-60S", "helicopter", "transport", "cargo"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the CMV-22B Osprey and where does it operate?", "answer": "The CMV-22B is a tiltrotor aircraft that carries cargo and personnel between ships and landing zones. It has greater range and speed than helicopters.", "keywords": ["CMV-22B", "Osprey", "tiltrotor", "cargo"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "Define Tactical Air Operations and their role.", "answer": "Tactical Air Operations (TACAIR) provide air superiority, close air support, interdiction, and air transportation. They are coordinated through the Tactical Air Coordinator.", "keywords": ["TACAIR", "air superiority", "air support"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the role of the Tactical Air Coordinator in operations?", "answer": "The Tactical Air Coordinator manages air operations, directs strikes, and ensures deconfliction of airspace. This officer coordinates between ground forces and aircraft.", "keywords": ["Tactical Air Coordinator", "deconfliction", "airspace"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is strike warfare and what weapons are employed?", "answer": "Strike warfare is the employment of stand-off weapons (cruise missiles, air-to-surface missiles, aerial bombs) against land targets. It includes cruise missile strikes and air strikes.", "keywords": ["strike warfare", "cruise missiles", "land attack"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is the role of intelligence in strike planning?", "answer": "Intelligence provides target location, target characterization, route planning, and threat assessment for strike missions. It ensures accurate targeting and mission success.", "keywords": ["strike planning", "intelligence", "targeting", "threats"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is Submarine Warfare and its primary tactics?", "answer": "Submarine Warfare employs submarines for anti-submarine and anti-surface operations. Tactics include acoustic tracking, positioning for ambush, and prosecuting targets with torpedoes/missiles.", "keywords": ["submarine warfare", "tactics", "prosecution"], "type": "text", "map_data": null}, {"section": 4, "section_name": "Warfare Fundamentals", "question": "What is Surface Warfare and its primary objectives?", "answer": "Surface Warfare uses surface ships to achieve sea control, protect shipping, conduct air defense, and conduct strike operations against ships and land targets.", "keywords": ["surface warfare", "sea control", "objectives"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CCIR and what is its function?", "answer": "CCIR (Commander's Critical Information Requirements) are elements of information critical to the commander's decision-making. Function: drives intelligence collection priorities and ensures intelligence answers the commander's key needs.", "keywords": ["CCIR", "critical information", "requirements", "commander"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is PIR and how does it drive intelligence collection?", "answer": "PIR (Priority Intelligence Requirement) focuses on adversary and operational environment information. Function: translates CCIRs into specific intelligence questions that drive ISR tasking.", "keywords": ["PIR", "intelligence requirement", "adversary", "collection"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is FFIR and what does it focus on?", "answer": "FFIR (Friendly Force Information Requirement) focuses on friendly force status and capabilities. Function: ensures intelligence assesses friendly readiness, posture, and ability to execute.", "keywords": ["FFIR", "friendly forces", "information requirement"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is EEI and its relationship to PIRs?", "answer": "EEI (Essential Elements of Information) decompose PIRs into smaller, answerable questions. Function: provides collectors with specific intelligence tasking that directly addresses PIRs.", "keywords": ["EEI", "essential elements", "PIR", "collectors"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ISR and what does it accomplish?", "answer": "ISR (Intelligence, Surveillance, and Reconnaissance) combines intelligence analysis with surveillance and reconnaissance operations. Function: provides commanders with comprehensive understanding of the battlespace.", "keywords": ["ISR", "intelligence", "surveillance", "reconnaissance"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is I&W and what is its primary function?", "answer": "I&W (Indications and Warning) is real-time intelligence from theater assets on imminent threats. Function: provides early warning of hostile activity enabling defensive reactions.", "keywords": ["I&W", "indications", "warning", "real-time"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CVIC and what does it do?", "answer": "CVIC (Carrier Intelligence Center) is the intelligence operations center aboard carriers. Function: produces intelligence products, disseminates intelligence, and supports air operations.", "keywords": ["CVIC", "intelligence center", "carrier"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SUPPLOT and its role in operations?", "answer": "SUPPLOT (Supplementary Plot) is a tactical intelligence plotting facility. Function: provides real-time air defense information and tactical target data to operators.", "keywords": ["SUPPLOT", "tactical intelligence", "air defense"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SSES and what is its purpose?", "answer": "SSES (Ship Self-Defense Electronic System) is shipboard electronic warfare. Function: detects electromagnetic threats and provides defensive electronic countermeasures.", "keywords": ["SSES", "electronic warfare", "defense", "ship"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CWC and what does it represent?", "answer": "CWC (Commander's Warfare Construct) is the naval operational framework. Function: organizes warfare specialists by domain (air, surface, undersea, etc.) for coordinated operations.", "keywords": ["CWC", "warfare construct", "organizational"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is IWC and its function?", "answer": "IWC (Intelligence Watch Center) coordinates intelligence collection and dissemination. Function: manages intelligence operations and ensures timely delivery to commanders.", "keywords": ["IWC", "intelligence", "watch center"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is AMDC and what does it manage?", "answer": "AMDC (Air Missile Defense Command) coordinates air and missile defense. Function: integrates air defense systems and manages threat response.", "keywords": ["AMDC", "air defense", "missile defense"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SUWC and what is its responsibility?", "answer": "SUWC (Surface Warfare Commander) commands surface warfare. Function: directs surface ship operations and coordinating with other warfare domains.", "keywords": ["SUWC", "surface warfare", "commander"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ASWC and what is its role?", "answer": "ASWC (Anti-Submarine Warfare Commander) leads ASW operations. Function: directs submarine detection, tracking, and prosecution operations.", "keywords": ["ASWC", "anti-submarine warfare"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is STWC and its operational focus?", "answer": "STWC (Strike Warfare Commander) coordinates strike operations. Function: directs air and missile strikes against enemy targets.", "keywords": ["STWC", "strike warfare", "operations"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SCC and what does it do?", "answer": "SCC (Space Control Commander) manages space operations. Function: protects and exploits space capabilities for military operations.", "keywords": ["SCC", "space control", "operations"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CRC and what is its responsibility?", "answer": "CRC (Combat Resource Coordinator) manages ship combat systems. Function: allocates and coordinates employment of ship weapons and sensors.", "keywords": ["CRC", "combat systems", "resource coordination"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CSG and its naval significance?", "answer": "CSG (Carrier Strike Group) is a naval formation built around a carrier. Function: projects power and conducts sustained naval operations worldwide.", "keywords": ["CSG", "carrier strike group", "naval formation"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ESG and what type of operations does it support?", "answer": "ESG (Expeditionary Strike Group) is a formation for expeditionary operations. Function: transports and supports Marine forces for amphibious operations.", "keywords": ["ESG", "expeditionary strike group", "amphibious"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ARG and what is its composition?", "answer": "ARG (Amphibious Ready Group) is the naval element supporting amphibious operations. Function: transports Marine forces and provides fire support.", "keywords": ["ARG", "amphibious ready group", "composition"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is MEU and what is its typical strength?", "answer": "MEU (Marine Expeditionary Unit) is a deployable Marine force of approximately 2200 personnel. Function: conducts expeditionary operations including NEO and crisis response.", "keywords": ["MEU", "expeditionary unit", "2200"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is MAGTF and what are its elements?", "answer": "MAGTF (Marine Air-Ground Task Force) is an integrated Marine force. Function: combines ground, air, and logistics elements for flexible operations.", "keywords": ["MAGTF", "task force", "integrated"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is JIPOE and its intelligence purpose?", "answer": "JIPOE (Joint Intelligence Preparation of the Operational Environment) analyzes the operational environment. Function: provides baseline intelligence for planning and operations.", "keywords": ["JIPOE", "intelligence preparation", "analysis"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is GCCS and what does it provide?", "answer": "GCCS (Global Command and Control System) is the primary military C2 system. Function: provides common operating picture and enables command decision-making.", "keywords": ["GCCS", "command and control", "common picture"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is DCGS-N and what is its primary function?", "answer": "DCGS-N (Distributed Common Ground System-Navy) is the Navy's intelligence system. Function: integrates all-source intelligence for naval operations.", "keywords": ["DCGS-N", "Navy", "intelligence system"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is OPSEC and what are its objectives?", "answer": "OPSEC (Operations Security) protects sensitive information from disclosure. Objectives: prevent adversary collection of friendly capabilities, intentions, and vulnerabilities.", "keywords": ["OPSEC", "operations security", "protection"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is EMCON and what does it control?", "answer": "EMCON (Emission Control) restricts electromagnetic emissions. Function: minimizes detectability of ships and aircraft by controlling radar, radio, and other emissions.", "keywords": ["EMCON", "electromagnetic", "emissions", "control"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is INFOCON and what does it measure?", "answer": "INFOCON (Information Operations Condition) measures threat level to information systems. Function: establishes defensive posture against cyber threats (5=lowest, 1=highest).", "keywords": ["INFOCON", "condition", "threat level", "cyber"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is DIME and what does it represent?", "answer": "DIME (Diplomacy, Information, Military, Economy) represents national instruments of power. Function: provides framework for national security strategy and policy.", "keywords": ["DIME", "national power", "instruments"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is PMESII and what does it analyze?", "answer": "PMESII (Political, Military, Economic, Social, Information, Infrastructure) is an analytical framework. Function: systematically analyzes all aspects of a society for intelligence.", "keywords": ["PMESII", "analytical framework", "society"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is BDA and what is its purpose?", "answer": "BDA (Battle Damage Assessment) evaluates effects of strikes. Function: determines if targets were successfully engaged and directs re-strikes if necessary.", "keywords": ["BDA", "battle damage assessment", "strikes"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CDE and what must it address?", "answer": "CDE (Collateral Damage Estimate) predicts non-combatant effects of strikes. Function: ensures civilian damage is minimized and acceptable for military necessity.", "keywords": ["CDE", "collateral damage", "civilian"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ATO and what does it authorize?", "answer": "ATO (Air Tasking Order) translates air operations plan into specific sorties. Function: authorizes and directs all air operations for a specified period.", "keywords": ["ATO", "air tasking order", "sorties"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is NOFORN and what restriction does it impose?", "answer": "NOFORN (Not Releasable to Foreign Nationals) is a dissemination control. Function: restricts intelligence from being shared with citizens of foreign countries.", "keywords": ["NOFORN", "dissemination control", "foreign nationals"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ORCON and who enforces it?", "answer": "ORCON (Originator Controlled) restricts dissemination to originating agency permission. Function: enables source protection and control over sensitive information.", "keywords": ["ORCON", "dissemination control", "originating agency"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SCI and why is special handling required?", "answer": "SCI (Sensitive Compartmented Information) covers sensitive sources and methods. Function: requires special security measures and restricted access to protect collection systems.", "keywords": ["SCI", "sensitive", "compartmented", "sources"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is HCS and what does it protect?", "answer": "HCS (HUMINT Control System) is a SCI control marking. Function: restricts intelligence derived from sensitive human sources to protect agents.", "keywords": ["HCS", "HUMINT", "control system"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SI and how is it applied?", "answer": "SI (Special Intelligence) is a SCI control marking for SIGINT/overhead. Function: identifies intelligence from foreign communications and satellite collection.", "keywords": ["SI", "special intelligence", "SIGINT", "satellite"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is TK and what does it protect?", "answer": "TK (Talent Keyhole) is a SCI control marking. Function: protects intelligence from space-based collection systems and satellite reconnaissance.", "keywords": ["TK", "talent keyhole", "space-based"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is NIP and what does it fund?", "answer": "NIP (National Intelligence Program) is the budget for national-level intelligence. Function: funds ODNI, CIA, NSA, NGA, and other IC agencies.", "keywords": ["NIP", "national intelligence", "budget"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is MIP and what intelligence does it fund?", "answer": "MIP (Military Intelligence Program) is the DoD intelligence budget. Function: funds tactical and operational military intelligence activities.", "keywords": ["MIP", "military intelligence", "budget"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ADCON and what authority does it represent?", "answer": "ADCON (Administrative Control) is authority over administration and support. Function: enables personnel management, logistics, and administrative functions.", "keywords": ["ADCON", "administrative control", "authority"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is OPCON and what does it authorize?", "answer": "OPCON (Operational Control) is authority to employ forces in combat. Function: enables commanders to organize, assign tasks, and direct military operations.", "keywords": ["OPCON", "operational control", "combat"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is TACON and what is its limitation?", "answer": "TACON (Tactical Control) is limited authority over movements and maneuvers. Function: provides tactical direction while maintaining operational oversight by higher authority.", "keywords": ["TACON", "tactical control", "maneuvers"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is VBSS and what is its objective?", "answer": "VBSS (Visit, Board, Search, Seizure) is a boarding operation. Function: inspects maritime vessels for illegal cargo and contraband.", "keywords": ["VBSS", "boarding", "search", "seizure"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is MIO and what does it prevent?", "answer": "MIO (Maritime Interdiction Operations) intercepts maritime shipping. Function: prevents smuggling, weapons proliferation, and illegal cargo movement.", "keywords": ["MIO", "maritime interdiction", "smuggling"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is NEO and when is it conducted?", "answer": "NEO (Noncombatant Evacuation Operation) evacuates non-combatants. Function: safely removes civilians from threatened areas during crises.", "keywords": ["NEO", "evacuation", "noncombatant", "crisis"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is NECC and what commands does it include?", "answer": "NECC (Naval Expeditionary Combat Command) commands Navy expeditionary forces. Function: provides combat support including EOD, SEAL teams, and logistics.", "keywords": ["NECC", "expeditionary", "combat command"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is IADS and what is its function?", "answer": "IADS (Integrated Air Defense System) is networked air defense. Function: provides layered defense against aircraft through radar-guided missile systems.", "keywords": ["IADS", "air defense system", "integrated"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is COP and what does it show?", "answer": "COP (Common Operational Picture) is shared situational awareness. Function: displays all relevant tactical information to enable coordinated operations.", "keywords": ["COP", "common operational picture", "situational awareness"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ROE and what does it govern?", "answer": "ROE (Rules of Engagement) are directives for use of force. Function: governs when and how military personnel may employ weapons.", "keywords": ["ROE", "rules of engagement", "force"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is RFI and what is its purpose?", "answer": "RFI (Request for Information) is a query for intelligence. Function: allows commanders to request specific intelligence beyond standing requirements.", "keywords": ["RFI", "request for information", "intelligence"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is PED and what does it contain?", "answer": "PED (Personnel/Equipment Database) maintains personnel and equipment information. Function: enables tracking of personnel assignments and equipment status.", "keywords": ["PED", "database", "personnel"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CATF and what command does it hold?", "answer": "CATF (Commander Amphibious Task Force) commands amphibious operations. Function: maintains command of naval aspects and force employment.", "keywords": ["CATF", "amphibious", "commander"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is CLF and what is its realm of responsibility?", "answer": "CLF (Commander Landing Force) commands landing operations. Function: directs combat operations ashore and Marines on the objective.", "keywords": ["CLF", "landing force", "commander"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is SIGINT and what are its subcategories?", "answer": "SIGINT (Signals Intelligence) collects foreign signals. Subcategories: COMINT (communications), ELINT (radar/electronic), FISINT (telemetry).", "keywords": ["SIGINT", "signals intelligence", "COMINT", "ELINT", "FISINT"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is ELINT and what does it target?", "answer": "ELINT (Electronic Intelligence) collects non-communications electronics. Function: identifies and characterizes radar, navigation, and electronic emissions.", "keywords": ["ELINT", "electronic intelligence", "radar"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is COMINT and what does it involve?", "answer": "COMINT (Communications Intelligence) intercepts foreign communications. Function: provides intelligence from collected voice, data, and messaging.", "keywords": ["COMINT", "communications intelligence", "intercept"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is FISINT and what does it collect?", "answer": "FISINT (Foreign Instrumentation Signals Intelligence) collects weapons telemetry. Function: provides intelligence on weapon system development and capabilities.", "keywords": ["FISINT", "instrumentation signals", "telemetry"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is GEOINT and what type of information does it provide?", "answer": "GEOINT (Geospatial Intelligence) analyzes imagery and terrain. Function: provides visual and spatial information about geography, facilities, and activities.", "keywords": ["GEOINT", "geospatial", "imagery"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is MASINT and what types of signatures does it analyze?", "answer": "MASINT (Measurement and Signature Intelligence) analyzes physical signatures. Function: provides intelligence on weapons, materiel, and technical characteristics.", "keywords": ["MASINT", "measurement", "signature", "technical"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is HUMINT and how is it collected?", "answer": "HUMINT (Human Intelligence) collects from human sources. Function: provides intelligence from individuals with access to classified information.", "keywords": ["HUMINT", "human sources", "collection"], "type": "text", "map_data": null}, {"section": 5, "section_name": "Acronyms", "question": "What is OSINT and what sources does it use?", "answer": "OSINT (Open Source Intelligence) collects public information. Function: provides intelligence from unclassified sources available to general public.", "keywords": ["OSINT", "open source", "public"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Russia's capital and what is its strategic importance?", "answer": "Moscow is the capital of Russia. Strategic importance: center of Russian government, military planning, and economic control. Approximately 12 million people.", "keywords": ["Russia", "Moscow", "capital", "strategic"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the capital of China and what are its characteristics?", "answer": "Beijing is the capital of China. Characteristics: political center of Chinese government, largest center for decision-making, located in northern China. Population ~20 million.", "keywords": ["China", "Beijing", "capital", "government"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the capital of Iran and what is its geopolitical significance?", "answer": "Tehran is the capital of Iran. Significance: political and military center, seat of government, important transportation hub. Population ~8.5 million.", "keywords": ["Iran", "Tehran", "capital", "geopolitical"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the capital of North Korea and what is its strategic value?", "answer": "Pyongyang is the capital of DPRK. Strategic value: political center, location of key government and military installations, heavily fortified.", "keywords": ["DPRK", "Pyongyang", "capital", "strategic"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Taiwan and where is it located?", "answer": "Taiwan is an island off the southeast coast of mainland China. Location: 100-150 km east of China. It is a separate political entity with its own government.", "keywords": ["Taiwan", "island", "China", "location"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the capital of Taiwan?", "answer": "Taipei is the capital and largest city of Taiwan, located in northern Taiwan. Population ~2.6 million.", "keywords": ["Taiwan", "Taipei", "capital"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Japan and what is its capital?", "answer": "Japan is an island nation in East Asia. Capital: Tokyo. It is a highly developed nation with significant economic and military capabilities.", "keywords": ["Japan", "Tokyo", "capital", "island"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is South Korea and what is its capital?", "answer": "South Korea (ROK) is located on the Korean peninsula south of North Korea. Capital: Seoul. It is a developed democratic nation.", "keywords": ["South Korea", "Seoul", "capital", "peninsula"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Israel and what is its capital?", "answer": "Israel is a nation in the Middle East located at the eastern end of the Mediterranean Sea. Capital: Jerusalem. It is a key strategic ally of the United States.", "keywords": ["Israel", "Jerusalem", "capital", "Middle East"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the capital of Saudi Arabia?", "answer": "Riyadh is the capital of Saudi Arabia, located in central Saudi Arabia. It is the center of Saudi government and major economic hub.", "keywords": ["Saudi Arabia", "Riyadh", "capital"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Ukraine and what is its capital?", "answer": "Ukraine is a nation in Eastern Europe located between Europe and Russia. Capital: Kyiv. It is strategically important for NATO expansion.", "keywords": ["Ukraine", "Kyiv", "capital", "Eastern Europe"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the capital of India?", "answer": "New Delhi is the capital of India, located in northern central India. It is the political center of India.", "keywords": ["India", "New Delhi", "capital"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Turkey and what is its capital?", "answer": "Turkey is a nation spanning Europe and Asia at the juncture of three seas. Capital: Ankara. It controls strategic straits and is a NATO member.", "keywords": ["Turkey", "Ankara", "capital", "straits"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Pakistan and what is its capital?", "answer": "Pakistan is located in south Asia, east of Iran. Capital: Islamabad. It is a nuclear-armed nation with significant military capabilities.", "keywords": ["Pakistan", "Islamabad", "capital", "south Asia"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Egypt and what is its capital?", "answer": "Egypt is located in North Africa and the Middle East. Capital: Cairo. It controls the Suez Canal, a critical strategic chokepoint.", "keywords": ["Egypt", "Cairo", "capital", "Suez Canal"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is Germany and what is its capital?", "answer": "Germany is the largest economy in Europe, located in central Europe. Capital: Berlin. It is a leading NATO member.", "keywords": ["Germany", "Berlin", "capital", "NATO"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Strait of Hormuz and what is its strategic significance?", "answer": "The Strait of Hormuz is located between Iran and Oman, connecting the Persian Gulf to the Gulf of Oman/Arabian Sea. Significance: ~30% of seaborne oil passes through it; critical for global energy security.", "keywords": ["Strait of Hormuz", "chokepoint", "oil", "strategic"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Suez Canal and why is it strategically important?", "answer": "The Suez Canal is located in Egypt, connecting the Mediterranean Sea to the Red Sea. Importance: critical shipping route between Europe and Asia; ~12% of global trade; Egypt controls access.", "keywords": ["Suez Canal", "Egypt", "shipping", "chokepoint"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Bab-el-Mandeb Strait and its strategic value?", "answer": "Bab-el-Mandeb is the strait between Yemen and Djibouti connecting the Red Sea to the Arabian Sea. Strategic value: controls access to the Red Sea and Suez Canal; piracy and terrorism concerns.", "keywords": ["Bab-el-Mandeb", "strait", "Red Sea", "chokepoint"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Malacca Strait and why is it important?", "answer": "The Malacca Strait is located between Malaysia and Indonesia connecting the Indian Ocean to the South China Sea. Importance: ~30% of maritime trade transits; critical for energy supplies to Asia.", "keywords": ["Malacca Strait", "chokepoint", "trade", "Asia"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Panama Canal and its global importance?", "answer": "The Panama Canal connects the Atlantic and Pacific Oceans through Panama. Importance: avoids long transit around South America; ~5% of global trade transits; critical for US naval operations.", "keywords": ["Panama Canal", "chokepoint", "shipping"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Strait of Gibraltar and its strategic role?", "answer": "The Strait of Gibraltar is located between Spain and Morocco connecting the Mediterranean to the Atlantic Ocean. Strategic role: gateway to Mediterranean; controls access to Europe.", "keywords": ["Strait of Gibraltar", "chokepoint", "Mediterranean"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What are the Turkish Straits and why are they important?", "answer": "The Turkish Straits (Bosporus and Dardanelles) connect the Mediterranean to the Black Sea through Turkey. Importance: controls access to Black Sea; Montreux Convention limits warship passage.", "keywords": ["Turkish Straits", "Bosporus", "Dardanelles", "Black Sea"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Korea Strait and what transits through it?", "answer": "The Korea Strait separates South Korea from Japan. Transits: commercial shipping, naval forces, and fishing vessels. Strategically important for East Asian security.", "keywords": ["Korea Strait", "South Korea", "Japan"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the Luzon Strait and its significance?", "answer": "The Luzon Strait separates the Philippines from Taiwan. Significance: critical waterway for shipping between Pacific and Indian Oceans; naval transit point.", "keywords": ["Luzon Strait", "Philippines", "Taiwan"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What are the Danish Straits and their importance?", "answer": "The Danish Straits (Kattegat, Great Belt, Little Belt) connect the North Sea to the Baltic Sea. Importance: controls access to Baltic; passage for commercial and military vessels.", "keywords": ["Danish Straits", "Baltic Sea", "chokepoint"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "Where is the 5th Fleet headquarters and what is its AOR?", "answer": "5th Fleet headquarters is located in Manama, Bahrain (Naval Support Activity Bahrain). AOR: Middle East, Persian Gulf, Red Sea, Western Indian Ocean.", "keywords": ["5th Fleet", "Bahrain", "AOR", "Middle East"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "Where is the 6th Fleet headquarters and what region does it cover?", "answer": "6th Fleet headquarters is located in Naples, Italy (Naval Station Naples). AOR: Mediterranean Sea, North Atlantic, and portions of Middle East.", "keywords": ["6th Fleet", "Naples", "Mediterranean", "AOR"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "Where is the 7th Fleet headquarters and what is its area of responsibility?", "answer": "7th Fleet headquarters is located in Yokosuka, Japan (Naval Base Yokosuka). AOR: Western Pacific, Indo-Pacific, from Hawaii to the Indian Ocean.", "keywords": ["7th Fleet", "Yokosuka", "Japan", "Indo-Pacific"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What are the countries in the Middle East of strategic importance?", "answer": "Key countries: Saudi Arabia, Iran, Iraq, Israel, UAE, Egypt, Jordan, Turkey, Pakistan, and Afghanistan. Strategic importance: oil reserves, military installations, terrorism, US interests.", "keywords": ["Middle East", "strategic", "oil"], "type": "text", "map_data": null}, {"section": 6, "section_name": "Geography", "question": "What is the importance of the Persian Gulf to global energy?", "answer": "The Persian Gulf contains approximately 30% of world's proven oil reserves and 15% of natural gas. Strategic importance: critical for global energy security and economic st
